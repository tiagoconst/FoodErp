      <div class="card-b">
        <p class="subtle" style="margin-bottom:12px">Conecte a um projeto Supabase para ter login, acesso multiusuário simultâneo e sincronização em tempo real entre dispositivos. Antes, execute o script <b>supabase-setup.sql</b> no SQL Editor do seu projeto.</p>
        <div class="frow c2">
          <div class="field"><label>URL do projeto</label><input id="cl-url" placeholder="https://xxxx.supabase.co"></div>
          <div class="field"><label>Chave anon (public)</label><input id="cl-key" placeholder="eyJhbGciOi…"><span class="hint">Settings → API → anon public. Nunca use a service_role aqui.</span></div>
        </div>
        <button class="btn primary" onclick="conectarNuvem()">Conectar à nuvem</button></div></div>`;
  } else if(empresa){
    cloudCard=`<div class="card" style="grid-column:1/-1"><div class="card-h"><h3>☁️ Modo nuvem</h3><span class="tag f">conectado</span></div>
      <div class="card-b">
        <p style="margin-bottom:10px"><b>${esc(empresa.nome||'')}</b> · usuário <b>${esc(sessao&&sessao.user?sessao.user.email:'')}</b> (${esc(empresa.papel||'')})</p>
        <p class="subtle" style="margin-bottom:12px">Código de convite da empresa — compartilhe com funcionários para que criem conta e entrem nesta mesma base: <b style="color:var(--ink);font-size:15px;letter-spacing:.06em">${esc(empresa.codigo_convite||'—')}</b></p>
        <button class="btn" onclick="sairConta()">Sair da conta</button>
        <button class="btn danger" onclick="desconectarNuvem()">Desconectar deste navegador</button></div></div>`;
  } else {
    cloudCard=`<div class="card" style="grid-column:1/-1"><div class="card-h"><h3>☁️ Modo nuvem</h3><span class="tag warn">projeto configurado — aguardando login</span></div>
      <div class="card-b"><button class="btn primary" onclick="showAuth('login')">Fazer login</button>
        <button class="btn danger" onclick="desconectarNuvem()">Desconectar deste navegador</button></div></div>`;
  }
  return header('Dados & Backup','#6E7468',cfg?'Modo nuvem: dados no Supabase, sincronizados em tempo real.':'Seus dados ficam salvos neste navegador. Exporte um backup em JSON regularmente.')+
  `<div class="grid g2">${cloudCard}
    <div class="card"><div class="card-h"><h3>Backup</h3></div><div class="card-b">
      <p class="subtle" style="margin-bottom:12px">Baixa um arquivo JSON com todos os itens, composições, movimentações, pedidos, financeiro e eventos.</p>
      <button class="btn primary" onclick="exportarJSON()">⬇ Exportar backup (JSON)</button></div></div>
    <div class="card"><div class="card-h"><h3>Restaurar</h3></div><div class="card-b">
      <p class="subtle" style="margin-bottom:12px">Substitui os dados atuais pelo conteúdo de um backup exportado anteriormente.</p>
      <input type="file" id="imp-file" accept="application/json" style="margin-bottom:10px">
      <button class="btn" onclick="importarJSON()">⬆ Importar backup</button></div></div>
    <div class="card"><div class="card-h"><h3>Dados de exemplo</h3></div><div class="card-b">
      <p class="subtle" style="margin-bottom:12px">Carrega o exemplo do diagrama (Marmita G = arroz branco + frango desfiado + feijão + embalagem 700 ml + etiqueta), com composições encadeadas.</p>
      <button class="btn" onclick="carregarExemplo()">Carregar exemplo Marmitaria</button></div></div>
    <div class="card"><div class="card-h"><h3>Zerar sistema</h3></div><div class="card-b">
      <p class="subtle" style="margin-bottom:12px">Apaga todos os dados deste navegador. Exporte um backup antes.</p>
      <button class="btn danger" onclick="zerarTudo()">Apagar todos os dados</button></div></div>
  </div>`;
};
function exportarJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='food-erp-backup-'+hoje()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('Backup exportado.');
}
function importarJSON(){
  const f=$('#imp-file').files[0]; if(!f)return toast('Selecione um arquivo de backup.',true);
  const r=new FileReader();
  r.onload=()=>{ try{ const p=JSON.parse(r.result);
      if(!p.itens)throw new Error('formato inválido');
      S=Object.assign({empresa:{nome:'Meu Restaurante'},itens:[],composicoes:[],movimentos:[],compras:[],producoes:[],pedidos:[],lancamentos:[],eventos:[],seq:{}},p);
      persist(); render(); toast('Backup restaurado.');
    }catch(e){ toast('Arquivo inválido: '+e.message,true); } };
  r.readAsText(f);
}
async function zerarTudo(){
  if(!confirm('Apagar TODOS os dados? Esta ação não pode ser desfeita.'))return;
  S=Object.assign(S,{itens:[],composicoes:[],movimentos:[],compras:[],producoes:[],pedidos:[],lancamentos:[],eventos:[],seq:{}});
  await persist(); render(); toast('Sistema zerado.');
}

/* ---------- Exemplo (espelha o diagrama) ---------- */
function carregarExemplo(){
  if(S.itens.length&&!confirm('Isto substitui os dados atuais pelo exemplo. Continuar?'))return;
  S={empresa:{nome:'Marmitaria Exemplo'},itens:[],composicoes:[],movimentos:[],compras:[],producoes:[],pedidos:[],lancamentos:[],eventos:[],seq:{}};
  const novo=(nome,un,funcoes,extra)=>{ const id=uid('ITM');
    S.itens.push(Object.assign({id,nome,categoria:'',unidade_base:un,funcoes,ativo:true,preco_venda:null,estoque_minimo:0,observacao:'',criado_em:new Date().toISOString()},extra||{})); return id; };
  const arrozCru = novo('Arroz cru','g',['compravel','estocavel','composto'],{categoria:'Insumo',estoque_minimo:2000});
  const oleo     = novo('Óleo','ml',['compravel','estocavel','composto'],{categoria:'Insumo',estoque_minimo:500});
  const alho     = novo('Alho','g',['compravel','estocavel','composto'],{categoria:'Insumo'});
  const sal      = novo('Sal','g',['compravel','estocavel','composto'],{categoria:'Insumo'});
  const agua     = novo('Água','ml',['composto'],{categoria:'Insumo'});
  const frangoIn = novo('Peito de frango cru','g',['compravel','estocavel','composto'],{categoria:'Insumo',estoque_minimo:1000});
  const feijaoIn = novo('Feijão cru','g',['compravel','estocavel','composto'],{categoria:'Insumo',estoque_minimo:1000});
  const arrozBr  = novo('Arroz branco (pré-preparo)','g',['produzivel','estocavel','composto'],{categoria:'Pré-preparo'});
  const frangoD  = novo('Frango desfiado (pré-preparo)','g',['produzivel','estocavel','composto'],{categoria:'Pré-preparo'});
  const feijaoC  = novo('Feijão cozido (pré-preparo)','g',['produzivel','estocavel','composto'],{categoria:'Pré-preparo'});
  const emb700   = novo('Embalagem 700 ml','un',['compravel','estocavel','embalagem','composto'],{categoria:'Embalagem',estoque_minimo:50});
  const etiqueta = novo('Etiqueta','un',['compravel','estocavel','embalagem','composto'],{categoria:'Embalagem',estoque_minimo:50});
  const marmitaG = novo('Marmita G','un',['produzivel','estocavel','vendavel'],{categoria:'Produto',preco_venda:22.00,estoque_minimo:5});
  const entrega  = novo('Taxa de entrega','un',['vendavel','servico'],{categoria:'Serviço',preco_venda:6.00});
  const comp=(pai,filho,q,perda)=>{ const f=itemById(filho);
    S.composicoes.push({id:uid('CMP'),item_pai_id:pai,item_filho_id:filho,quantidade:q,unidade:f.unidade_base,perda_percentual:perda||0,ativo:true,criado_em:new Date().toISOString()}); };
  // Arroz branco (por 100 g prontos): 80 g cru, 3 ml óleo, 2 g alho, 1 g sal, 160 ml água → normalizado por g
  comp(arrozBr,arrozCru,0.8); comp(arrozBr,oleo,0.03); comp(arrozBr,alho,0.02); comp(arrozBr,sal,0.01); comp(arrozBr,agua,1.6);
  comp(frangoD,frangoIn,1.35); comp(frangoD,sal,0.01);
  comp(feijaoC,feijaoIn,0.5); comp(feijaoC,sal,0.01); comp(feijaoC,agua,1.5);
  comp(marmitaG,arrozBr,150); comp(marmitaG,frangoD,120); comp(marmitaG,feijaoC,100); comp(marmitaG,emb700,1); comp(marmitaG,etiqueta,1);
  registrarEvento('ITEM_CRIADO','Base de exemplo criada: 14 itens e composições encadeadas (Marmita G → pré-preparos → insumos)');
  persist(); nav('itens'); toast('Exemplo carregado! Registre uma compra para dar entrada nos insumos.');
}

/* ---------- Navegação e inicialização ---------- */
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>nav(b.dataset.view)));
/* inicialização movida para o módulo de nuvem (último bloco do arquivo) */
</script>
<script>
'use strict';
/* ================= MÓDULO NUVEM (Supabase) =================
   Sincronização por diferença: compara o estado atual com o último
   snapshot sincronizado e envia apenas inserções/alterações/remoções.
   Realtime aplica mudanças de outros usuários/dispositivos ao vivo. */
const CFG_KEY='food-erp-cloud-cfg';
const TABLES=['itens','composicoes','movimentos','compras','producoes','pedidos','lancamentos','eventos'];
var sb=null, sessao=null, empresa=null, snapshot=null;
let rtChan=null, rtTimer=null, syncing=false, syncPendente=false;

function cloudCfg(){ try{const c=JSON.parse(localStorage.getItem(CFG_KEY)); return (c&&c.url&&c.key)?c:null;}catch(e){return null;} }
function conectarNuvem(){
  const url=$('#cl-url').value.trim(), key=$('#cl-key').value.trim();
  if(!/^https:\/\/.+supabase\.co\/?$/.test(url))return toast('URL inválida — formato: https://xxxx.supabase.co',true);
  if(key.length<40)return toast('Chave anon inválida.',true);
  localStorage.setItem(CFG_KEY,JSON.stringify({url:url.replace(/\/$/,''),key}));
  toast('Configuração salva. Recarregando…'); setTimeout(()=>location.reload(),700);
}
function desconectarNuvem(){
  if(!confirm('Desconectar deste navegador? Os dados continuam no Supabase; este navegador volta ao modo local (vazio).'))return;
  localStorage.removeItem(CFG_KEY); location.reload();
}
async function sairConta(){ if(sb)await sb.auth.signOut(); location.reload(); }
function setSync(txt,cor){ const el=$('#sync-status'); if(el)el.innerHTML='<b style="color:'+cor+'">●</b> '+txt; }

/* ---------- Autenticação ---------- */
function showAuth(step){
  const c=$('#auth-card'); $('#auth').classList.add('open');
  if(step==='login'){
    c.innerHTML=`<div class="logo">🍲</div><h2>Food ERP</h2><div class="sub">Entre com sua conta para acessar os dados da empresa.</div>
      <div id="au-msg" style="display:none"></div>
      <div class="field"><label>E-mail</label><input id="au-email" type="email" autocomplete="email"></div>
      <div class="field"><label>Senha</label><input id="au-senha" type="password" autocomplete="current-password"></div>
      <button class="btn primary" style="width:100%" id="au-btn" onclick="doLogin()">Entrar</button>
      <div class="auth-alt">Primeira vez? <a class="link" onclick="showAuth('signup')">Criar conta</a> · <a class="link" onclick="$('#auth').classList.remove('open')">usar sem login</a></div>`;
  } else if(step==='signup'){
    c.innerHTML=`<div class="logo">🍲</div><h2>Criar conta</h2><div class="sub">Depois de criar a conta você cria a empresa ou entra numa existente com código de convite.</div>
      <div id="au-msg" style="display:none"></div>
      <div class="field"><label>E-mail</label><input id="au-email" type="email"></div>
      <div class="field"><label>Senha (mín. 6 caracteres)</label><input id="au-senha" type="password" autocomplete="new-password"></div>
      <button class="btn primary" style="width:100%" id="au-btn" onclick="doSignup()">Criar conta</button>
      <div class="auth-alt">Já tem conta? <a class="link" onclick="showAuth('login')">Entrar</a></div>`;
  } else if(step==='empresa'){
    c.innerHTML=`<div class="logo">🏪</div><h2>Sua empresa</h2><div class="sub">Crie a empresa (você será admin) ou entre numa existente com o código de convite.</div>
      <div id="au-msg" style="display:none"></div>
      <div class="field"><label>Nome da empresa</label><input id="au-emp" placeholder="ex.: Marmitaria do Henrique"></div>
      <button class="btn primary" style="width:100%" onclick="criarEmp()">Criar empresa</button>
      <div style="margin:16px 0;border-top:1px solid var(--line)"></div>
      <div class="field"><label>Código de convite</label><input id="au-cod" placeholder="ex.: A1B2C3D4" style="text-transform:uppercase"></div>
      <button class="btn" style="width:100%" onclick="entrarEmp()">Entrar com convite</button>
      <div class="auth-alt"><a class="link" onclick="sairConta()">Sair e entrar com outra conta</a></div>`;
  }
  setTimeout(()=>{const f=c.querySelector('input'); if(f)f.focus();},60);
}
var _authEmail='';
function authMsg(html,tipo){ const el=$('#au-msg'); if(!el)return toast(html.replace(/<[^>]+>/g,' '),tipo!=='ok');
  el.style.display='block'; el.className='auth-msg'+(tipo==='ok'?' ok':''); el.innerHTML=html; }
const DICA_CONFIRM='No painel do Supabase: <b>Authentication → Sign In / Providers → Email</b>, desative <b>"Confirm email"</b> e salve. Depois apague o usuário pendente em <b>Authentication → Users</b> e crie a conta de novo aqui — entra na hora, sem depender de e-mail.';
function trAuthErro(m){ m=String(m||'');
  if(/Invalid login credentials/i.test(m))return 'E-mail ou senha incorretos — ou esta conta ainda não foi criada. Se for sua primeira vez, use <b>Criar conta</b>.';
  if(/Email not confirmed/i.test(m))return 'CONFIRM';
  if(/already registered/i.test(m))return 'Este e-mail já tem conta. Volte para <b>Entrar</b>. Se o login disser que o e-mail não foi confirmado, siga a dica que aparecerá.';
  if(/at least 6|Password should/i.test(m))return 'A senha precisa ter no mínimo 6 caracteres.';
  if(/[Ss]ignups not allowed|signup.*disabled/i.test(m))return 'O cadastro está desativado no projeto. No Supabase, em Authentication, ative <b>"Allow new users to sign up"</b>.';
  if(/rate limit|Too many/i.test(m))return 'Limite de envios de e-mail do Supabase atingido. '+DICA_CONFIRM;
  if(/Failed to fetch|NetworkError|fetch failed/i.test(m))return 'Não consegui falar com o Supabase — confira a URL do projeto e a chave anon em Dados & Backup, e sua conexão.';
  return esc(m); }
async function doLogin(){
  const email=$('#au-email').value.trim(), pass=$('#au-senha').value; _authEmail=email;
  if(!email||!pass)return authMsg('Preencha e-mail e senha.');
  const b=$('#au-btn'); b.disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  b.disabled=false;
  if(error){ const t=trAuthErro(error.message);
    if(t==='CONFIRM')return authMsg('Sua conta existe, mas o e-mail ainda não foi confirmado — e o e-mail do Supabase muitas vezes não chega. <a class="link" onclick="reenviarConf()">Reenviar e-mail de confirmação</a><br><br>Solução definitiva: '+DICA_CONFIRM);
    return authMsg(t); }
  sessao=data.session; await afterLogin();
}
async function doSignup(){
  const email=$('#au-email').value.trim(), pass=$('#au-senha').value; _authEmail=email;
  if(!email||!pass)return authMsg('Preencha e-mail e senha.');
  const b=$('#au-btn'); b.disabled=true;
  const {data,error}=await sb.auth.signUp({email,password:pass});
  b.disabled=false;
  if(error)return authMsg(trAuthErro(error.message));
  if(!data.session)return authMsg('Conta criada! Enviamos um e-mail de confirmação para <b>'+esc(email)+'</b> — verifique também o spam. Se não chegar em alguns minutos: '+DICA_CONFIRM,'ok');
  sessao=data.session; await afterLogin();
}
async function reenviarConf(){
  if(!_authEmail)return;
  const {error}=await sb.auth.resend({type:'signup',email:_authEmail});
  authMsg(error?trAuthErro(error.message):'E-mail de confirmação reenviado para <b>'+esc(_authEmail)+'</b>. Verifique o spam. Se não chegar: '+DICA_CONFIRM,error?'':'ok');
}
async function criarEmp(){
  const {data,error}=await sb.rpc('erp_criar_empresa',{p_nome:$('#au-emp').value.trim()});
  if(error){
    if(/erp_membros_user_id_fkey|foreign key/i.test(error.message))
      return authMsg('Sua sessão pertence a um usuário apagado do projeto. <a class="link" onclick="sairConta()">Sair e entrar de novo</a> com a conta atual resolve.');
    return authMsg(/function.*does not exist|Could not find/i.test(error.message)?'O script <b>supabase-setup.sql</b> ainda não foi executado neste projeto (função não encontrada). Rode o script no SQL Editor e tente de novo.':esc(error.message));
  }
  await afterLogin();
}
async function entrarEmp(){
  const {data,error}=await sb.rpc('erp_entrar_empresa',{p_codigo:$('#au-cod').value.trim()});
  if(error)return authMsg(/inválido|invalid/i.test(error.message)?'Código de convite inválido — confira com quem criou a empresa (aparece em Dados &amp; Backup).':esc(error.message));
  await afterLogin();
}
async function afterLogin(){
  // valida a sessão no servidor: usuário apagado no painel deixa sessão "fantasma" no navegador
  const chk=await sb.auth.getUser();
  if(chk.error||!chk.data||!chk.data.user){
    await sb.auth.signOut();
    showAuth('login');
    authMsg('Sua sessão anterior pertencia a um usuário que não existe mais (foi apagado no painel). Entre de novo — ou crie a conta, se ainda não criou.');
    return;
  }
  sessao={user:chk.data.user};
  const {data,error}=await sb.rpc('erp_minha_empresa');
  if(error)return toast('Erro ao carregar empresa: '+error.message,true);
  if(!data||!data.empresa_id){ showAuth('empresa'); return; }
  empresa=data;
  await entrarNoSistema();
}

/* ---------- Carga, sincronização e tempo real ---------- */
async function entrarNoSistema(){
  $('#auth').classList.remove('open');
  setSync('carregando dados…','#E0A63C');
  try{ await cloudLoad(); }catch(e){ setSync('erro ao carregar','#E08A7E'); return toast('Erro ao carregar dados: '+(e.message||e),true); }
  // migração de dados locais para uma empresa vazia
  if(TABLES.every(t=>!S[t].length)){
    let raw=null; try{raw=localStorage.getItem(STORE_KEY);}catch(e){}
    if(raw){ try{ const p=JSON.parse(raw);
      if(p.itens&&p.itens.length&&confirm('Encontrei dados locais neste navegador ('+p.itens.length+' itens). Importar para a nuvem da empresa "'+(empresa.nome||'')+'"?')){
        TABLES.forEach(t=>{ S[t]=p[t]||[]; }); await cloudPersist(); }
    }catch(e){} }
  }
  subscribeRealtime();
  const bar=$('#cloud-bar'); if(bar)bar.style.display='block';
  const ul=$('#user-line'); if(ul)ul.textContent=(sessao&&sessao.user?sessao.user.email:'')+' · '+(empresa.nome||'');
  setSync('sincronizado','#7FBF9B');
  nav('dashboard');
}
async function cloudLoad(){
  snapshot={};
  for(const t of TABLES){
    let q=sb.from('erp_'+t).select('id,dados').eq('empresa_id',empresa.empresa_id);
    if(t==='eventos'||t==='movimentos')q=q.order('atualizado_em',{ascending:false}).limit(t==='eventos'?800:5000);
    const {data,error}=await q; if(error)throw error;
    S[t]=data.map(r=>r.dados);
    snapshot[t]=new Map(data.map(r=>[r.id,JSON.stringify(r.dados)]));
  }
  S.eventos.sort((a,b)=>a.data<b.data?1:-1);
  S.empresa={nome:empresa.nome};
}
async function cloudPersist(){
  if(!sb||!empresa||!snapshot)return;
  if(syncing){ syncPendente=true; return; }
  syncing=true; setSync('sincronizando…','#E0A63C');
  try{
    for(const t of TABLES){
      const cur=new Map(S[t].map(r=>[r.id,JSON.stringify(r)]));
      const prev=snapshot[t];
      const ups=[],dels=[];
      cur.forEach((j,id)=>{ if(prev.get(id)!==j)ups.push({id,empresa_id:empresa.empresa_id,dados:JSON.parse(j),atualizado_em:new Date().toISOString()}); });
      prev.forEach((j,id)=>{ if(!cur.has(id))dels.push(id); });
      if(ups.length){ const {error}=await sb.from('erp_'+t).upsert(ups); if(error)throw error; }
      if(dels.length){ const {error}=await sb.from('erp_'+t).delete().in('id',dels); if(error)throw error; }
      snapshot[t]=cur;
    }
    setSync('sincronizado','#7FBF9B');
  }catch(e){ console.error(e); setSync('erro — tentando de novo…','#E08A7E');
    toast('Erro de sincronização: '+(e.message||e),true); setTimeout(()=>{syncPendente=true; if(!syncing)cloudPersist();},4000); }
  syncing=false;
  if(syncPendente){ syncPendente=false; cloudPersist(); }
}
function subscribeRealtime(){
  if(rtChan)sb.removeChannel(rtChan);
  rtChan=sb.channel('erp-sync-'+empresa.empresa_id);
  TABLES.forEach(t=>{
    rtChan.on('postgres_changes',{event:'*',schema:'public',table:'erp_'+t,filter:'empresa_id=eq.'+empresa.empresa_id},payload=>{
      const map=snapshot[t]; if(!map)return;
      if(payload.eventType==='DELETE'){
        const id=payload.old&&payload.old.id; if(!id||!map.has(id))return;
        map.delete(id); S[t]=S[t].filter(r=>r.id!==id); queueRender(); return;
      }
      const row=payload.new, j=JSON.stringify(row.dados);
      if(map.get(row.id)===j)return; // mudança originada aqui mesmo
      map.set(row.id,j);
      const k=S[t].findIndex(r=>r.id===row.id);
      if(k>=0)S[t][k]=row.dados; else S[t].push(row.dados);
      if(t==='eventos')S.eventos.sort((a,b)=>a.data<b.data?1:-1);
      queueRender();
    });
  });
  rtChan.subscribe();
}
function queueRender(){ clearTimeout(rtTimer);
  rtTimer=setTimeout(()=>{ if(!$('#overlay').classList.contains('open'))render(); },300); }

/* ---------- Inicialização ---------- */
(async function bootstrap(){
  const cfg=cloudCfg();
  if(cfg&&window.supabase){
    sb=window.supabase.createClient(cfg.url,cfg.key);
    nav('dashboard');
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ showAuth('login'); return; }
    sessao=session;
    await afterLogin();
  } else {
    const had=await loadState();
    nav('dashboard');
    if(!had)toast('Bem-vindo! Em "Dados & Backup" você pode carregar o exemplo ou conectar ao Supabase.');
  }
})();
window.addEventListener('beforeunload',()=>{ if(sb&&empresa&&!syncing)cloudPersist(); });
</script>
