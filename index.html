function salvarFuncionario(id){
  const nome=$('#fu-nome').value.trim(); if(!nome)return toast('Informe o nome.',true);
  const d={nome,cargo:$('#fu-cargo').value.trim(),cpf:$('#fu-cpf').value.trim(),telefone:$('#fu-tel').value.trim(),
    tipo_contrato:$('#fu-tipo').value,salario_mensal:parseFloat($('#fu-sal').value)||null,
    dia_pagamento:parseInt($('#fu-dia').value)||null,data_admissao:$('#fu-adm').value||null,
    endereco:$('#fu-end').value.trim(),observacao:$('#fu-obs').value.trim(),atualizado_em:new Date().toISOString()};
  if(id){ Object.assign(funcById(id),d); registrarEvento('FUNCIONARIO_ATUALIZADO',nome+' atualizado',id); }
  else{ const nid=uid('FUN'); S.funcionarios.push(Object.assign({id:nid,ativo:true,criado_em:new Date().toISOString()},d));
    registrarEvento('FUNCIONARIO_CRIADO',nome+' cadastrado'+(d.cargo?' ('+d.cargo+')':''),nid); }
  closeModal(); scheduleSave(); render(); toast('Funcionário salvo.');
}
function desligarFuncionario(id){
  const f=funcById(id);
  if(f.ativo===false){ f.ativo=true; f.data_desligamento=null;
    registrarEvento('FUNCIONARIO_ATUALIZADO',f.nome+' reativado',id); }
  else{ if(!confirm('Desligar '+f.nome+'? O cadastro e o histórico são preservados.'))return;
    f.ativo=false; f.data_desligamento=hoje();
    registrarEvento('FUNCIONARIO_ATUALIZADO',f.nome+' desligado em '+dBR(f.data_desligamento),id); }
  closeModal(); scheduleSave(); render();
}
function modalVale(fid){
  garantirFormasPadrao(); const f=funcById(fid);
  openModal(`<div class="m-h"><h3>Vale / adiantamento — ${esc(f.nome)}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <p class="subtle" style="margin-bottom:12px">O vale sai do caixa agora e fica em aberto para ser descontado automaticamente no próximo pagamento.</p>
    <div class="frow c3">
      <div class="field"><label>Valor (R$) *</label><input id="va-valor" type="number" step="0.01" min="0"></div>
      <div class="field"><label>Data</label><input id="va-data" type="date" value="${hoje()}"></div>
      <div class="field"><label>Forma</label><select id="va-forma">${S.formas.filter(x=>x.ativo!==false).map(x=>`<option value="${x.id}">${esc(x.nome)}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Descrição</label><input id="va-desc" placeholder="ex.: adiantamento quinzenal"></div>
  </div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarVale('${fid}')">Registrar vale</button></div>`);
}
function salvarVale(fid){
  const v=parseFloat($('#va-valor').value); if(!v||v<=0)return toast('Informe o valor.',true);
  const f=funcById(fid), data=$('#va-data').value||hoje(), desc=$('#va-desc').value.trim()||'Vale', mid=uid('FMV');
  S.funcionarios_mov.push({id:mid,funcionario_id:fid,tipo:'vale',valor:v,descricao:desc,status:'aberto',
    forma_id:$('#va-forma').value,data,criado_em:new Date().toISOString()});
  S.lancamentos.push({id:uid('LAN'),tipo:'despesa',descricao:'Vale — '+f.nome+' ('+desc+')',valor:v,categoria:'Vales',
    forma_id:$('#va-forma').value,data,status:'liquidado',data_liquidacao:data,origem:mid});
  registrarEvento('VALE_FUNCIONARIO',f.nome+' · '+money(v)+' — saiu do caixa, a descontar no salário',mid);
  closeModal(); scheduleSave(); render(); toast('Vale registrado.');
}
function modalPagamentoFunc(fid){
  garantirFormasPadrao(); const f=funcById(fid);
  const vales=valesAbertos(fid);
  const valesHtml=vales.length?vales.map(v=>`<label class="check on" style="margin-bottom:6px">
    <input type="checkbox" name="pg-vale" value="${v.id}" checked onchange="this.closest('.check').classList.toggle('on',this.checked);calcLiquido()">
    <span><b>${money(v.valor)}</b><small>${esc(v.descricao)} · ${dBR(v.data)}</small></span></label>`).join(''):
    '<span class="subtle">Nenhum vale em aberto.</span>';
  openModal(`<div class="m-h"><h3>Pagamento — ${esc(f.nome)}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <div class="frow c3">
      <div class="field"><label>Valor bruto (R$) *</label><input id="pg-bruto" type="number" step="0.01" min="0" value="${f.salario_mensal||''}" oninput="calcLiquido()"></div>
      <div class="field"><label>Referência</label><input id="pg-ref" placeholder="ex.: salário julho/2026" value="salário ${new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}"></div>
      <div class="field"><label>Forma</label><select id="pg-forma">${S.formas.filter(x=>x.ativo!==false).map(x=>`<option value="${x.id}">${esc(x.nome)}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Vales a descontar</label>${valesHtml}</div>
    <p class="num" style="font-size:15px" id="pg-liquido"></p>
  </div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarPagamentoFunc('${fid}')">Confirmar pagamento</button></div>`,true);
  calcLiquido();
}
function calcLiquido(){
  const bruto=parseFloat($('#pg-bruto').value)||0;
  const desc=[...document.querySelectorAll('input[name=pg-vale]:checked')]
    .reduce((a,c)=>{ const v=S.funcionarios_mov.find(m=>m.id===c.value); return a+(v?v.valor:0); },0);
  const el=$('#pg-liquido'); if(el)el.innerHTML='Líquido a pagar agora: <b>'+money(Math.max(0,bruto-desc))+'</b>'+(desc?' <span class="subtle">('+money(bruto)+' bruto − '+money(desc)+' em vales)</span>':'');
}
function salvarPagamentoFunc(fid){
  const bruto=parseFloat($('#pg-bruto').value); if(!bruto||bruto<=0)return toast('Informe o valor bruto.',true);
  const f=funcById(fid), ref=$('#pg-ref').value.trim()||'Pagamento', data=hoje();
  const valesIds=[...document.querySelectorAll('input[name=pg-vale]:checked')].map(c=>c.value);
  const descTot=valesIds.reduce((a,id)=>{ const v=S.funcionarios_mov.find(m=>m.id===id); return a+(v?v.valor:0); },0);
  if(descTot>bruto&&!confirm('Os vales ('+money(descTot)+') superam o bruto. Continuar? O líquido será zero e a diferença fica sem desconto.'))return;
  const liquido=Math.max(0,bruto-descTot), mid=uid('FMV');
  valesIds.forEach(id=>{ const v=S.funcionarios_mov.find(m=>m.id===id); if(v){ v.status='descontado'; v.pagamento_id=mid; } });
  S.funcionarios_mov.push({id:mid,funcionario_id:fid,tipo:'pagamento',valor:bruto,valor_liquido:liquido,
    vales_abatidos:valesIds,descricao:ref,forma_id:$('#pg-forma').value,data,criado_em:new Date().toISOString()});
  if(liquido>0)S.lancamentos.push({id:uid('LAN'),tipo:'despesa',descricao:'Folha — '+f.nome+' ('+ref+')',valor:liquido,
    categoria:'Folha de pagamento',forma_id:$('#pg-forma').value,data,status:'liquidado',data_liquidacao:data,origem:mid});
  registrarEvento('PAGAMENTO_FUNCIONARIO',f.nome+' · bruto '+money(bruto)+(descTot?' − vales '+money(descTot):'')+' = líquido '+money(liquido),mid);
  closeModal(); scheduleSave(); render(); toast('Pagamento registrado.');
}
function modalExtratoFunc(fid){
  const f=funcById(fid);
  const movs=S.funcionarios_mov.filter(m=>m.funcionario_id===fid).slice().reverse();
  const rows=movs.map(m=>`<tr>
    <td>${m.tipo==='vale'?(m.status==='aberto'?'<span class="tag warn">vale aberto</span>':'<span class="tag mut">vale descontado</span>'):'<span class="tag f">pagamento</span>'}</td>
    <td>${esc(m.descricao)}<div class="mono-id">${dBR(m.data)}${m.forma_id&&formaById(m.forma_id)?' · '+esc(formaById(m.forma_id).nome):''}</div></td>
    <td class="r num">${m.tipo==='pagamento'?money(m.valor)+(m.valor_liquido!==m.valor?'<div class="subtle" style="font-weight:400">líq. '+money(m.valor_liquido)+'</div>':''):money(m.valor)}</td></tr>`).join('')||
    '<tr><td colspan="3" class="empty">Sem movimentações.</td></tr>';
  openModal(`<div class="m-h"><h3>Extrato — ${esc(f.nome)}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b"><table><tbody>${rows}</tbody></table></div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Fechar</button></div>`,true);
}

const TIPOS_CANAL={ifood:'iFood','99food':'99Food',aiqfome:'aiqfome',outro:'Outro / hub'};
VIEWS.integracoes=function(){
  const cfg=cloudCfg();
  const rows=S.canais.map(c=>{
    const pedidos=S.pedidos.filter(p=>p.canal_id===c.id);
    const tot=pedidos.filter(p=>['entregue','finalizado'].includes(p.status)).reduce((a,p)=>a+p.valor_total,0);
    return `<tr style="${c.ativo===false?'opacity:.45':''}">
      <td><b>${esc(c.nome)}</b> <span class="tag info">${TIPOS_CANAL[c.tipo]||c.tipo}</span>

      <td class="r num">${c.taxa_percentual?c.taxa_percentual+'%':'—'}</td>
      <td class="r num">${pedidos.length||'—'}</td>
      <td class="r num">${tot?money(tot):'—'}</td>
      <td class="r"><button class="btn sm" onclick="modalCanal('${c.id}')">Editar</button></td></tr>`;
  }).join('')||`<tr><td colspan="5"><div class="empty"><b>Nenhum canal cadastrado</b>Cadastre iFood, 99Food, aiqfome ou outro canal para receber pedidos com comissão e repasse controlados.</div></td></tr>`;

  const canaisAtivos=S.canais.filter(c=>c.ativo!==false);
  const vendaveis=S.itens.filter(i=>i.ativo!==false&&temFuncao(i,'vendavel'));
  const mapa=canaisAtivos.length&&vendaveis.length?`<div class="card section-gap"><div class="card-h"><h3>Mapeamento de produtos (código externo por canal)</h3>
      <span class="subtle">o código que identifica cada produto no cardápio do canal — usado para casar pedidos automáticos</span></div>
    <table><thead><tr><th>Produto</th>${canaisAtivos.map(c=>`<th>${esc(c.nome)}</th>`).join('')}</tr></thead><tbody>
    ${vendaveis.map(i=>`<tr><td><b>${esc(i.nome)}</b><div class="mono-id">${i.id}</div></td>
      ${canaisAtivos.map(c=>`<td><input style="width:130px;padding:6px 9px;border:1px solid var(--line);border-radius:7px;background:var(--input-bg,#FDFCF9)"
        value="${esc((i.codigos_canais||{})[c.id]||'')}" placeholder="código"
        onchange="salvarCodigoCanal('${i.id}','${c.id}',this.value)"></td>`).join('')}</tr>`).join('')}
    </tbody></table></div>`:'';

  const urlBase=cfg?cfg.url:'https://SEU-PROJETO.supabase.co';
  const conector=`<div class="card section-gap"><div class="card-h"><h3>Conectores (Supabase Edge Functions)</h3>
      <span class="tag ${cfg?'f':'warn'}">${cfg?'modo nuvem ativo':'requer modo nuvem'}</span></div>
    <div class="card-b">
      <p class="subtle" style="margin-bottom:10px">Os pedidos dos apps chegam por funções no seu Supabase (as credenciais das plataformas ficam lá, nunca no navegador) e caem aqui em tempo real, já no fluxo Pedido → Entregue. Dois conectores acompanham o sistema:</p>
      <p style="margin-bottom:8px"><b>1. Webhook genérico</b> (99Food/aiqfome/hubs · padrão Open Delivery) — endpoint que recebe pedidos:<br>
        <code style="background:var(--soft);padding:3px 8px;border-radius:6px;font-size:12px;word-break:break-all">${esc(urlBase)}/functions/v1/webhook-pedidos?canal=ID_DO_CANAL&token=SEU_SEGREDO</code></p>
      <p style="margin-bottom:8px"><b>2. Polling iFood</b> — busca eventos na Merchant API a cada minuto, importa e confirma pedidos.</p>
      <p class="subtle">A instalação (arquivos, segredos e agendamento) está no guia <b>integracoes-guia.md</b> que acompanha esta versão.</p>
    </div></div>`;

  return header('Integrações','var(--m-integracoes)','Canais de venda: cardápio mapeado, pedidos recebidos, comissões e repasses controlados.',
    `<button class="btn primary" onclick="modalCanal()">+ Novo canal</button>`)+
  `<div class="card"><table><thead><tr><th>Canal</th><th class="r">Comissão</th><th class="r">Pedidos</th><th class="r">Faturado</th><th class="r"></th></tr></thead><tbody>${rows}</tbody></table></div>`+mapa+conector;
};
function salvarCodigoCanal(itemId,canalId,valor){

function salvarCanal(id){
  const nome=$('#ca-nome').value.trim(); if(!nome)return toast('Informe o nome.',true);

VIEWS.margens=function(){
  const vend=S.itens.filter(i=>i.ativo!==false&&temFuncao(i,'vendavel'));
  const cfPorUnidade=custoFixoPorUnidade();
  const ini=Date.now()-30*864e5;
  let totRec=0, totCmv=0, totFixo=0;
  const rows=vend.map(i=>{
    const cmv=custoItem(i.id), pv=i.preco_venda;
    const cf=cfPorUnidade*(i.unidades_equivalentes||1);
    const custoTotal=cmv!=null?cmv+cf:null;
    const margem=(pv!=null&&custoTotal!=null)?pv-custoTotal:null;
    const mp=(margem!=null&&pv)?margem/pv*100:null;
    let q30=0, rec30=0, cmv30=0, temCmv=false;
    S.pedidos.filter(p=>['entregue','finalizado'].includes(p.status)&&p.data_entrega&&new Date(p.data_entrega+'T12:00:00').getTime()>=ini)
      .forEach(p=>p.itens.filter(l=>l.item_id===i.id).forEach(l=>{
        q30+=l.quantidade; rec30+=l.quantidade*l.preco_unitario;
        const cu=(l.cmv_unitario!=null)?l.cmv_unitario:cmv;
        if(cu!=null){ temCmv=true; cmv30+=(cu+cf)*l.quantidade; } }));
    totRec+=rec30; totCmv+=temCmv?cmv30:0; totFixo+=q30*cf;
    const mtag=mp==null?'':(mp<0?'<span class="tag bad">'+Math.round(mp)+'%</span>':(mp<30?'<span class="tag warn">'+Math.round(mp)+'%</span>':'<span class="tag f">'+Math.round(mp)+'%</span>'));
    return `<tr><td><b>${esc(i.nome)}</b></td>
      <td class="r num">${pv!=null?money(pv):'—'}</td>
      <td class="r num">${cmv!=null?money(cmv):'—'}</td>
      <td class="r num">${cf?money(cf):'—'}</td>
      <td class="r num ${margem!=null&&margem<0?'neg':'pos'}">${margem!=null?money(margem):'—'}</td>
      <td class="r">${mtag||'—'}</td>
      <td class="r num">${q30?q30.toLocaleString('pt-BR'):'—'}</td>
      <td class="r num">${q30?money(rec30):'—'}</td>
      <td class="r num">${q30&&temCmv?money(rec30-cmv30):'—'}</td></tr>`;
  }).join('')||`<tr><td colspan="9"><div class="empty"><b>Nenhum item vendável</b>Marque a função Vendável e informe o preço de venda para acompanhar margens.</div></td></tr>`;
  const resumo=totRec?`Receita 30 d: <b class="num">${money(totRec)}</b> · CMV+fixo: <b class="num">${money(totCmv)}</b> · Margem: <b class="num">${money(totRec-totCmv)} (${Math.round((totRec-totCmv)/totRec*100)}%)</b>`:'Sem vendas nos últimos 30 dias.';
  return header('Margens por produto','var(--m-margens)','Custo total = CMV (matéria-prima, fotografado na entrega) + custo fixo rateado (definido em Custos Fixos).')+
  `<div class="card"><div class="card-h"><h3>Margem por item vendável</h3><span class="subtle">${resumo}</span></div>
    <table><thead><tr><th>Item</th><th class="r">Preço</th><th class="r">CMV</th><th class="r">Custo fixo</th><th class="r">Margem un.</th><th class="r">Margem %</th><th class="r">Vendidos 30 d</th><th class="r">Receita 30 d</th><th class="r">Margem 30 d</th></tr></thead><tbody>${rows}</tbody></table></div>`;
};

let relPeriodo='30d', relDataIni='', relDataFim='';
function relIntervalo(){
  const hj=hoje();
  const d=(n)=>{ const x=new Date(); x.setDate(x.getDate()-n); return x.toISOString().slice(0,10); };
  if(relPeriodo==='7d')return {ini:d(6),fim:hj,label:'últimos 7 dias'};
  if(relPeriodo==='30d')return {ini:d(29),fim:hj,label:'últimos 30 dias'};
  if(relPeriodo==='90d')return {ini:d(89),fim:hj,label:'últimos 90 dias'};
  if(relPeriodo==='mes'){ const p=hj.slice(0,7); return {ini:p+'-01',fim:hj,label:'este mês'}; }
  if(relPeriodo==='mespassado'){ const dt=new Date(); dt.setDate(1); dt.setMonth(dt.getMonth()-1);
    const p=dt.toISOString().slice(0,7); const ult=new Date(dt.getFullYear(),dt.getMonth()+1,0).toISOString().slice(0,10);
    return {ini:p+'-01',fim:ult,label:'mês passado'}; }
  if(relPeriodo==='ano')return {ini:hj.slice(0,4)+'-01-01',fim:hj,label:'este ano'};
  if(relPeriodo==='tudo')return {ini:'2000-01-01',fim:hj,label:'todo o período'};
  return {ini:relDataIni||d(29),fim:relDataFim||hj,label:'período selecionado'};
}
/* ---------- Carteira de clientes: frequência pessoal + curva ABC (histórico completo, não depende do período do relatório) ---------- */
function analisarCarteiraClientes(){
  const porCli={};
  S.pedidos.filter(p=>['entregue','finalizado'].includes(p.status)&&p.data_entrega).forEach(p=>{
    const chave=p.cliente_id||p.cliente||'—';
    const c=porCli[chave]||(porCli[chave]={chave,nome:nomeProprio(p.cliente||(clienteById(p.cliente_id)||{}).nome||'Cliente avulso'),datas:[],receita:0});
    c.datas.push(p.data_entrega); c.receita+=p.valor_total||0;
  });
  const lista=Object.values(porCli).map(c=>{
    c.datas.sort();
    c.n=c.datas.length;
    c.primeira=c.datas[0]; c.ultima=c.datas[c.datas.length-1];
    c.intervalo = c.n>=2 ? (new Date(c.ultima+'T12:00:00')-new Date(c.primeira+'T12:00:00'))/864e5/(c.n-1) : null;
    c.diasSemComprar = Math.floor((Date.now()-new Date(c.ultima+'T12:00:00').getTime())/864e5);
    c.ticketMedio = c.receita/c.n;
    return c;
  });
  // intervalo típico do negócio, pra servir de referência a clientes com só 1 pedido
  const comIntervalo=lista.filter(c=>c.intervalo!=null&&c.intervalo>0);
  const intervaloGlobal = comIntervalo.length ? comIntervalo.reduce((a,c)=>a+c.intervalo,0)/comIntervalo.length : 30;
  lista.forEach(c=>{
    const intervaloUsado=Math.max(c.intervalo||intervaloGlobal,1);
    const ratio=c.diasSemComprar/intervaloUsado;
    c.status = ratio<=1?'ativo':ratio<=2?'atencao':ratio<=3?'risco':'inativo';
  });
  // curva ABC (80/95/100) por receita
  lista.sort((a,b)=>b.receita-a.receita);
  const totalReceita=lista.reduce((a,c)=>a+c.receita,0)||1;
  let acumulado=0;
  lista.forEach(c=>{ acumulado+=c.receita; const pct=acumulado/totalReceita;
    c.classe = pct<=0.80?'A':pct<=0.95?'B':'C'; });
  const contagem={ativo:0,atencao:0,risco:0,inativo:0};
  lista.forEach(c=>contagem[c.status]++);
  const inativos=lista.filter(c=>c.status==='inativo');
  const potencialReativacao=inativos.reduce((a,c)=>a+c.ticketMedio,0);
  const campeao=lista[0];
  const maisFiel=[...lista].sort((a,b)=>b.n-a.n)[0];
  const maisAntigo=[...lista].sort((a,b)=>a.primeira>b.primeira?1:-1)[0];
  const maiorTicket=[...lista].filter(c=>c.n>=2).sort((a,b)=>b.ticketMedio-a.ticketMedio)[0];
  return {lista,contagem,inativos,potencialReativacao,campeao,maisFiel,maisAntigo,maiorTicket,total:lista.length};
}

VIEWS.dashboard=VIEWS.relatorios; // Dashboard = página inicial, é o antigo Relatórios
function carteiraHtml(c){
  const STATUS_LABEL={ativo:'Ativo',atencao:'Atenção',risco:'Em risco',inativo:'Inativo'};
  const STATUS_COR={ativo:'#2E6E4E',atencao:'#E0A63C',risco:'#C05E10',inativo:'#B3372C'};
  const STATUS_TAG={ativo:'f',atencao:'warn',risco:'warn',inativo:'bad'};
  const total=c.total||1;
  const segHtml=['ativo','atencao','risco','inativo'].map(k=>{
    const n=c.contagem[k], pct=n/total*100;
    return pct?`<div style="width:${pct}%;background:${STATUS_COR[k]}" title="${STATUS_LABEL[k]}: ${n} (${Math.round(pct)}%)"></div>`:'';
  }).join('');
  const legendaHtml=['ativo','atencao','risco','inativo'].map(k=>
    `<div style="display:flex;align-items:center;gap:6px;font-size:12.5px"><span style="width:9px;height:9px;border-radius:50%;background:${STATUS_COR[k]};display:inline-block"></span>${STATUS_LABEL[k]} <b class="num">${c.contagem[k]}</b> <span class="subtle">(${Math.round(c.contagem[k]/total*100)}%)</span></div>`).join('');
  const destaque=(titulo,cli,valor,ic)=>cli?`<div class="card kpi"><div class="k-label">${ic} ${titulo}</div><div class="k-value" style="font-size:16px">${esc(cli.nome)}</div><div class="k-foot num">${valor}</div></div>`:'';
  const tabela=c.lista.slice(0,15).map(cl=>`<tr><td><b>${esc(cl.nome)}</b></td>
    <td class="r"><span class="tag ${cl.classe==='A'?'f':cl.classe==='B'?'info':'mut'}">${cl.classe}</span></td>
    <td class="r num">${money(cl.receita)}</td><td class="r num">${cl.n}</td><td class="r num">${money(cl.ticketMedio)}</td>
    <td class="r num">${cl.diasSemComprar}d</td><td class="r"><span class="tag ${STATUS_TAG[cl.status]}">${STATUS_LABEL[cl.status]}</span></td></tr>`).join('')
    ||'<tr><td colspan="7"><div class="empty"><b>Sem clientes com histórico ainda</b></div></td></tr>';
  return `<div class="section-gap"><h3 style="margin-bottom:4px">Carteira de clientes</h3><p class="subtle" style="margin-bottom:14px">Histórico completo (não muda com o período acima) — status calculado pelo ritmo de compra de cada cliente, não por um prazo fixo.</p>
  <div class="grid g4">
    ${destaque('Cliente campeão',c.campeao,money(c.campeao?c.campeao.receita:0)+' · '+(c.campeao?c.campeao.n:0)+' pedidos','🏆')}
    ${destaque('Cliente mais fiel',c.maisFiel,(c.maisFiel?c.maisFiel.n:0)+' pedidos','👑')}
    ${destaque('Cliente mais antigo',c.maisAntigo,c.maisAntigo?('desde '+dBR(c.maisAntigo.primeira)):'','📅')}
    ${destaque('Maior ticket médio',c.maiorTicket,c.maiorTicket?money(c.maiorTicket.ticketMedio)+' · '+c.maiorTicket.n+' pedidos':'','💰')}
  </div>
  <div class="grid g2 section-gap">
    <div class="card"><div class="card-h"><h3>Status dos clientes</h3></div><div class="card-b">
      <div style="display:flex;height:14px;border-radius:8px;overflow:hidden;margin-bottom:14px">${segHtml}</div>
      <div style="display:flex;flex-direction:column;gap:8px">${legendaHtml}</div></div></div>
    <div class="card"><div class="card-h"><h3>Clientes inativos</h3></div><div class="card-b">
      <div class="k-value num" style="font-size:28px;color:#B3372C">${c.inativos.length}</div>
      <div class="subtle" style="margin-bottom:10px">clientes sem comprar bem além do ritmo normal deles</div>
      <div style="border-top:1px solid var(--line);padding-top:10px">
        <div class="k-label">Receita potencial de reativação</div>
        <div class="k-value num" style="font-size:22px">${money(c.potencialReativacao)}</div>
        <div class="subtle">soma do ticket médio de cada um, se voltarem a comprar 1x</div>
      </div></div></div>
  </div>
  <div class="card section-gap"><div class="card-h"><h3>Detalhamento dos clientes</h3><span class="subtle">top 15 · classe ABC pela curva de receita (A=80%, B=15%, C=5%)</span></div>
    <div class="card-b" style="padding:0 6px"><table><thead><tr><th>Cliente</th><th class="r">Classe</th><th class="r">Total gasto</th><th class="r">Pedidos</th><th class="r">Ticket médio</th><th class="r">Dias sem comprar</th><th class="r">Status</th></tr></thead><tbody>${tabela}</tbody></table></div></div>
  </div>`;
}
VIEWS.custosfixos=function(){
  const total=custoFixoMensalTotal();
  const cfg=getCustosFixosCfg();
  const sugestao=producaoEstimadaSugerida();
  const producao=cfg.producao_estimada>0?cfg.producao_estimada:sugestao;
  const rate=producao?total/producao:0;
  const rows=(S.custos_fixos||[]).slice().sort((a,b)=>(b.valor_mensal||0)-(a.valor_mensal||0)).map(c=>`<tr style="${c.ativo===false?'opacity:.45':''}">
    <td><b>${esc(c.nome)}</b></td><td class="r num">${money(c.valor_mensal||0)}</td>
    <td class="r"><button class="btn sm" onclick="modalCustoFixo('${c.id}')">Editar</button></td></tr>`).join('')
    ||`<tr><td colspan="3"><div class="empty"><b>Nenhum custo fixo cadastrado</b>Água, luz, internet, aluguel, telefone… tudo que você paga todo mês, mesmo sem vender nada.</div></td></tr>`;
  return header('Custos fixos','var(--m-financeiro)','Rateados por unidade equivalente e somados ao CMV nas telas de Produtos e Margens.',
    `<button class="btn primary" onclick="modalCustoFixo()">+ Custo fixo</button>`)+
  `<div class="grid g3">
    <div class="card kpi"><div class="k-label"><span class="dot" style="background:var(--m-financeiro)"></span>Total mensal</div><div class="k-value num">${money(total)}</div></div>
    <div class="card kpi"><div class="k-label"><span class="dot" style="background:var(--m-producao)"></span>Produção estimada/mês</div><div class="k-value num">${producao?producao.toLocaleString('pt-BR'):'—'}</div><div class="k-foot">${cfg.producao_estimada>0?'definida manualmente':(sugestao?'sugestão automática (média 3 meses)':'sem dados suficientes ainda')}</div></div>
    <div class="card kpi"><div class="k-label"><span class="dot" style="background:var(--primary)"></span>Custo fixo por unidade</div><div class="k-value num">${producao?money(rate):'—'}</div><div class="k-foot">somado ao custo de cada produto conforme suas unidades equivalentes</div></div>
  </div>
  <div class="card section-gap"><div class="card-h"><h3>Produção mensal estimada</h3></div><div class="card-b">
    <p class="subtle" style="margin-bottom:10px">Em unidades equivalentes (uma marmita = 1; um combo de 5 = 5). Deixe em branco para o sistema usar a média dos últimos 3 meses de pedidos entregues${sugestao?' (hoje sugere '+sugestao.toLocaleString('pt-BR')+')':''}.</p>
    <div class="frow c2"><div class="field"><label>Produção manual (opcional)</label><input id="cf-producao" type="number" min="0" step="1" value="${cfg.producao_estimada>0?cfg.producao_estimada:''}" placeholder="${sugestao||'ex.: 2000'}"></div></div>
    <button class="btn primary" onclick="salvarProducaoEstimada()">Salvar</button>
  </div></div>
  <div class="card section-gap"><table><thead><tr><th>Custo fixo</th><th class="r">Valor mensal</th><th class="r"></th></tr></thead><tbody>${rows}</tbody></table></div>`;
};
function modalCustoFixo(id){
  const c=id?(S.custos_fixos||[]).find(x=>x.id===id):null;
  openModal(`<div class="m-h"><h3>${c?'Editar custo fixo':'Novo custo fixo'}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b"><div class="frow c2">
    <div class="field"><label>Nome *</label><input id="cf-nome" value="${c?esc(c.nome):''}" placeholder="ex.: Água, Luz, Internet, Aluguel"></div>
    <div class="field"><label>Valor mensal (R$) *</label><input id="cf-valor" type="number" step="0.01" min="0" value="${c&&c.valor_mensal?c.valor_mensal:''}"></div>
  </div></div>
  <div class="m-f">${c?`<button class="btn ghost" onclick="toggleCustoFixo('${id}')">${c.ativo===false?'Reativar':'Inativar'}</button>`:''}
    <button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarCustoFixo('${id||''}')">Salvar</button></div>`);
}
function salvarCustoFixo(id){
  const nome=$('#cf-nome').value.trim(); if(!nome)return toast('Informe o nome.',true);
  const valor=parseFloat($('#cf-valor').value)||0;
  if(!S.custos_fixos)S.custos_fixos=[];
  if(id){ Object.assign(S.custos_fixos.find(x=>x.id===id),{nome,valor_mensal:valor}); }
  else{ S.custos_fixos.push({id:uid('CFX'),nome,valor_mensal:valor,ativo:true,criado_em:new Date().toISOString()}); }
  closeModal(); scheduleSave(); render(); toast('Custo fixo salvo.');
}
function toggleCustoFixo(id){ const c=(S.custos_fixos||[]).find(x=>x.id===id); if(!c)return; c.ativo=c.ativo===false;
  closeModal(); scheduleSave(); render(); }
function salvarProducaoEstimada(){
  const v=parseFloat($('#cf-producao').value)||0;
  if(!S.config)S.config=[];
  S.config=S.config.filter(x=>x.id!=='custosfixos');
  S.config.push({id:'custosfixos',producao_estimada:v});
  scheduleSave(); render(); toast('Produção estimada salva.');
}

    }catch(e){} }
  }
  if(!S.formas)S.formas=[]; if(!S.clientes)S.clientes=[]; if(!S.clientes_mov)S.clientes_mov=[]; if(!S.config)S.config=[]; if(!S.fornecedores)S.fornecedores=[]; if(!S.canais)S.canais=[]; if(!S.funcionarios)S.funcionarios=[]; if(!S.funcionarios_mov)S.funcionarios_mov=[]; if(!S.categorias)S.categorias=[]; if(!S.custos_fixos)S.custos_fixos=[]; if(!S.status_personalizados)S.status_personalizados=[]; if(!S.perfis_marmita)S.perfis_marmita=[];
  garantirCategoriasPadrao();
  aplicarIdentidade();
  if(!S.formas.length){ garantirFormasPadrao(); cloudPersist(); }
  subscribeRealtime();
  const bar=$('#cloud-bar'); if(bar)bar.style.display='block';
  const ul=$('#user-line'); if(ul)ul.textContent=(sessao&&sessao.user?sessao.user.email:'')+' · '+(empresa.nome||'');
  const tl=$('#trial-line');
  if(tl){
    if(empresa.status==='trial'){
      const d=diasRestantes(empresa.trial_expira_em);
      tl.style.color='var(--m-financeiro,#E0A63C)';
      tl.textContent='Teste grátis · '+(d>0?d+' dia(s) restante(s)':'expira hoje');
    } else tl.textContent='';
  }
  setSync('sincronizado','#7FBF9B');
  nav('dashboard');
}
async function cloudLoad(){
  snapshot={};
  for(const t of TABLES){
    let q=sb.from('erp_'+t).select('id,dados').eq('empresa_id',empresa.empresa_id);
    if(t==='eventos'||t==='movimentos')q=q.order('atualizado_em',{ascending:false}).limit(t==='eventos'?800:5000);
    const {data,error}=await q; if(error)throw error;
    S[t]=data.map(r=>r.dados);
    snapshot[t]=new Map(data.map(r=>[r.id,JSON.stringify(r.dados)]));
  }
  S.eventos.sort((a,b)=>a.data<b.data?1:-1);
  S.empresa={nome:empresa.nome};
}
async function cloudPersist(){
  if(!sb||!empresa||!snapshot)return;
  if(syncing){ syncPendente=true; return; }
  syncing=true; setSync('sincronizando…','#E0A63C');
  try{
    for(const t of TABLES){
      const cur=new Map(S[t].map(r=>[r.id,JSON.stringify(r)]));
      const prev=snapshot[t];
      const ups=[],dels=[];
      cur.forEach((j,id)=>{ if(prev.get(id)!==j)ups.push({id,empresa_id:empresa.empresa_id,dados:JSON.parse(j),atualizado_em:new Date().toISOString()}); });
      prev.forEach((j,id)=>{ if(!cur.has(id))dels.push(id); });
      if(ups.length){ const {error}=await sb.from('erp_'+t).upsert(ups); if(error)throw error; }
      if(dels.length){ const {error}=await sb.from('erp_'+t).delete().in('id',dels); if(error)throw error; }
      snapshot[t]=cur;
    }
    setSync('sincronizado','#7FBF9B');
  }catch(e){ console.error(e); setSync('erro — tentando de novo…','#E08A7E');
    toast('Erro de sincronização: '+(e.message||e),true); setTimeout(()=>{syncPendente=true; if(!syncing)cloudPersist();},4000); }
  syncing=false;
  if(syncPendente){ syncPendente=false; cloudPersist(); }
}
function subscribeRealtime(){
  if(rtChan)sb.removeChannel(rtChan);
  rtChan=sb.channel('erp-sync-'+empresa.empresa_id);
  TABLES.forEach(t=>{
    rtChan.on('postgres_changes',{event:'*',schema:'public',table:'erp_'+t,filter:'empresa_id=eq.'+empresa.empresa_id},payload=>{
      const map=snapshot[t]; if(!map)return;
      if(payload.eventType==='DELETE'){
        const id=payload.old&&payload.old.id; if(!id||!map.has(id))return;
        map.delete(id); S[t]=S[t].filter(r=>r.id!==id); queueRender(); return;
      }
      const row=payload.new, j=JSON.stringify(row.dados);
      if(map.get(row.id)===j)return; // mudança originada aqui mesmo
      map.set(row.id,j);
      const k=S[t].findIndex(r=>r.id===row.id);
      if(k>=0)S[t][k]=row.dados; else S[t].push(row.dados);
      if(t==='eventos')S.eventos.sort((a,b)=>a.data<b.data?1:-1);
      queueRender();
    });
  });
  rtChan.subscribe();
}
function queueRender(){ clearTimeout(rtTimer);
  rtTimer=setTimeout(()=>{ if(!$('#overlay').classList.contains('open'))render(); },300); }

/* ---------- Inicialização ---------- */
(async function bootstrap(){
  const cfg=cloudCfg();
  if(cfg&&window.supabase){
    sb=window.supabase.createClient(cfg.url,cfg.key);
    nav('dashboard');
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ showAuth('login'); return; }
    sessao=session;
    await afterLogin();
  } else {
    const had=await loadState();
    aplicarIdentidade();
    nav('dashboard');
    if(!had)toast('Bem-vindo! Em "Dados & Backup" você pode carregar o exemplo ou conectar ao Supabase.');
  }
})();
window.addEventListener('beforeunload',()=>{ if(sb&&empresa&&!syncing)cloudPersist(); });
</script>
