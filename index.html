<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food ERP — Orientado por Eventos, Dirigido por Itens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F6F4EE; --panel:#FFFFFF; --ink:#22271F; --muted:#6F7568; --line:#E4E1D6; --soft:#EFEDE4;
  --primary:#2E6E4E; --primary-dark:#20523A; --accent:#E0A63C; --danger:#B3372C; --ok:#2E6E4E;
  --m-dashboard:#5B3A8C; --m-itens:#1F4E79; --m-composicao:#0F6E6E; --m-produtos:#9C4221; --m-compras:#7A4A12; --m-relatorios:#3E5F8A;
  --m-estoque:#5F6B1B; --m-producao:#C05E10; --m-pedidos:#1F6FB2; --m-financeiro:#9E2B25; --m-eventos:#8C1D3F; --m-clientes:#7A3E6B; --m-margens:#A87718; --m-planejamento:#2F6B7A; --m-fornecedores:#8A6642; --m-integracoes:#4A5FA5; --m-funcionarios:#3D7A6E;
  --radius:10px; --shadow:0 1px 2px rgba(30,35,25,.06),0 4px 14px rgba(30,35,25,.05);
  font-size:15px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;max-width:100vw;overflow-x:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
h1,h2,h3,.display{font-family:'Archivo','Inter',sans-serif}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
.num{font-variant-numeric:tabular-nums}

/* ---------- Layout ---------- */
#app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
aside{background:var(--sidebar,#20261F);color:var(--sb-text,#EDEBE0);padding:18px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.brand .logo{width:38px;height:38px;border-radius:10px;background:var(--primary);display:grid;place-items:center;font-size:19px;flex:none}
.brand b{font-family:'Archivo';font-size:16px;letter-spacing:.2px;display:block;line-height:1.1}
.brand small{color:var(--sb-dim,#A9B0A0);font-size:11px}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--sb-dim,#8F978A);padding:12px 10px 5px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:transparent;color:var(--sb-text,#D7D6CB);border-radius:8px;text-align:left;font-size:13.5px;font-weight:500;transition:background .12s}
.nav-btn:hover{background:var(--sb-hover,rgba(255,255,255,.07))}
.nav-btn.active{background:var(--sb-active,rgba(255,255,255,.12));color:var(--sb-strong,#fff);font-weight:600}
.nav-dot{width:9px;height:9px;border-radius:3px;flex:none}
.nav-btn .count{margin-left:auto;font-size:11px;color:var(--sb-dim,#9BA294)}
aside .foot{margin-top:auto;padding:12px 8px 4px;font-size:11px;color:var(--sb-dim,#8F978A);line-height:1.5}

main{padding:26px 32px 64px;max-width:1240px;width:100%;overflow-x:hidden}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.topbar h1{font-size:24px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:11px}
.topbar h1 .mod-chip{width:13px;height:13px;border-radius:4px;display:inline-block}
.topbar .sub{color:var(--muted);font-size:13px;margin-top:4px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ---------- Components ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:8px;border:1px solid var(--line);background:var(--panel);font-size:13.5px;font-weight:600;color:var(--ink);transition:.12s}
.btn:hover{border-color:#C9C6B8;background:#FBFAF6}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-dark)}
.btn.danger{color:var(--danger);border-color:#E5C4C0}
.btn.ghost{border-color:transparent;background:transparent}
.btn.sm{padding:5px 10px;font-size:12.5px}
.btn:disabled{opacity:.45;cursor:not-allowed}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);max-width:100%}
.card .card-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card .card-h h3{font-size:14.5px;font-weight:700}
.card .card-b{padding:16px 18px;overflow-x:auto}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1020px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}

.kpi{padding:15px 17px}
.kpi .k-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.kpi .k-label .dot{width:8px;height:8px;border-radius:3px}
.kpi .k-value{font-family:'Archivo';font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.01em}
.kpi .k-foot{font-size:12px;color:var(--muted);margin-top:5px}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--soft);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--hover,#FAF9F3)}
td.r,th.r{text-align:right}
.empty{padding:34px 20px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6}
.empty b{display:block;color:var(--ink);font-size:14.5px;margin-bottom:4px}

.tag{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:600;background:var(--soft);color:#55584D;white-space:nowrap}
.tag.f{background:#E9F1EC;color:var(--primary-dark)}
.tag.warn{background:#FBF0DA;color:#8A6414}
.tag.bad{background:#F7E4E1;color:var(--danger)}
.tag.info{background:#E4EEF7;color:#1F5B93}
.tag.mut{background:#EFEDE4;color:#82867A}
.qty-pill{font-weight:600}
.neg{color:var(--danger);font-weight:600}
.pos{color:var(--primary-dark);font-weight:600}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:12.5px;font-weight:600;color:#4B4F44}
.field input,.field select,.field textarea{padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--input-bg,#FDFCF9);font-size:13.5px;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid rgba(46,110,78,.35);border-color:var(--primary)}
.field .hint{font-size:11.5px;color:var(--muted)}
.only-mobile{display:none}
.only-desktop{display:block}
.status-pill-select{width:100%;padding:10px 14px;border-radius:99px;border:1px solid var(--line);background:var(--panel);
  font-size:13.5px;font-weight:600;color:var(--ink);appearance:none}
.ped-total-bar{display:flex;justify-content:space-between;align-items:center;background:var(--sidebar,#20261F);
  color:#fff;border-radius:12px;padding:12px 16px;margin:16px 0;font-size:13.5px}
.ped-day{margin-bottom:18px}
.ped-day-h{font-size:15px;font-weight:700;margin-bottom:2px}
.ped-day-sub{font-size:12px;margin-bottom:8px}
.ped-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.ped-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ped-card-top b{margin-left:auto}
.ped-card-mid{font-size:12.5px;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ped-card-bot{display:flex;justify-content:space-between;align-items:center;font-size:12.5px}
.ped-card-bot .mono-id{font-size:10.5px}
.frow{display:grid;gap:12px}
.pln-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.pln-card-top{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-bottom:6px}
.pln-card-tit{font-weight:700;font-size:14px;margin-bottom:6px}
.pln-card-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.frow.c2{grid-template-columns:1fr 1fr}.frow.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:560px){.frow.c2,.frow.c3{grid-template-columns:1fr}}

.venda-wrap{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start;margin-top:16px}
@media(max-width:900px){.venda-wrap{grid-template-columns:1fr}}
.cat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;margin-bottom:20px}
.cat-chip{padding:6px 14px;border-radius:99px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;white-space:nowrap}
.cat-chip.active{color:#fff;border-color:transparent}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.prod-card{position:relative;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:12px;cursor:pointer;transition:transform .08s,box-shadow .08s;user-select:none}
.prod-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.prod-card .pc-cat{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;opacity:.85;margin-bottom:6px}
.prod-card .pc-nome{font-size:13.5px;font-weight:700;line-height:1.3;margin-bottom:10px;min-height:34px}
.prod-card .pc-preco{font-size:14.5px;font-weight:700;font-family:'Archivo'}
.prod-card .pc-badge{position:absolute;top:8px;right:8px;background:var(--primary);color:#fff;border-radius:99px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;padding:0 5px}
.prod-list{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.prod-row{display:flex;align-items:center;gap:11px;padding:13px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.prod-row:last-child{border-bottom:none}
.prod-row:active{background:var(--bg)}
.pr-dot{width:9px;height:9px;border-radius:50%;flex:none}
.pr-info{flex:1;min-width:0}
.pr-cat{font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;opacity:.8;margin-bottom:2px}
.pr-nome{font-size:14px;font-weight:700;line-height:1.25}
.pr-right{flex:none;text-align:right;position:relative;padding-right:4px}
.pr-preco{font-size:13.5px;font-weight:700}
.pr-badge{position:absolute;top:-8px;right:-6px;background:var(--primary);color:#fff;border-radius:99px;min-width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 4px}
.cart-panel{position:sticky;top:16px}
.cart-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--soft)}
.cart-line .cl-info{flex:1;min-width:0}
.cart-line .cl-nome{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-line .cl-sub{font-size:11.5px;color:var(--muted)}
.stepper{display:flex;align-items:center;gap:6px;flex-shrink:0}
.stepper button{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:var(--soft);font-weight:700;cursor:pointer;line-height:1}
.cart-empty{padding:30px 10px;text-align:center;color:var(--muted);font-size:13px}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.check{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12.5px;background:var(--input-bg,#FDFCF9)}
.check input{margin-top:2px;accent-color:var(--primary)}
.check b{display:block;font-size:12.5px}
.check small{color:var(--muted);font-size:11px;line-height:1.35;display:block}
.check.on{border-color:var(--primary);background:#F0F6F2}

/* modal */
#overlay{position:fixed;inset:0;background:rgba(25,30,22,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
#overlay.open{display:flex}
.modal{background:var(--panel);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:640px;animation:pop .16s ease}
.modal.wide{max-width:820px}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal .m-h{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal .m-h h3{font-size:16px}
.modal .m-b{padding:20px 22px;max-height:66vh;overflow-y:auto}
.modal .m-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
.x{border:none;background:transparent;font-size:19px;color:var(--muted);padding:4px 8px;border-radius:6px}
.x:hover{background:var(--soft)}

/* linhas de lançamento (compras / pedidos / composição) */
.lines{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.line{display:grid;grid-template-columns:1fr 110px 130px 34px;gap:8px;align-items:center}
.cm-line{display:grid;grid-template-columns:1fr 90px 34px;gap:8px;align-items:center;margin-bottom:8px}
@media(max-width:560px){.cm-line{grid-template-columns:1fr 74px 30px;gap:6px}}
.line select,.line input{padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--input-bg,#FDFCF9);font-size:13px;width:100%}
.line .rm{border:none;background:var(--soft);border-radius:7px;height:32px;color:var(--muted)}
.line .rm:hover{background:#F0DDD9;color:var(--danger)}
.line.c6{grid-template-columns:1fr 78px 92px 92px 128px 30px}
@media(max-width:720px){.line.c6{grid-template-columns:1fr 70px 80px 30px}.line.c6 .opt{display:none}}
@media(max-width:560px){.line{grid-template-columns:1fr 80px 90px 30px}}

/* eventos */
.ev-list{display:flex;flex-direction:column}
.ev{display:flex;gap:12px;padding:11px 4px;border-bottom:1px solid var(--soft);font-size:13px}
.ev:last-child{border-bottom:none}
.ev .ev-dot{width:10px;height:10px;border-radius:4px;margin-top:4px;flex:none}
.ev .ev-t{color:var(--muted);font-size:11.5px;margin-top:2px}
.ev b{font-weight:600}

/* gráfico de barras */
.bars{display:flex;align-items:flex-end;gap:6px;height:150px;padding-top:8px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.bar .b{width:100%;max-width:34px;background:var(--primary);border-radius:5px 5px 2px 2px;transition:height .3s;min-height:2px}
.bar .b.zero{background:#E7E5DA}
.bar small{font-size:10px;color:var(--muted);white-space:nowrap}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#22271F;color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:99;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--danger)}

.search{padding:8px 13px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:13.5px;min-width:220px}
.mono-id{font-size:11px;color:#A5A99B}
.subtle{color:var(--muted);font-size:12.5px}
.link{color:var(--primary-dark);font-weight:600;text-decoration:none;cursor:pointer}
.link:hover{text-decoration:underline}
.section-gap{margin-top:18px}
details.comp-tree{border:1px solid var(--line);border-radius:8px;padding:0;margin-bottom:8px;background:var(--input-bg,#FDFCF9)}
details.comp-tree summary{padding:10px 14px;cursor:pointer;font-weight:600;font-size:13.5px;display:flex;justify-content:space-between;gap:10px;list-style:none}
details.comp-tree summary::-webkit-details-marker{display:none}
details.comp-tree .tree-b{padding:2px 14px 12px}
.flow-strip{display:flex;gap:0;align-items:stretch;overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
.flow-step{flex:1;min-width:120px;padding:12px 14px;border-right:1px solid var(--line);font-size:12px;color:var(--muted)}
.flow-step:last-child{border-right:none}
.flow-step b{display:block;color:var(--ink);font-size:12.5px;margin-bottom:2px}

#mobile-topbar{display:none}
#mobile-backdrop{display:none;position:fixed;inset:0;background:rgba(10,12,8,.5);z-index:300}
#mobile-backdrop.show{display:block}
#mobile-close-btn{display:none}
@media(max-width:880px){
  #mobile-topbar{display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:250;
    background:var(--sidebar,#20261F);color:#fff;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  #mobile-menu-btn{background:transparent;border:1px solid rgba(255,255,255,.25);color:#fff;font-size:18px;
    width:38px;height:38px;border-radius:8px;flex:none;cursor:pointer;line-height:1}
  #mobile-topbar .logo{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;font-size:14px;flex:none;background:var(--primary)}
  #mobile-topbar b{font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #app{grid-template-columns:1fr}
  aside{position:fixed;top:0;left:0;height:100vh;width:82vw;max-width:300px;z-index:301;
    transform:translateX(-100%);transition:transform .28s ease;flex-direction:column;flex-wrap:nowrap;
    overflow-y:auto;padding-top:8px;box-shadow:4px 0 24px rgba(0,0,0,.25)}
  aside.open{transform:translateX(0)}
  #mobile-close-btn{display:block;position:absolute;top:10px;right:10px;background:transparent;border:none;
    color:var(--sb-text,#D7D6CB);font-size:20px;cursor:pointer;line-height:1;padding:6px}
  .brand{padding:4px 34px 4px 8px}
  .nav-label,aside .foot{display:block}
  .nav-btn{width:100%;padding:9px 10px}
  main{padding:16px 14px 60px}
  .cat-chips{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;
    margin-left:-14px;margin-right:-14px;padding-left:14px;padding-right:14px;scrollbar-width:thin}
  .cat-chip{flex:none}
  .only-mobile{display:block}
  .only-desktop{display:none}
  .cart-panel{position:static}
  .prod-card{padding:9px}
  .venda-floatbar{position:fixed;left:12px;right:12px;bottom:12px;z-index:240;background:var(--primary);color:#fff;
    border-radius:14px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;
    box-shadow:0 6px 20px rgba(0,0,0,.25);font-size:13.5px;font-weight:700;cursor:pointer}
}

#auth{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
#auth.open{display:flex}
.auth-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 50px rgba(30,35,25,.12);width:100%;max-width:410px;padding:30px}
.auth-card .logo{width:46px;height:46px;border-radius:12px;background:var(--primary);display:grid;place-items:center;font-size:23px;margin-bottom:14px}
.auth-card h2{font-size:19px;margin-bottom:4px}
.auth-card .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.auth-alt{margin-top:14px;font-size:12.5px;color:var(--muted);text-align:center}
.auth-msg{margin:0 0 13px;padding:10px 13px;border-radius:8px;font-size:12.5px;line-height:1.55;background:#F7E4E1;color:#8C2D24;border:1px solid #EBC9C4}
.auth-msg.ok{background:#E9F1EC;color:#20523A;border-color:#CDE0D4}
#cloud-bar{padding:10px 8px 4px;border-top:1px solid var(--sb-hover,rgba(255,255,255,.09));font-size:11.5px;color:var(--sb-dim,#A9B0A0);line-height:1.6}
#sync-status b{font-weight:600}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
</style>
</head>
<body>
<div id="mobile-topbar">

<script>
'use strict';
/* =====================================================================
   FOOD ERP — arquitetura dirigida por itens, orientada a eventos
   Regras de ouro implementadas:
   1. Item nunca muda de identidade, apenas ganha funções
   2. Toda informação rastreável até o evento que a gerou
   3. Nada calculado é guardado, exceto valores de pedidos (fotografia)
   4. Funcionalidade nova = item + função, não tabela nova
   ===================================================================== */

/* ---------- Estado ---------- */
const FUNCOES = [
  {id:'compravel',    nome:'Comprável',        desc:'Pode ser comprado de fornecedores'},
  {id:'estocavel',    nome:'Estocável',         desc:'Controlado em estoque'},
  {id:'produzivel',   nome:'Produzível',        desc:'Pode ser produzido (pré-preparo ou produto)'},
  {id:'vendavel',     nome:'Vendável',          desc:'Pode ser vendido para clientes'},
  {id:'composto',     nome:'Composto',          desc:'Pode ser utilizado em composições'},
  {id:'servico',      nome:'Serviço',           desc:'Serviço ou custo indireto'},
  {id:'embalagem',    nome:'Embalagem',         desc:'Embalagem utilizada ou vendida'},
  {id:'ativo_imob',   nome:'Ativo imobilizado', desc:'Bem patrimonial / equipamento'}
];
const UNIDADES = ['g','ml','un'];
const EVENTO_CORES = {
  COMPRA_REGISTRADA:'var(--m-compras)', PRODUCAO_REALIZADA:'var(--m-producao)',
  PEDIDO_CONFIRMADO:'var(--m-pedidos)', PEDIDO_ENTREGUE:'var(--m-pedidos)',
  RECEBIMENTO_REALIZADO:'var(--m-financeiro)', PAGAMENTO_REALIZADO:'var(--m-financeiro)', RECEITA_REGISTRADA:'var(--m-financeiro)',
  AJUSTE_ESTOQUE:'var(--m-estoque)', DESPESA_REGISTRADA:'var(--m-financeiro)',
  DEVOLUCAO_CANCELAMENTO:'var(--m-eventos)', ITEM_CRIADO:'var(--m-itens)',
  ITEM_ATUALIZADO:'var(--m-itens)', COMPOSICAO_DEFINIDA:'var(--m-composicao)',
  CLIENTE_CRIADO:'var(--m-itens)', CLIENTE_ATUALIZADO:'var(--m-itens)', CREDITO_CLIENTE:'var(--m-financeiro)',
  PEDIDO_EM_PRODUCAO:'var(--m-producao)', PEDIDO_DISPONIVEL:'var(--m-pedidos)', FORMA_PAGAMENTO:'var(--m-financeiro)',
  FORNECEDOR_CRIADO:'var(--m-fornecedores)', FORNECEDOR_ATUALIZADO:'var(--m-fornecedores)',
  CANAL_CONFIGURADO:'var(--m-integracoes)', FUNCIONARIO_CRIADO:'var(--m-funcionarios)', FUNCIONARIO_ATUALIZADO:'var(--m-funcionarios)', VALE_FUNCIONARIO:'var(--m-financeiro)', PAGAMENTO_FUNCIONARIO:'var(--m-financeiro)', PEDIDO_CANAL_RECEBIDO:'var(--m-integracoes)', REPASSE_CANAL:'var(--m-financeiro)'
};

var S = {
  empresa:{nome:'Meu Restaurante'},
  itens:[], categorias:[], composicoes:[], custos_fixos:[], status_personalizados:[], perfis_marmita:[], movimentos:[], compras:[], producoes:[],
  pedidos:[], lancamentos:[], eventos:[], clientes:[], clientes_mov:[], formas:[], fornecedores:[], canais:[], funcionarios:[], funcionarios_mov:[], config:[], seq:{}
};
let currentView='dashboard';
let saveTimer=null;

/* ---------- Persistência: window.storage → localStorage → memória ---------- */
const STORE_KEY='food-erp-v1';
async function persist(){
  if(typeof cloudPersist==='function'&&sb&&empresa)return cloudPersist(); // modo nuvem
  const data=JSON.stringify(S);
  try{ if(window.storage){ await window.storage.set(STORE_KEY,data); return; } }catch(e){}
  try{ localStorage.setItem(STORE_KEY,data); }catch(e){}
}
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(persist,400); }
async function proximoNumeroPedido(){ // numeração sequencial por empresa, gerada no banco (evita duplicar/pular mesmo com criação simultânea)
  if(!sb||!empresa)return null; // modo local/demo sem nuvem: fica sem número, só com o id técnico
  try{ const {data,error}=await sb.rpc('erp_proximo_numero_pedido',{p_empresa_id:empresa.empresa_id}); if(error)throw error; return data; }
  catch(e){ return null; }
}
async function loadState(){
  let raw=null;
  try{ if(window.storage){ const r=await window.storage.get(STORE_KEY); if(r&&r.value) raw=r.value; } }catch(e){}
  if(!raw){ try{ raw=localStorage.getItem(STORE_KEY); }catch(e){} }
  if(raw){ try{ const p=JSON.parse(raw); if(p&&p.itens) S=Object.assign(S,p); return true; }catch(e){} }
  return false;
}

/* ---------- Utilidades ---------- */
const $=s=>document.querySelector(s);
const uid=p=>p+'-'+Date.now().toString(36).slice(-6).toUpperCase()+Math.floor(Math.random()*1296).toString(36).toUpperCase().padStart(2,'0');
const money=v=>(v==null||isNaN(v))?'—':v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const qty=(q,un)=>{ if(q==null||isNaN(q))return'—'; const n=Math.round(q*1000)/1000; return n.toLocaleString('pt-BR')+' '+(un||''); };
const dtBR=iso=>{ if(!iso)return'—'; const d=new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };
const dBR=iso=>iso?new Date(iso+'T12:00:00').toLocaleDateString('pt-BR'):'—';
const hoje=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg,err){ const t=$('#toast'); t.textContent=msg; t.className=err?'show err':'show'; clearTimeout(t._h); t._h=setTimeout(()=>t.className='',2600); }
const itemById=id=>S.itens.find(i=>i.id===id);
const nomeItem=id=>{ const i=itemById(id); return i?i.nome:'(item removido)'; };
const nomeLinha=l=>{ if(l.nome_custom)return l.nome_custom; const i=itemById(l.item_id); return i?i.nome:(l.descricao||'(item não mapeado)'); };
const temFuncao=(item,f)=>item&&item.funcoes&&item.funcoes.includes(f);

/* ---------- Núcleo de eventos (tudo gira em torno disso) ---------- */
function registrarEvento(tipo,descricao,ref){
  S.eventos.unshift({id:uid('EV'),tipo,descricao,ref:ref||null,data:new Date().toISOString()});
  scheduleSave();
}
function registrarMovimento(itemId,quantidade,origemTipo,origemId,custoUnit,obs,lote,validade){
  S.movimentos.push({id:uid('MOV'),item_id:itemId,quantidade,tipo:quantidade>=0?'entrada':'saida',
    origem_evento:origemTipo,origem_id:origemId||null,custo_unitario:custoUnit??null,
    lote:lote||null,validade:validade||null,
    observacao:obs||null,data:new Date().toISOString()});
}

/* ---------- Cálculos derivados (saldo é resultado dos eventos) ---------- */
function saldo(itemId){ return S.movimentos.filter(m=>m.item_id===itemId).reduce((a,m)=>a+m.quantidade,0); }
function custoMedio(itemId){
  const ent=S.movimentos.filter(m=>m.item_id===itemId&&m.quantidade>0&&m.custo_unitario!=null);
  if(!ent.length)return null;
  const tq=ent.reduce((a,m)=>a+m.quantidade,0), tv=ent.reduce((a,m)=>a+m.quantidade*m.custo_unitario,0);
  return tq>0?tv/tq:null;
}
function componentesDe(paiId){ return S.composicoes.filter(c=>c.item_pai_id===paiId&&c.ativo!==false); }
function lotesDe(itemId){ // saldo por lote/validade, derivado dos movimentos
  const map={};
  S.movimentos.filter(m=>m.item_id===itemId).forEach(m=>{
    const key=(m.lote||'')+'|'+(m.validade||'');
    if(!map[key])map[key]={lote:m.lote||null,validade:m.validade||null,saldo:0};
    map[key].saldo+=m.quantidade;
  });
  return Object.values(map);
}
function consumirFEFO(itemId,qtd,origemTipo,origemId,obs){ // PVPS: primeiro que vence, primeiro que sai
  let rest=qtd;
  const lotes=lotesDe(itemId).filter(l=>l.saldo>0.000001).sort((a,b)=>{
    if(a.validade&&b.validade)return a.validade<b.validade?-1:1;
    if(a.validade)return -1; if(b.validade)return 1; return 0; });
  for(const l of lotes){ if(rest<=0.000001)break;
    const take=Math.min(l.saldo,rest); rest-=take;
    registrarMovimento(itemId,-take,origemTipo,origemId,null,obs,l.lote,l.validade); }
  if(rest>0.000001) registrarMovimento(itemId,-rest,origemTipo,origemId,null,obs);
}
const STATUS_RESERVA=['confirmado','em_producao'];
function reservado(itemId){ return S.pedidos.filter(p=>STATUS_RESERVA.includes(p.status))
  .reduce((a,p)=>a+p.itens.filter(l=>l.item_id===itemId).reduce((x,l)=>x+l.quantidade,0),0); }
function disponivel(itemId){ return saldo(itemId)-reservado(itemId); }
function ultimaCompraDe(itemId){ for(let k=S.compras.length-1;k>=0;k--){ const c=S.compras[k];
  const l=c.itens.find(x=>x.item_id===itemId); if(l)return{preco:l.preco_unitario,fornecedor:c.fornecedor,data:c.data}; } return null; }
function sugestaoCompras(alvoDias){ alvoDias=alvoDias||7;
  const ini=Date.now()-30*864e5;
  return S.itens.filter(i=>i.ativo!==false&&temFuncao(i,'compravel')&&temFuncao(i,'estocavel')).map(i=>{
    const disp=disponivel(i.id);
    const saidas30=S.movimentos.filter(m=>m.item_id===i.id&&m.quantidade<0&&new Date(m.data).getTime()>=ini)
      .reduce((a,m)=>a-m.quantidade,0);
    const cons=saidas30/30;
    const alvo=Math.max(i.estoque_minimo||0,cons*alvoDias);
    return {item:i,disp,cons,cobertura:cons>0?disp/cons:null,sug:alvo-disp};
  }).filter(x=>x.sug>0.0001);
}
const MODS=[['dashboard','Dashboard','#5B3A8C'],['itens','Itens','#1F4E79'],['composicao','Composições','#0F6E6E'],['produtos','Produtos','#9C4221'],
  ['clientes','Clientes','#7A3E6B'],['compras','Compras','#7A4A12'],['estoque','Estoque','#5F6B1B'],
  ['producao','Produção','#C05E10'],['pedidos','Pedidos','#1F6FB2'],['financeiro','Financeiro','#9E2B25'],
  ['margens','Margens','#A87718'],['relatorios','Relatórios','#3E5F8A'],['eventos','Eventos','#8C1D3F'],['planejamento','Planejamento','#2F6B7A'],['fornecedores','Fornecedores','#8A6642'],['integracoes','Integrações','#4A5FA5'],['funcionarios','Funcionários','#3D7A6E']];
const IDENT_PADRAO=Object.assign({nome:'Food ERP',subtitulo:'Dirigido por itens · Eventos',logo_emoji:'🍲',logo_img:null,
  cor_primaria:'#2E6E4E',cor_acento:'#E0A63C',cor_sidebar:'#20261F',cor_fundo:'#F6F4EE',
  cor_painel:'#FFFFFF',cor_texto:'#22271F',cor_perigo:'#B3372C'},
  Object.fromEntries(MODS.map(m=>['mod_'+m[0],m[2]])));
// [nome, primária, acento, lateral, fundo, emoji, painéis, texto]
const IDENT_PRESETS=[
  ['Verde cozinha','#2E6E4E','#E0A63C','#20261F','#F6F4EE','🍲','#FFFFFF','#22271F'],
  ['Bordô & âmbar','#692746','#ECB340','#2B1220','#F7F2EE','🍷','#FFFFFF','#2A1B22'],
  ['Azul marinho','#1F4E79','#E0A63C','#141F2E','#F2F4F7','🌊','#FFFFFF','#1C242E'],
  ['Terracota','#B0552B','#3E7C59','#2A1C14','#F8F3EC','🔥','#FFFFFF','#2B2019'],
  ['Grafite','#3B4048','#D98E32','#17191D','#F3F3F1','⚫','#FFFFFF','#212327'],
  ['Noturno','#58A87E','#E0B45C','#0E120F','#141813','🌙','#1C211B','#E8E6DC']];
function hex2rgb(h){ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgb2hex(r,g,b){ return '#'+((1<<24)+(Math.round(r)<<16)+(Math.round(g)<<8)+Math.round(b)).toString(16).slice(1); }
function blend(a,b,t){ try{ const x=hex2rgb(a),y=hex2rgb(b);
  return rgb2hex(x[0]+(y[0]-x[0])*t, x[1]+(y[1]-x[1])*t, x[2]+(y[2]-x[2])*t); }catch(e){ return a; } }
function lum(h){ try{ const [r,g,b]=hex2rgb(h); return (0.299*r+0.587*g+0.114*b)/255; }catch(e){ return 0; } }
function shade(hex,p){ try{ const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const f=c=>Math.max(0,Math.min(255,Math.round(c*(1+p))));
  return '#'+((1<<24)+(f(r)<<16)+(f(g)<<8)+f(b)).toString(16).slice(1); }catch(e){ return hex; } }
const EMPRESA_PADRAO={nome_loja:'',razao_social:'',documento:'',telefone:'',whatsapp:'',email:'',instagram:'',endereco:'',complemento:'',sobre:''};
function getEmpresaInfo(){ if(!S.config)S.config=[];
  return Object.assign({},EMPRESA_PADRAO,S.config.find(x=>x.id==='empresa')||{}); }
function controlaEstoque(){ if(!S.config)return true;
  const c=S.config.find(x=>x.id==='operacao'); return c?c.controla_estoque!==false:true; }
function salvarModoOperacao(controla){
  if(!S.config)S.config=[];
  S.config=S.config.filter(c=>c.id!=='operacao');
  S.config.push({id:'operacao',controla_estoque:controla});
  registrarEvento('ITEM_ATUALIZADO',`Modo de operação alterado: ${controla?'controle de estoque ativo':'compra sob demanda (sem controle de estoque)'}`);
  scheduleSave(); render(); toast('Modo de operação salvo.');
}
function getIdent(){ if(!S.config)S.config=[];
  return Object.assign({},IDENT_PADRAO,S.config.find(x=>x.id==='identidade')||{}); }
function aplicarIdentidade(i){
  i=i||getIdent(); const r=document.documentElement.style;
  r.setProperty('--primary',i.cor_primaria); r.setProperty('--primary-dark',shade(i.cor_primaria,-0.28));
  r.setProperty('--accent',i.cor_acento); r.setProperty('--sidebar',i.cor_sidebar); r.setProperty('--bg',i.cor_fundo);
  r.setProperty('--panel',i.cor_painel); r.setProperty('--ink',i.cor_texto); r.setProperty('--danger',i.cor_perigo);
  r.setProperty('--ok',i.cor_primaria);
  // tons derivados automaticamente (funciona também para temas escuros)
  r.setProperty('--muted',blend(i.cor_texto,i.cor_fundo,0.38));
  r.setProperty('--line',blend(i.cor_texto,i.cor_fundo,0.86));
  r.setProperty('--soft',blend(i.cor_texto,i.cor_fundo,0.93));
  r.setProperty('--hover',blend(i.cor_texto,i.cor_painel,0.965));
  r.setProperty('--input-bg',blend(i.cor_painel,i.cor_fundo,0.35));
  MODS.forEach(m=>r.setProperty('--m-'+m[0],i['mod_'+m[0]]||IDENT_PADRAO['mod_'+m[0]]));
  // contraste do texto da lateral conforme a cor escolhida
  const claro=lum(i.cor_sidebar)>0.55;
  r.setProperty('--sb-text',claro?'#262B24':'#EDEBE0');
  r.setProperty('--sb-dim',claro?'#5E655B':'#9BA294');
  r.setProperty('--sb-strong',claro?'#000':'#fff');
  r.setProperty('--sb-hover',claro?'rgba(0,0,0,.07)':'rgba(255,255,255,.08)');
  r.setProperty('--sb-active',claro?'rgba(0,0,0,.12)':'rgba(255,255,255,.14)');
  const lg=$('#brand-logo'); if(lg)lg.innerHTML=i.logo_img?'<img src="'+i.logo_img+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:10px">':(i.logo_emoji||'🍲');
  const bn=$('#brand-nome'); if(bn)bn.textContent=i.nome||'Food ERP';
  const bs=$('#brand-sub'); if(bs)bs.textContent=i.subtitulo||'';
  const lgm=$('#brand-logo-m'); if(lgm)lgm.innerHTML=i.logo_img?'<img src="'+i.logo_img+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:6px">':(i.logo_emoji||'🍲');
  const bnm=$('#brand-nome-m'); if(bnm)bnm.textContent=i.nome||'Food ERP';
  document.title=i.nome||'Food ERP';
}
const clienteById=id=>S.clientes.find(c=>c.id===id);
const nomeProprio=s=>{ if(!s)return s;
  return s.toLowerCase().replace(/(^|[\s'-])([a-zà-öø-ÿ])/g,(m,sep,c)=>sep+c.toUpperCase()); };
const clientesOrdenados=(lista)=>(lista||S.clientes).slice().sort((a,b)=>nomeProprio(a.nome).localeCompare(nomeProprio(b.nome),'pt'));
const fornecedorById=id=>S.fornecedores.find(f=>f.id===id);
const canalById=id=>S.canais.find(c=>c.id===id);
const funcById=id=>S.funcionarios.find(f=>f.id===id);
function valesAbertos(fid){ return S.funcionarios_mov.filter(m=>m.funcionario_id===fid&&m.tipo==='vale'&&m.status==='aberto'); }
const formaById=id=>S.formas.find(f=>f.id===id);
function saldoCliente(id){ return S.clientes_mov.filter(m=>m.cliente_id===id)
  .reduce((a,m)=>a+(m.tipo==='credito'?m.valor:-m.valor),0); }
function rendimentoDe(paiId){ const c=componentesDe(paiId); return (c.length&&c[0].rendimento>0)?c[0].rendimento:1; }
function garantirFormasPadrao(){ if(S.formas.length)return;
  [['Dinheiro',0],['Pix',0],['Cartão débito',1.5],['Cartão crédito',3.5]].forEach(([n,t])=>
    S.formas.push({id:uid('FPG'),nome:n,taxa_percentual:t,ativo:true,criado_em:new Date().toISOString()})); }
function garantirCategoriasPadrao(){
  if(!S.categorias)S.categorias=[];
  if(S.categorias.length)return;
  const nomes=[...new Set(S.itens.map(i=>(i.categoria||'').trim()).filter(Boolean))];
  if(!nomes.length)return;
  nomes.forEach(n=>S.categorias.push({id:uid('CAT'),nome:n,ativo:true,criado_em:new Date().toISOString()}));
}
const ITEM_ID_SOB_MEDIDA='PRD-SOB-MEDIDA';
function garantirMarmitaSobMedida(){
  if(S.itens.find(i=>i.id===ITEM_ID_SOB_MEDIDA))return;
  S.itens.push({id:ITEM_ID_SOB_MEDIDA,nome:'Marmita Sob Medida',categoria:'Personalizada',unidade_base:'un',
    funcoes:['vendavel'],preco_venda:0,estoque_minimo:0,ativo:true,criado_em:new Date().toISOString()});
}
const categoriaById=id=>S.categorias.find(c=>c.id===id);
function custoFixoMensalTotal(){ return (S.custos_fixos||[]).filter(c=>c.ativo!==false).reduce((a,c)=>a+(c.valor_mensal||0),0); }
function producaoEstimadaSugerida(){
  const porMes={};
  S.pedidos.filter(p=>['entregue','finalizado'].includes(p.status)&&p.data_entrega).forEach(p=>{
    const mes=p.data_entrega.slice(0,7);
    const un=p.itens.reduce((a,l)=>{ const it=itemById(l.item_id); return a+l.quantidade*((it&&it.unidades_equivalentes)||1); },0);
    porMes[mes]=(porMes[mes]||0)+un;
  });
  const meses=Object.keys(porMes).sort();
  if(!meses.length)return 0;
  const ultimos=meses.slice(-3);
  return Math.round(ultimos.reduce((a,m)=>a+porMes[m],0)/ultimos.length);
}
function getCustosFixosCfg(){ if(!S.config)S.config=[]; return Object.assign({producao_estimada:0},S.config.find(x=>x.id==='custosfixos')||{}); }
function custoFixoPorUnidade(){
  const total=custoFixoMensalTotal(); if(!total)return 0;
  const cfg=getCustosFixosCfg();
  const producao=cfg.producao_estimada>0?cfg.producao_estimada:producaoEstimadaSugerida();
  return producao?total/producao:0;
}
function statusValidade(v){ if(!v)return '';
  const dd=Math.ceil((new Date(v+'T12:00:00').getTime()-Date.now())/864e5);
  if(dd<0)return '<span class="tag bad">vencido</span>';
  if(dd<=7)return '<span class="tag warn">vence em '+dd+' d</span>';
  return '<span class="tag mut">'+dd+' d</span>'; }
function custoItem(itemId,vis){
  vis=vis||new Set(); if(vis.has(itemId))return null; vis.add(itemId);
  const cm=custoMedio(itemId); if(cm!=null)return cm;
  const comps=componentesDe(itemId);
  if(comps.length){
    let total=0,algum=false;
    comps.forEach(c=>{ const cu=custoItem(c.item_filho_id,new Set(vis));
      if(cu==null)return; algum=true; const perda=1+((c.perda_percentual||0)/100); total+=cu*c.quantidade*perda; });
    return algum?total/rendimentoDe(itemId):null; // custo por unidade-base produzida (considera rendimento)
  }
  return null;
}

/* ---------- Router ---------- */
const VIEWS={};
function nav(view,highlight){
  currentView=view;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===(highlight||view)));

}
function render(){

  $('#cnt-pedidos').textContent=S.pedidos.filter(p=>p.status==='confirmado').length||'';

}
function header(titulo,corVar,sub,acoesHtml){

    ${sub?`<div class="sub">${sub}</div>`:''}</div><div class="top-actions">${acoesHtml||''}</div></div>`;
