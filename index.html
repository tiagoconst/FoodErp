/* ---------- Modal genérico ---------- */
function openModal(html,wide){ $('#modal').className='modal'+(wide?' wide':''); $('#modal').innerHTML=html; $('#overlay').classList.add('open'); }
function closeModal(){ $('#overlay').classList.remove('open'); }
$('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay')closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });
</script>
<script>
'use strict';
/* ================= ITENS ================= */
let filtroItens='';
let filtroCategoriaItens='';
VIEWS.itens=function(){
  garantirCategoriasPadrao();
  const lista=S.itens.filter(i=>{
    if(filtroCategoriaItens&&i.categoria!==filtroCategoriaItens)return false;
    return !filtroItens||i.nome.toLowerCase().includes(filtroItens)||(i.categoria||'').toLowerCase().includes(filtroItens);
  });
  const rows=lista.map(i=>{
    const fs=(i.funcoes||[]).map(f=>{const F=FUNCOES.find(x=>x.id===f);return `<span class="tag f">${F?F.nome:f}</span>`;}).join(' ');
    const s=temFuncao(i,'estocavel')?qty(saldo(i.id),i.unidade_base):'—';
    const c=custoItem(i.id);
    return `<tr style="${i.ativo===false?'opacity:.45':''}">
      <td><b>${esc(i.nome)}</b><div class="mono-id">${i.id}${i.categoria?' · '+esc(i.categoria):''}</div></td>
      <td>${fs||'<span class="tag mut">sem função</span>'}</td>
      <td class="r num">${s}</td>
      <td class="r num">${c!=null?money(c)+'/'+i.unidade_base:'—'}</td>
      <td class="r num">${temFuncao(i,'vendavel')&&i.preco_venda?money(i.preco_venda):'—'}</td>
      <td class="r"><button class="btn sm" onclick="modalItem('${i.id}')">Editar</button>
        <button class="btn sm ghost" onclick="toggleItem('${i.id}')">${i.ativo===false?'Reativar':'Inativar'}</button></td></tr>`;
  }).join('')||`<tr><td colspan="6"><div class="empty"><b>Nenhum item cadastrado</b>Item representa qualquer coisa que exista no sistema: insumo, preparo, produto, embalagem, serviço ou equipamento.</div></td></tr>`;
  // só mostra categorias usadas por itens que NÃO são produto final vendável — categoria de cardápio fica na tela Produtos
  const catNomesItens=new Set(S.itens.filter(i=>!temFuncao(i,'vendavel')&&i.categoria).map(i=>i.categoria));
  const catsItens=S.categorias.filter(c=>c.ativo!==false&&catNomesItens.has(c.nome));
  const catChips=`<button class="cat-chip ${!filtroCategoriaItens?'active':''}" style="${!filtroCategoriaItens?'background:var(--primary)':''}" onclick='filtroCategoriaItens="";render()'>Todas</button>`+
    catsItens.map(c=>`<button class="cat-chip ${filtroCategoriaItens===c.nome?'active':''}" style="${filtroCategoriaItens===c.nome?'background:'+corCategoria(c.nome):''}" onclick='filtroCategoriaItens=${JSON.stringify(c.nome)};render()'>${esc(c.nome)}</button>`).join('');

  return header('Itens','var(--m-itens)','Um item nunca muda de identidade — apenas ganha funções.',
    `<input class="search" placeholder="Buscar por nome ou categoria…" value="${esc(filtroItens)}" oninput="filtroItens=this.value.toLowerCase();render();this.focus();this.setSelectionRange(99,99)">
     <button class="btn" onclick="modalCategorias()">🏷️ Categorias</button>
     <button class="btn primary" onclick="modalItem()">+ Novo item</button>`)+
  `<div class="cat-chips">${catChips}</div>`+
  `<div class="card"><table><thead><tr><th>Item</th><th>Funções</th><th class="r">Saldo</th><th class="r">Custo</th><th class="r">Preço venda</th><th class="r"></th></tr></thead><tbody>${rows}</tbody></table></div>`;
};

function modalCategorias(){
  openModal(`<div class="m-h"><h3>Categorias de itens</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <p class="subtle" style="margin-bottom:12px">Grupos fixos pra organizar os itens (ex.: Matéria-prima, Embalagem, Pré-preparo, Produto). Renomear aqui atualiza automaticamente todos os itens que usam a categoria.</p>
    <div id="cat-crud-list">${renderCategoriasCrud()}</div>
    <button class="btn sm" style="margin-top:8px" onclick="S.categorias.push({id:uid('CAT'),nome:'',ativo:true,criado_em:new Date().toISOString()});$('#cat-crud-list').innerHTML=renderCategoriasCrud();setTimeout(()=>{const ins=document.querySelectorAll('#cat-crud-list input');if(ins.length)ins[ins.length-1].focus()},30)">+ Nova categoria</button>
  </div>
  <div class="m-f"><button class="btn primary" onclick="closeModal();render()">Concluído</button></div>`,true);
}
function renderCategoriasCrud(){
  return S.categorias.map(c=>{
    const n=S.itens.filter(i=>i.categoria===c.nome&&i.ativo!==false).length;
    return `<div class="line" style="grid-template-columns:1fr 110px 34px;opacity:${c.ativo===false?.5:1}">
      <input value="${esc(c.nome)}" placeholder="ex.: Matéria-prima" onchange="renomearCategoria('${c.id}',this.value)">
      <span class="subtle" style="align-self:center;text-align:center">${n?n+' item(ns)':'—'}</span>
      <button class="rm" title="Remover" onclick="removerCategoria('${c.id}')">✕</button></div>`;
  }).join('')||'<p class="subtle">Nenhuma categoria ainda — clique em "+ Nova categoria".</p>';
}
function renomearCategoria(id,valor){
  const c=categoriaById(id); if(!c)return;
  const nome=valor.trim();
  if(!nome){ removerCategoria(id); return; }
  if(S.categorias.some(x=>x.id!==id&&x.nome.toLowerCase()===nome.toLowerCase()))
    return toast('Já existe uma categoria com esse nome.',true);
  const anterior=c.nome;
  c.nome=nome;
  if(anterior&&anterior!==nome)S.itens.forEach(i=>{ if(i.categoria===anterior)i.categoria=nome; });
  scheduleSave(); const el=$('#cat-crud-list'); if(el)el.innerHTML=renderCategoriasCrud();
}
function removerCategoria(id){
  const c=categoriaById(id); if(!c)return;
  const emUso=S.itens.some(i=>i.categoria===c.nome&&i.ativo!==false);
  if(emUso&&!confirm('Esta categoria está em uso por itens ativos. Remover mesmo assim? Os itens ficarão sem categoria.'))return;
  S.categorias=S.categorias.filter(x=>x.id!==id);
  if(emUso)S.itens.forEach(i=>{ if(i.categoria===c.nome)i.categoria=''; });
  scheduleSave(); const el=$('#cat-crud-list'); if(el)el.innerHTML=renderCategoriasCrud();
}

function modalItem(id){
  garantirCategoriasPadrao();
  const it=id?itemById(id):null;
  const checks=FUNCOES.map(f=>{
    const on=it&&temFuncao(it,f.id);
    const extra=f.id==='vendavel'?";const w=document.getElementById('it-foto-wrap');if(w)w.style.display=this.checked?'block':'none'":'';
    return `<label class="check ${on?'on':''}"><input type="checkbox" name="funcao" value="${f.id}" ${on?'checked':''} onchange="this.closest('.check').classList.toggle('on',this.checked)${extra}"><span><b>${f.nome}</b><small>${f.desc}</small></span></label>`;
  }).join('');
  const catOpts=S.categorias.filter(c=>c.ativo!==false||(it&&it.categoria===c.nome)).map(c=>`<option value="${esc(c.nome)}" ${it&&it.categoria===c.nome?'selected':''}>${esc(c.nome)}</option>`).join('');
  const fotoAtual=it&&it.foto_url?it.foto_url:'';
  openModal(`<div class="m-h"><h3>${it?'Editar item':'Novo item'}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <div class="frow c2">
      <div class="field"><label>Nome *</label><input id="it-nome" value="${it?esc(it.nome):''}" placeholder="ex.: Arroz cru, Marmita G, Etiqueta"></div>
      <div class="field"><label>Categoria</label><select id="it-cat"><option value="">— sem categoria —</option>${catOpts}</select></div>
    </div>
    <div class="frow c3">
      <div class="field"><label>Unidade-base *</label><select id="it-un">${UNIDADES.map(u=>`<option ${it&&it.unidade_base===u?'selected':''}>${u}</option>`).join('')}</select><span class="hint">g (peso) · ml (volume) · un (quantidade)</span></div>
      <div class="field"><label>Preço de venda (R$)</label><input id="it-preco" type="number" step="0.01" min="0" value="${it&&it.preco_venda?it.preco_venda:''}" placeholder="se vendável"></div>
      <div class="field"><label>Estoque mínimo</label><input id="it-min" type="number" step="any" min="0" value="${it&&it.estoque_minimo?it.estoque_minimo:''}" placeholder="alerta no dashboard"></div>
    </div>
    <div class="field"><label>Funções — um item pode ter uma ou várias simultaneamente</label><div class="check-grid">${checks}</div></div>
    <div class="field"><label>Observação</label><textarea id="it-obs" rows="2">${it?esc(it.observacao||''):''}</textarea></div>
    <div class="field" id="it-foto-wrap" style="display:${it&&temFuncao(it,'vendavel')?'block':'none'}">
      <label>Foto (aparece no site de pedidos — só faz sentido pra item marcado como "vendável")</label>
      <input type="hidden" id="it-foto" value="${esc(fotoAtual)}">
      <div style="display:flex;align-items:center;gap:12px">
        <img id="it-foto-preview" src="${esc(fotoAtual)}" style="width:64px;height:64px;border-radius:9px;object-fit:cover;background:var(--soft,#eee);display:${fotoAtual?'block':'none'}">
        <div>
          <input type="file" id="it-foto-file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="uploadFotoItem(event)">
          <button type="button" class="btn sm" onclick="$('#it-foto-file').click()">📷 Enviar foto</button>
          <span id="it-foto-status" class="hint" style="margin-left:6px"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarItem('${id||''}')">Salvar item</button></div>`);
  setTimeout(()=>$('#it-nome').focus(),50);
}
async function uploadFotoItem(evt,prefixo){
  prefixo=prefixo||'it';
  const file=evt.target.files&&evt.target.files[0]; if(!file)return;
  const status=$('#'+prefixo+'-foto-status');
  if(!sb||!empresa){ status.textContent='Sem conexão com o banco.'; return; }
  if(file.size>5*1024*1024){ status.textContent='Foto muito grande (máx. 5MB).'; return; }
  status.textContent='Enviando…';
  try{
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${empresa.empresa_id}/${uid('IMG')}.${ext}`;
    const {error:upErr}=await sb.storage.from('fotos-produtos').upload(path,file,{cacheControl:'3600',upsert:false,contentType:file.type});
    if(upErr)throw upErr;
    const {data}=sb.storage.from('fotos-produtos').getPublicUrl(path);
    $('#'+prefixo+'-foto').value=data.publicUrl;
    const prev=$('#'+prefixo+'-foto-preview'); prev.src=data.publicUrl; prev.style.display='block';
    status.textContent='Foto enviada ✓';
  }catch(e){ console.error(e); status.textContent='Erro ao enviar: '+(e.message||e); }
  finally{ evt.target.value=''; }
}
function salvarItem(id){
  const nome=$('#it-nome').value.trim(); if(!nome)return toast('Informe o nome do item.',true);
  const funcoes=[...document.querySelectorAll('input[name=funcao]:checked')].map(c=>c.value);
  const dados={nome,categoria:$('#it-cat').value,unidade_base:$('#it-un').value,
    preco_venda:parseFloat($('#it-preco').value)||null,estoque_minimo:parseFloat($('#it-min').value)||0,
    foto_url:$('#it-foto').value.trim()||null,
    funcoes,observacao:$('#it-obs').value.trim(),atualizado_em:new Date().toISOString()};
  if(id){ Object.assign(itemById(id),dados); registrarEvento('ITEM_ATUALIZADO',`${nome} atualizado (${funcoes.length} funções)`,id); }
  else{ const nid=uid('ITM'); S.itens.push(Object.assign({id:nid,ativo:true,criado_em:new Date().toISOString()},dados));
    registrarEvento('ITEM_CRIADO',`${nome} criado com funções: ${funcoes.join(', ')||'nenhuma'}`,nid); }
  closeModal(); scheduleSave(); render(); toast('Item salvo.');
}
function toggleItem(id){ const i=itemById(id); i.ativo=i.ativo===false; // registros não são excluídos, apenas inativados
  registrarEvento('ITEM_ATUALIZADO',`${i.nome} ${i.ativo?'reativado':'inativado'}`,id); scheduleSave(); render(); }

/* ================= COMPOSIÇÕES (pré-preparos e itens intermediários) & PRODUTOS (vendáveis) ================= */
function composicoesDeTodas(paiId){ return S.composicoes.filter(c=>c.item_pai_id===paiId); }
function composicaoAtiva(paiId){ const todas=composicoesDeTodas(paiId); return !todas.length||todas.some(c=>c.ativo!==false); }
function toggleComposicao(paiId){
  const it=itemById(paiId); const ativa=composicaoAtiva(paiId);
  composicoesDeTodas(paiId).forEach(c=>{ c.ativo=ativa?false:true; });
  registrarEvento('COMPOSICAO_DEFINIDA',`${it?it.nome:paiId}: composição ${ativa?'inativada':'reativada'}`,paiId);
  scheduleSave(); render(); toast(ativa?'Composição inativada.':'Composição reativada.');
}
function blocoComposicao(pid,mostrarPreco){
  const it=itemById(pid); if(!it)return'';
  const ativa=composicaoAtiva(pid);
  const comps=composicoesDeTodas(pid);
  const custo=ativa?custoItem(pid):null;
  const linhas=comps.map(c=>{
    const f=itemById(c.item_filho_id); const cu=custoItem(c.item_filho_id);
    const sub=f&&componentesDe(f.id).length?` <span class="tag info">também composto</span>`:'';
    return `<tr style="${c.ativo===false?'opacity:.45':''}"><td>${esc(f?f.nome:'?')}${sub}</td><td class="r num">${qty(c.quantidade,c.unidade)}</td>
      <td class="r num">${c.perda_percentual?c.perda_percentual+'%':'—'}</td>
      <td class="r num">${cu!=null?money(cu*c.quantidade*(1+(c.perda_percentual||0)/100)):'—'}</td></tr>`;
  }).join('');
  const rend=rendimentoDe(pid);
  let extra='';
  if(mostrarPreco){
    const cf=custoFixoPorUnidade()*(it.unidades_equivalentes||1);
    const custoTotal=custo!=null?custo+cf:null;
    extra=` &nbsp;<span class="tag ${it.preco_venda?'f':'warn'}">${it.preco_venda?'venda '+money(it.preco_venda):'sem preço definido'}</span>`;
    if(cf)extra+=` &nbsp;<span class="subtle">+ fixo ${money(cf)}</span>`;
    if(it.preco_venda&&custoTotal!=null)extra+=` &nbsp;<span class="subtle">margem ${(((it.preco_venda-custoTotal)/it.preco_venda)*100).toFixed(0)}%</span>`;
  }
  return `<details class="comp-tree" style="${ativa?'':'opacity:.55'}"><summary><span>${mostrarPreco?'🍱':'🧩'} ${esc(it.nome)}${ativa?'':' <span class="tag mut">inativa</span>'} <span class="subtle">(${comps.length} componentes · rende ${qty(rend,it.unidade_base)})</span></span>
    <span class="num">${custo!=null?'custo '+money(custo)+'/'+it.unidade_base:''}${extra} &nbsp;<a class="link" onclick="event.preventDefault();modalComposicao('${pid}')">editar</a> &nbsp;<a class="link" onclick="event.preventDefault();toggleComposicao('${pid}')">${ativa?'inativar':'reativar'}</a></span></summary>
    <div class="tree-b"><table><thead><tr><th>Componente</th><th class="r">Qtd</th><th class="r">Perda</th><th class="r">Custo</th></tr></thead><tbody>${linhas}</tbody></table></div></details>`;
}
VIEWS.composicoes=function(){
  const pais=[...new Set(S.composicoes.map(c=>c.item_pai_id))].filter(pid=>{ const it=itemById(pid); return it&&!temFuncao(it,'vendavel'); });
  const blocos=pais.map(pid=>blocoComposicao(pid,false)).join('')||
    `<div class="card"><div class="empty"><b>Nenhuma composição definida</b>Composições são as fichas técnicas dos seus pré-preparos e itens intermediários — insumo → pré-preparo → pré-preparo. Para o produto final que você vende (com preço), use a aba <b>Produtos</b>.</div></div>`;
  return header('Composições','var(--m-composicao)','Fichas técnicas de pré-preparos e itens intermediários — não são vendidos diretamente.',
    `<button class="btn primary" onclick="modalComposicao(null,'preparo')">+ Definir composição</button>`)+blocos;
};
let filtroCategoriaProdutos='';
VIEWS.produtos=function(){
  const pais=[...new Set(S.composicoes.map(c=>c.item_pai_id))].filter(pid=>{ const it=itemById(pid); return it&&temFuncao(it,'vendavel'); });
  const paisFiltrados=pais.filter(pid=>!filtroCategoriaProdutos||(itemById(pid)||{}).categoria===filtroCategoriaProdutos);
  const semComposicao=S.itens.filter(i=>i.ativo!==false&&temFuncao(i,'vendavel')&&!componentesDe(i.id).length);
  const blocos=paisFiltrados.map(pid=>blocoComposicao(pid,true)).join('')||
    `<div class="card"><div class="empty"><b>Nenhum produto com ficha técnica</b>Marque um item como <b>Vendável</b> em Itens, depois defina aqui do que ele é composto (itens e/ou pré-preparos) e o preço de venda.</div></div>`;
  const aviso=semComposicao.length?`<div class="card section-gap"><div class="card-b"><p class="subtle"><b>${semComposicao.length} produto(s) vendável(is) sem ficha técnica:</b> ${semComposicao.map(i=>esc(i.nome)).join(', ')}. Sem composição definida o custo (CMV) não é calculado.</p></div></div>`:'';
  // categoria de cardápio: só as usadas por produtos vendáveis (Tradicionais, Fit, Conforto...)
  const catNomesProdutos=new Set(S.itens.filter(i=>temFuncao(i,'vendavel')&&i.categoria).map(i=>i.categoria));
  const catsProdutos=S.categorias.filter(c=>c.ativo!==false&&catNomesProdutos.has(c.nome));
  const chips=`<button class="cat-chip ${!filtroCategoriaProdutos?'active':''}" style="${!filtroCategoriaProdutos?'background:var(--primary)':''}" onclick='filtroCategoriaProdutos="";render()'>Todas</button>`+
    catsProdutos.map(c=>`<button class="cat-chip ${filtroCategoriaProdutos===c.nome?'active':''}" style="${filtroCategoriaProdutos===c.nome?'background:'+corCategoria(c.nome):''}" onclick='filtroCategoriaProdutos=${JSON.stringify(c.nome)};render()'>${esc(c.nome)}</button>`).join('');
  return header('Produtos','var(--m-produtos)','O que você vende — composto por itens e/ou pré-preparos, com preço de venda definido aqui.',
    `<button class="btn primary" onclick="modalComposicao(null,'produto')">+ Definir produto</button>`)+
  `<div class="cat-chips">${chips}</div>`+blocos+aviso;
};

let compLinhas=[], compTipo='preparo';
function modalComposicao(paiId,tipo){
  compTipo = tipo || (paiId ? (temFuncao(itemById(paiId),'vendavel')?'produto':'preparo') : 'preparo');
  const compostos=S.itens.filter(i=>i.ativo!==false&&(compTipo==='produto'?temFuncao(i,'vendavel'):!temFuncao(i,'vendavel')));
  const pai=paiId?itemById(paiId):null;
  compLinhas=paiId?composicoesDeTodas(paiId).map(c=>({item:c.item_filho_id,qtd:c.quantidade,perda:c.perda_percentual||0})):[{item:'',qtd:'',perda:0}];
  const rotulo=compTipo==='produto'?'Produto (item vendável) *':'Item composto (pré-preparo) *';
  const dica=compTipo==='produto'?'Ex.: Marmita G = arroz branco + frango + feijão + embalagem + etiqueta':'Ex.: Frango grelhado (pré-preparo) = peito de frango cru + tempero';
  openModal(`<div class="m-h"><h3>${paiId?(compTipo==='produto'?'Editar produto':'Editar composição'):(compTipo==='produto'?'Novo produto':'Nova composição')}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <div class="frow c2">
    <div class="field"><label>${rotulo}</label>
      <select id="cp-pai" ${paiId?'disabled':''}>${!paiId?'<option value="">Selecione…</option>':''}${compostos.map(i=>`<option value="${i.id}" ${i.id===paiId?'selected':''}>${esc(i.nome)} (${i.unidade_base})</option>`).join('')}</select>
      <span class="hint">${dica}</span></div>
    <div class="field"><label>Rendimento da receita *</label>
      <input id="cp-rend" type="number" step="any" min="0" value="${paiId?rendimentoDe(paiId):1}">
      <span class="hint">Quanto esta receita produz, na unidade-base do item. Ex.: 1000 g de arroz cru rendem <b>2700</b> (g) de arroz cozido — o custo por grama cai sozinho.</span></div>
    </div>
    ${compTipo==='produto'?`<div class="frow c2">
      <div class="field"><label>Preço de venda (R$)</label><input id="cp-preco" type="number" step="0.01" min="0" value="${pai&&pai.preco_venda?pai.preco_venda:''}" placeholder="ex.: 22.00"></div>
      <div class="field"><label>Unidades equivalentes</label><input id="cp-unideq" type="number" step="any" min="0" value="${pai&&pai.unidades_equivalentes?pai.unidades_equivalentes:1}"><span class="hint">pra rateio de custo fixo — ex.: combo de 5 marmitas = 5</span></div>
    </div>
    <div class="field">
      <label>Foto (aparece no site de pedidos)</label>
      <input type="hidden" id="cp-foto" value="${esc(pai&&pai.foto_url?pai.foto_url:'')}">
      <div style="display:flex;align-items:center;gap:12px">
        <img id="cp-foto-preview" src="${esc(pai&&pai.foto_url?pai.foto_url:'')}" style="width:64px;height:64px;border-radius:9px;object-fit:cover;background:var(--soft,#eee);display:${pai&&pai.foto_url?'block':'none'}">
        <div>
          <input type="file" id="cp-foto-file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="uploadFotoItem(event,'cp')">
          <button type="button" class="btn sm" onclick="$('#cp-foto-file').click()">📷 Enviar foto</button>
          <span id="cp-foto-status" class="hint" style="margin-left:6px"></span>
        </div>
      </div>
    </div>`:''}
    <div class="field"><label>Componentes (quantidade na unidade-base do componente)</label>
      <div class="lines" id="cp-lines"></div>
      <button class="btn sm" onclick="compLinhas.push({item:'',qtd:'',perda:0});drawCompLines()">+ Adicionar componente</button></div>
  </div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarComposicao('${paiId||''}')">Salvar</button></div>`,true);
  drawCompLines();
}
function drawCompLines(){
  const opts=S.itens.filter(i=>i.ativo!==false).map(i=>`<option value="${i.id}">${esc(i.nome)} (${i.unidade_base})</option>`).join('');
  $('#cp-lines').innerHTML=compLinhas.map((l,k)=>`<div class="line" style="grid-template-columns:1fr 110px 100px 34px">
    <select onchange="compLinhas[${k}].item=this.value"><option value="">Componente…</option>${opts}</select>
    <input type="number" step="any" min="0" placeholder="Qtd" value="${l.qtd}" oninput="compLinhas[${k}].qtd=this.value">
    <input type="number" step="any" min="0" placeholder="Perda %" value="${l.perda||''}" oninput="compLinhas[${k}].perda=this.value">
    <button class="rm" onclick="compLinhas.splice(${k},1);drawCompLines()" title="Remover">✕</button></div>`).join('');
  compLinhas.forEach((l,k)=>{ if(l.item)$('#cp-lines').children[k].querySelector('select').value=l.item; });
}
function salvarComposicao(paiId){
  const pai=paiId||$('#cp-pai').value; if(!pai)return toast('Selecione o item.',true);
  const validas=compLinhas.filter(l=>l.item&&parseFloat(l.qtd)>0);
  if(!validas.length)return toast('Adicione ao menos um componente com quantidade.',true);
  if(validas.some(l=>l.item===pai))return toast('Um item não pode compor a si mesmo.',true);
  S.composicoes=S.composicoes.filter(c=>c.item_pai_id!==pai);
  const rend=parseFloat($('#cp-rend').value)||1;
  validas.forEach(l=>{ const f=itemById(l.item);
    S.composicoes.push({id:uid('CMP'),item_pai_id:pai,item_filho_id:l.item,quantidade:parseFloat(l.qtd),
      unidade:f?f.unidade_base:'un',perda_percentual:parseFloat(l.perda)||0,rendimento:rend,ativo:true,criado_em:new Date().toISOString()}); });
  if(compTipo==='produto'){ const p=itemById(pai); if(p){ p.preco_venda=parseFloat($('#cp-preco').value)||null; p.unidades_equivalentes=parseFloat($('#cp-unideq').value)||1; p.foto_url=$('#cp-foto').value.trim()||null; } }
  registrarEvento('COMPOSICAO_DEFINIDA',`${nomeItem(pai)}: ${validas.length} componentes definidos`,pai);
  closeModal(); scheduleSave(); render(); toast(compTipo==='produto'?'Produto salvo.':'Composição salva.');
}
</script>
<script>
'use strict';
/* ================= COMPRAS ================= */
VIEWS.compras=function(){
  const rows=S.compras.slice().reverse().map(c=>{
    const itens=c.itens.map(l=>`${esc(nomeItem(l.item_id))} <span class="subtle num">(${qty(l.quantidade,l.unidade)} × ${money(l.preco_unitario)})</span>`).join('<br>');
    return `<tr><td><b>${esc(c.fornecedor||'—')}</b><div class="mono-id">${c.id} · ${dBR(c.data)}</div></td>
      <td>${itens}</td><td class="r num"><b>${money(c.valor_total)}</b></td>
      <td class="r">${c.pagamento==='prazo'?'<span class="tag warn">a prazo</span>':'<span class="tag f">à vista</span>'}</td></tr>`;
  }).join('')||`<tr><td colspan="4"><div class="empty"><b>Nenhuma compra registrada</b>Compras são registradas com itens, os preços são históricos e o fornecedor varia por compra. Cadastro ≠ compra.</div></td></tr>`;
  const sug=sugestaoCompras();
  const sugRows=sug.map(x=>{ const u=ultimaCompraDe(x.item.id);
    return `<tr><td><b>${esc(x.item.nome)}</b></td>
      <td class="r num ${x.disp<0?'neg':''}">${qty(x.disp,x.item.unidade_base)}</td>
      <td class="r num subtle">${x.cons>0?qty(Math.round(x.cons*10)/10,x.item.unidade_base)+'/dia':'—'}</td>
      <td class="r num">${x.cobertura!=null?Math.max(0,Math.floor(x.cobertura))+' dias':'—'}</td>
      <td class="r num"><b>${qty(Math.ceil(x.sug),x.item.unidade_base)}</b></td>
      <td class="r num subtle">${u?money(u.preco)+' · '+esc(u.fornecedor||'—'):'sem histórico'}</td></tr>`; }).join('');
  const sugCard=sug.length?`<div class="card" style="margin-bottom:16px"><div class="card-h"><h3>Sugestão de compras</h3>
      <button class="btn sm primary" onclick="comprarSugestao()">Pré-preencher compra</button></div>
    <table><thead><tr><th>Item</th><th class="r">Disponível</th><th class="r">Consumo médio (30 d)</th><th class="r">Cobertura</th><th class="r">Sugerido</th><th class="r">Último preço · fornecedor</th></tr></thead><tbody>${sugRows}</tbody></table>
    <div class="card-b subtle" style="padding-top:10px">Sugestão = atingir o maior entre estoque mínimo e 7 dias de consumo médio, descontado o disponível.</div></div>`:'';
  return header('Compras','var(--m-compras)','Compra registrada → gera entrada no estoque e despesa no financeiro.',
    `<button class="btn primary" onclick="modalCompra()">+ Registrar compra</button>`)+sugCard+
  `<div class="card"><table><thead><tr><th>Fornecedor / Data</th><th>Itens</th><th class="r">Total</th><th class="r">Pagamento</th></tr></thead><tbody>${rows}</tbody></table></div>`;
};
function comprarSugestao(){
  const linhas=sugestaoCompras().map(x=>{ const u=ultimaCompraDe(x.item.id); const q=Math.ceil(x.sug);
    return {item:x.item.id,qtd:q,total:u?(Math.round(u.preco*q*100)/100):'',lote:'',validade:''}; });
  modalCompra(linhas);
}

let cmpLinhas=[];
function modalCompra(prefill){
  const compraveis=S.itens.filter(i=>i.ativo!==false&&temFuncao(i,'compravel'));
  if(!compraveis.length)return toast('Cadastre ao menos um item com a função Comprável.',true);
  cmpLinhas=(prefill&&prefill.length)?prefill:[{item:'',qtd:'',total:'',lote:'',validade:''}];
  openModal(`<div class="m-h"><h3>Registrar compra</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <div class="frow c3">
      <div class="field"><label>Fornecedor</label>
        <select id="cm-fornid" onchange="$('#cm-forn').style.display=this.value?'none':'block';hintFornecedor(this.value)"><option value="">— avulso —</option>${S.fornecedores.filter(f=>f.ativo!==false).map(f=>`<option value="${f.id}">${esc(f.nome)}</option>`).join('')}</select>
        <input id="cm-forn" placeholder="nome do fornecedor avulso" style="margin-top:6px">
        <span class="hint" id="cm-fhint"></span></div>
      <div class="field"><label>Data</label><input id="cm-data" type="date" value="${hoje()}"></div>
      <div class="field"><label>Pagamento</label><select id="cm-pag"><option value="vista">À vista (sai do caixa)</option><option value="prazo">A prazo (contas a pagar)</option></select></div>
    </div>
    <div class="field"><label>Itens comprados — informe a quantidade e o <b>valor total pago</b>; o custo unitário é calculado</label>
      <div class="lines" id="cm-lines"></div>
      <button class="btn sm" onclick="cmpLinhas.push({item:'',qtd:'',total:'',lote:'',validade:''});drawCmpLines()">+ Adicionar item</button></div>
    <div class="subtle num" id="cm-total"></div>
  </div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarCompra()">Registrar compra</button></div>`,true);
  drawCmpLines();
}
function hintFornecedor(fid){
  const el=$('#cm-fhint'); if(!el)return;
  const f=fid?fornecedorById(fid):null;
  el.innerHTML=f?[f.prazo_pagamento_dias!=null?'pagamento em '+f.prazo_pagamento_dias+' dias':'',
    f.prazo_entrega_dias!=null?'entrega em '+f.prazo_entrega_dias+' dias':'',
    f.condicoes?esc(f.condicoes):''].filter(Boolean).join(' · '):'';
}
function drawCmpLines(){
  const opts=S.itens.filter(i=>i.ativo!==false&&temFuncao(i,'compravel')).map(i=>`<option value="${i.id}">${esc(i.nome)} (${i.unidade_base})</option>`).join('');
  $('#cm-lines').innerHTML=cmpLinhas.map((l,k)=>`<div class="line c6">
    <select onchange="cmpLinhas[${k}].item=this.value;cmpTotal()"><option value="">Item…</option>${opts}</select>
    <input type="number" step="any" min="0" placeholder="Qtd" value="${l.qtd}" oninput="cmpLinhas[${k}].qtd=this.value;cmpTotal()">
    <input type="number" step="0.01" min="0" placeholder="R$ total" value="${l.total}" oninput="cmpLinhas[${k}].total=this.value;cmpTotal()">
    <input class="opt" placeholder="Lote" value="${esc(l.lote||'')}" oninput="cmpLinhas[${k}].lote=this.value">
    <input class="opt" type="date" title="Validade" value="${l.validade||''}" oninput="cmpLinhas[${k}].validade=this.value">
    <button class="rm" onclick="cmpLinhas.splice(${k},1);drawCmpLines()">✕</button></div>`).join('');
  cmpLinhas.forEach((l,k)=>{ if(l.item)$('#cm-lines').children[k].querySelector('select').value=l.item; });
  cmpTotal();
}
function cmpTotal(){ const t=cmpLinhas.reduce((a,l)=>a+(parseFloat(l.total)||0),0);
  const unit=cmpLinhas.filter(l=>l.item&&parseFloat(l.qtd)>0&&parseFloat(l.total)>0)
    .map(l=>{const i=itemById(l.item);return (i?i.nome.split(' ')[0]:'?')+' '+money(parseFloat(l.total)/parseFloat(l.qtd))+'/'+(i?i.unidade_base:'');}).join(' · ');
  const el=$('#cm-total'); if(el)el.innerHTML='Total da compra: <b>'+money(t)+'</b>'+(unit?'<br>Custo unitário calculado: '+unit:''); }
function salvarCompra(){
  const validas=cmpLinhas.filter(l=>l.item&&parseFloat(l.qtd)>0&&parseFloat(l.total)>=0);
  if(!validas.length)return toast('Adicione ao menos um item com quantidade e valor total.',true);
  const id=uid('CPR'), data=$('#cm-data').value||hoje(), pag=$('#cm-pag').value;
  const fornId=$('#cm-fornid').value||null;
  const forn=fornId?(fornecedorById(fornId)||{}).nome:$('#cm-forn').value.trim();
  const itens=validas.map(l=>({item_id:l.item,quantidade:parseFloat(l.qtd),
    preco_unitario:parseFloat(l.total)/parseFloat(l.qtd), valor_total:parseFloat(l.total),
    unidade:(itemById(l.item)||{}).unidade_base,lote:(l.lote||'').trim()||null,validade:l.validade||null}));
  const total=itens.reduce((a,l)=>a+l.quantidade*l.preco_unitario,0);
  S.compras.push({id,fornecedor:forn,fornecedor_id:fornId,data,pagamento:pag,itens,valor_total:total,criado_em:new Date().toISOString()});
  itens.forEach(l=>{ if(temFuncao(itemById(l.item_id),'estocavel'))
    registrarMovimento(l.item_id,l.quantidade,'COMPRA_REGISTRADA',id,l.preco_unitario,'Compra '+(forn||id),l.lote,l.validade); });
  let venc=null;
  if(pag==='prazo'&&fornId){ const f=fornecedorById(fornId);
    if(f&&f.prazo_pagamento_dias!=null){ const dv=new Date(data+'T12:00:00'); dv.setDate(dv.getDate()+f.prazo_pagamento_dias); venc=dv.toISOString().slice(0,10); } }
  S.lancamentos.push({id:uid('LAN'),tipo:'despesa',descricao:'Compra '+(forn||id),valor:total,categoria:'Compras',
    data,data_vencimento:venc,status:pag==='vista'?'liquidado':'aberto',data_liquidacao:pag==='vista'?data:null,origem:id});
  registrarEvento('COMPRA_REGISTRADA',`${forn||'Fornecedor'} · ${itens.length} itens · ${money(total)} — gerou entrada no estoque`,id);
  closeModal(); scheduleSave(); render(); toast('Compra registrada: estoque e financeiro atualizados.');
}

/* ================= ESTOQUE ================= */
VIEWS.estoque=function(){
  const estocaveis=S.itens.filter(i=>temFuncao(i,'estocavel'));
  const rows=estocaveis.map(i=>{
    const s=saldo(i.id), res=reservado(i.id), disp=s-res, c=custoItem(i.id);
    const st=i.estoque_minimo>0&&disp<i.estoque_minimo?'<span class="tag bad">abaixo do mínimo</span>':(s<=0?'<span class="tag mut">zerado</span>':'<span class="tag f">ok</span>');
    return `<tr style="${i.ativo===false?'opacity:.45':''}"><td><b>${esc(i.nome)}</b></td>
      <td class="r num qty-pill ${s<0?'neg':''}">${qty(s,i.unidade_base)}</td>
      <td class="r num ${res?'':'subtle'}">${res?qty(res,i.unidade_base):'—'}</td>
      <td class="r num qty-pill ${disp<0?'neg':''}"><b>${qty(disp,i.unidade_base)}</b></td>
      <td class="r num subtle">${i.estoque_minimo?qty(i.estoque_minimo,i.unidade_base):'—'}</td>
      <td class="r num">${c!=null?money(c):'—'}</td>
      <td class="r num">${c!=null&&s>0?money(c*s):'—'}</td><td>${st}</td>
      <td class="r"><button class="btn sm" onclick="modalAjuste('${i.id}')">Ajustar</button></td></tr>`;
  }).join('')||`<tr><td colspan="9"><div class="empty"><b>Nenhum item estocável</b>Marque a função Estocável nos itens que devem ser controlados em estoque.</div></td></tr>`;
  const lotesRows=[];
  estocaveis.forEach(i=>lotesDe(i.id).forEach(l=>{ if(l.saldo>0.0001&&(l.lote||l.validade))lotesRows.push({i,l}); }));
  lotesRows.sort((a,b)=>((a.l.validade||'9999'))<((b.l.validade||'9999'))?-1:1);
  const lotesHtml=lotesRows.map(({i,l})=>`<tr><td>${esc(i.nome)}</td><td>${esc(l.lote||'—')}</td>
    <td>${l.validade?dBR(l.validade):'—'} ${statusValidade(l.validade)}</td>
    <td class="r num">${qty(l.saldo,i.unidade_base)}</td></tr>`).join('')||
    '<tr><td colspan="4" class="empty">Nenhum lote em aberto. Informe lote e validade ao registrar compras — a baixa segue PVPS (primeiro que vence, primeiro que sai).</td></tr>';

  const movs=S.movimentos.slice(-40).reverse().map(m=>{
    const i=itemById(m.item_id);
    return `<tr><td>${esc(i?i.nome:'?')}<div class="mono-id">${dtBR(m.data)}</div></td>
      <td class="r num ${m.quantidade<0?'neg':'pos'}">${m.quantidade>0?'+':''}${qty(m.quantidade,i?i.unidade_base:'')}</td>
      <td><span class="tag" style="background:#F1EFE6">${m.origem_evento.replaceAll('_',' ').toLowerCase()}</span></td>
      <td class="subtle">${esc(m.lote||'')}${m.validade?' · val. '+dBR(m.validade):''}</td>
      <td class="r num subtle">${m.custo_unitario!=null?money(m.custo_unitario):''}</td></tr>`;
  }).join('')||'<tr><td colspan="5" class="empty">Sem movimentações — o saldo é sempre resultado dos eventos de entradas e saídas.</td></tr>';

  return header('Estoque','var(--m-estoque)','Saldo é resultado das movimentações · Disponível = saldo − reservado em pedidos confirmados · baixa por PVPS.')+
  `<div class="card"><div class="card-h"><h3>Saldos por item</h3></div>
    <table><thead><tr><th>Item</th><th class="r">Saldo</th><th class="r">Reservado</th><th class="r">Disponível</th><th class="r">Mínimo</th><th class="r">Custo médio</th><th class="r">Valor</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
   <div class="card section-gap"><div class="card-h"><h3>Lotes e validades (PVPS)</h3></div>
    <table><thead><tr><th>Item</th><th>Lote</th><th>Validade</th><th class="r">Saldo do lote</th></tr></thead><tbody>${lotesHtml}</tbody></table></div>
   <div class="card section-gap"><div class="card-h"><h3>Movimentações recentes</h3></div>
    <table><thead><tr><th>Item / Data</th><th class="r">Qtd</th><th>Origem (evento)</th><th>Lote</th><th class="r">Custo unit.</th></tr></thead><tbody>${movs}</tbody></table></div>`;
};
function modalAjuste(itemId){
  const i=itemById(itemId);
  openModal(`<div class="m-h"><h3>Ajuste de estoque — ${esc(i.nome)}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <p class="subtle" style="margin-bottom:12px">Saldo atual: <b class="num">${qty(saldo(itemId),i.unidade_base)}</b>. Ajustes registram perdas, quebras e correções de contagem — sempre como movimentação rastreável.</p>
    <div class="frow c2">
      <div class="field"><label>Quantidade (${i.unidade_base}) *</label><input id="aj-qtd" type="number" step="any" placeholder="use negativo para perda/quebra"></div>
      <div class="field"><label>Motivo *</label><input id="aj-motivo" placeholder="ex.: quebra, vencimento, contagem"></div>
    </div>
  </div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarAjuste('${itemId}')">Registrar ajuste</button></div>`);
}
function salvarAjuste(itemId){
  const q=parseFloat($('#aj-qtd').value), motivo=$('#aj-motivo').value.trim();
  if(!q)return toast('Informe a quantidade (positiva ou negativa).',true);
  if(!motivo)return toast('Informe o motivo do ajuste.',true);
  const id=uid('AJU');
  registrarMovimento(itemId,q,'AJUSTE_ESTOQUE',id,null,motivo);
  registrarEvento('AJUSTE_ESTOQUE',`${nomeItem(itemId)}: ${q>0?'+':''}${q} (${motivo})`,id);
  closeModal(); scheduleSave(); render(); toast('Ajuste registrado.');
}

/* ================= PRODUÇÃO ================= */
VIEWS.producao=function(){
  const rows=S.producoes.slice().reverse().map(p=>`<tr>
    <td><b>${esc(nomeItem(p.item_produzido_id))}</b><div class="mono-id">${p.id} · ${dBR(p.data)}</div></td>
    <td class="r num">${qty(p.quantidade,(itemById(p.item_produzido_id)||{}).unidade_base)}</td>
    <td class="r num">${p.custo_unitario!=null?money(p.custo_unitario):'—'}</td>
    <td class="r num">${p.custo_unitario!=null?money(p.custo_unitario*p.quantidade):'—'}</td>
    <td class="subtle">${esc(p.observacao||'')}</td></tr>`).join('')||
    `<tr><td colspan="5"><div class="empty"><b>Nenhuma produção registrada</b>Produção consome os componentes da composição (insumos, embalagens) e gera entrada do item produzido — com custo fotografado no momento.</div></td></tr>`;
  return header('Produção','var(--m-producao)','Produção realizada → baixa insumos e gera itens produzidos.',
    `<button class="btn primary" onclick="modalProducao()">+ Registrar produção</button>`)+
  `<div class="card"><table><thead><tr><th>Item produzido</th><th class="r">Qtd</th><th class="r">Custo unit.</th><th class="r">Custo total</th><th>Obs.</th></tr></thead><tbody>${rows}</tbody></table></div>`;
};
function modalProducao(preId,preQtd){
  const produziveis=S.itens.filter(i=>i.ativo!==false&&temFuncao(i,'produzivel')&&componentesDe(i.id).length);
  if(!produziveis.length)return toast('Nenhum item produzível com composição definida. Defina a composição primeiro.',true);
  openModal(`<div class="m-h"><h3>Registrar produção</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <div class="frow c3">
      <div class="field" style="grid-column:span 2"><label>Item a produzir *</label>
        <select id="pr-item" onchange="previewProducao()">${produziveis.map(i=>`<option value="${i.id}">${esc(i.nome)}</option>`).join('')}</select></div>
      <div class="field"><label>Quantidade *</label><input id="pr-qtd" type="number" step="any" min="0" value="1" oninput="previewProducao()"></div>
    </div>
    <div class="frow c3">
      <div class="field"><label>Data</label><input id="pr-data" type="date" value="${hoje()}"></div>
      <div class="field"><label>Validade do produzido</label><input id="pr-val" type="date"><span class="hint">opcional — gera lote com PVPS</span></div>
      <div class="field"><label>Observação</label><input id="pr-obs" placeholder="ex.: lote da manhã"></div>
    </div>
    <div class="field"><label>Consumo previsto (baixa automática no estoque)</label><div id="pr-preview"></div></div>
  </div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarProducao()">Registrar produção</button></div>`,true);
  if(preId&&$('#pr-item').querySelector('option[value="'+preId+'"]'))$('#pr-item').value=preId;
  if(preQtd)$('#pr-qtd').value=Math.round(preQtd*1000)/1000;
  previewProducao();
}
function previewProducao(){
  const pid=$('#pr-item').value, q=parseFloat($('#pr-qtd').value)||0;
  const comps=componentesDe(pid), rend=rendimentoDe(pid);
  let custoTot=0, custoOk=false;
  const rows=comps.map(c=>{
    const f=itemById(c.item_filho_id); const need=c.quantidade*q/rend*(1+(c.perda_percentual||0)/100);
    const disp=temFuncao(f,'estocavel')?saldo(f.id):null;
    const cu=custoItem(c.item_filho_id); if(cu!=null){custoOk=true;custoTot+=cu*need;}
    const falta=disp!=null&&disp<need;
    return `<tr><td>${esc(f?f.nome:'?')}</td><td class="r num">${qty(need,c.unidade)}</td>
      <td class="r num ${falta?'neg':''}">${disp!=null?qty(disp,c.unidade):'<span class="subtle">não estocável</span>'}</td>
      <td>${falta?'<span class="tag bad">insuficiente</span>':''}</td></tr>`;
  }).join('');
  $('#pr-preview').innerHTML=`<table><thead><tr><th>Componente</th><th class="r">Necessário</th><th class="r">Disponível</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    <p class="subtle num" style="margin-top:8px">Custo estimado: ${custoOk?money(custoTot)+' ('+money(q?custoTot/q:0)+' / un produzida)':'— cadastre compras para calcular'}</p>`;
}
function salvarProducao(){
  const pid=$('#pr-item').value, q=parseFloat($('#pr-qtd').value);
  if(!q||q<=0)return toast('Informe a quantidade produzida.',true);
  const comps=componentesDe(pid), rend=rendimentoDe(pid), id=uid('PRD'), data=$('#pr-data').value||hoje();
  let custoTot=0, custoOk=false;
  comps.forEach(c=>{
    const need=c.quantidade*q/rend*(1+(c.perda_percentual||0)/100);
    const cu=custoItem(c.item_filho_id); if(cu!=null){custoOk=true;custoTot+=cu*need;}
    if(temFuncao(itemById(c.item_filho_id),'estocavel'))
      consumirFEFO(c.item_filho_id,need,'PRODUCAO_REALIZADA',id,'Produção '+nomeItem(pid));
  });
  const custoUnit=custoOk&&q?custoTot/q:null;
  const val=$('#pr-val').value||null;
  registrarMovimento(pid,q,'PRODUCAO_REALIZADA',id,custoUnit,'Produção',val?id:null,val);
  S.producoes.push({id,item_produzido_id:pid,quantidade:q,data,custo_unitario:custoUnit,
    observacao:$('#pr-obs').value.trim(),criado_em:new Date().toISOString()});
  registrarEvento('PRODUCAO_REALIZADA',`${qty(q,(itemById(pid)||{}).unidade_base)} de ${nomeItem(pid)} — insumos baixados, produto gerado`,id);
  closeModal(); scheduleSave(); render(); toast('Produção registrada.');
}

/* ================= PEDIDOS ================= */
const STATUS_PED={
  pedido:{label:'Pedido',tag:'mut'}, confirmado:{label:'Confirmado',tag:'warn'},
  em_producao:{label:'Em produção',tag:'warn'}, disponivel:{label:'Disponível p/ entrega',tag:'info'},
  entrega_parcial:{label:'Entrega Parcial',tag:'warn'}, entregue:{label:'Entregue Ag. Pagamento',tag:'info'},
  finalizado:{label:'Finalizado',tag:'f'}, cancelado:{label:'Cancelado',tag:'bad'}
};
const STATUS_SISTEMA=Object.keys(STATUS_PED); // esses têm efeito real (estoque/financeiro) e não podem ser removidos
function statusInfo(key){
  if(STATUS_PED[key])return STATUS_PED[key];
  const c=(S.status_personalizados||[]).find(s=>s.id===key);
  return c?{label:c.nome,tag:'info'}:{label:key,tag:'mut'};
}
function statusDisponiveis(){
  return [...Object.entries(STATUS_PED).map(([id,v])=>({id,nome:v.label,sistema:true})),
          ...(S.status_personalizados||[]).filter(s=>s.ativo!==false).map(s=>({id:s.id,nome:s.nome,sistema:false}))];
}
function pedidoPago(p){ return !!(p.pago ?? p.recebido); }
function totalEntregue(p){ return (p.itens||[]).every(l=>(l.quantidade_entregue||0)>=l.quantidade); }
function qtdPendente(l){ return Math.max(0,l.quantidade-(l.quantidade_entregue||0)); }
function togglePago(id){
  const p=S.pedidos.find(x=>x.id===id); if(!p)return;
  if(p.status==='pedido')return toast('Confirme o pedido antes de marcar pagamento.',true);
  p.pago=!p.pago;
  if(p.pago&&totalEntregue(p)&&!['pedido','finalizado','cancelado'].includes(p.status)){
    p.status='finalizado'; p.recebido=true;
    registrarEvento('PEDIDO_STATUS_ALTERADO',`${p.cliente||id}: marcado como pago — pedido já estava entregue, finalizado`,id);
  } else if(!p.pago&&p.status==='finalizado'){
    p.status=totalEntregue(p)?'entregue':'entrega_parcial'; p.recebido=false;
    registrarEvento('PEDIDO_STATUS_ALTERADO',`${p.cliente||id}: pagamento desmarcado, volta pra "${statusInfo(p.status).label}"`,id);
  } else {
    registrarEvento('PEDIDO_STATUS_ALTERADO',`${p.cliente||id}: ${p.pago?'marcado como pago':'pagamento desmarcado'}`,id);
  }
  scheduleSave(); render(); toast(p.pago?'Marcado como pago.':'Pagamento desmarcado.');
}
function modalStatusPersonalizados(){
  openModal(`<div class="m-h"><h3>Status de pedido personalizados</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b">
    <p class="subtle" style="margin-bottom:12px">Os status do sistema (Pedido, Confirmado, Em produção, Disponível, Entrega Parcial, Entregue Ag. Pagamento, Finalizado, Cancelado) já controlam estoque e financeiro e não podem ser removidos. Aqui você pode adicionar status extras só pra organização do seu fluxo (ex.: "Em expedição", "Aguardando retirada") — eles não mexem em estoque nem caixa.</p>
    <div id="status-crud-list">${renderStatusCrud()}</div>
    <button class="btn sm" style="margin-top:8px" onclick="S.status_personalizados.push({id:uid('STC'),nome:'',ativo:true,criado_em:new Date().toISOString()});$('#status-crud-list').innerHTML=renderStatusCrud();setTimeout(()=>{const ins=document.querySelectorAll('#status-crud-list input');if(ins.length)ins[ins.length-1].focus()},30)">+ Novo status</button>
  </div>
  <div class="m-f"><button class="btn primary" onclick="closeModal();render()">Concluído</button></div>`,true);
}
function renderStatusCrud(){
  return (S.status_personalizados||[]).map(s=>`<div class="line" style="grid-template-columns:1fr 34px;opacity:${s.ativo===false?.5:1}">
      <input value="${esc(s.nome)}" placeholder="ex.: Em expedição" onchange="renomearStatusPersonalizado('${s.id}',this.value)">
      <button class="rm" title="Remover" onclick="removerStatusPersonalizado('${s.id}')">✕</button></div>`).join('')
    ||'<p class="subtle">Nenhum status extra ainda — clique em "+ Novo status".</p>';
}
function renomearStatusPersonalizado(id,valor){
  const s=(S.status_personalizados||[]).find(x=>x.id===id); if(!s)return;
  const nome=valor.trim();
  if(!nome){ removerStatusPersonalizado(id); return; }
  s.nome=nome; scheduleSave(); const el=$('#status-crud-list'); if(el)el.innerHTML=renderStatusCrud();
}
function removerStatusPersonalizado(id){
  const emUso=S.pedidos.some(p=>p.status===id);
  if(emUso&&!confirm('Esse status está em uso em algum pedido. Remover mesmo assim? Os pedidos ficam com o status antigo salvo, mas ele some da lista de opções.'))return;
  S.status_personalizados=(S.status_personalizados||[]).filter(x=>x.id!==id);
  scheduleSave(); const el=$('#status-crud-list'); if(el)el.innerHTML=renderStatusCrud();
}
let pedidoDetalheId=null;
let filtroStatusPedido='';
let filtroBuscaPedido='';
VIEWS.pedidos=function(){
  garantirFormasPadrao();
  const abertos=S.pedidos.filter(p=>!['pedido','finalizado','cancelado'].includes(p.status)).length;
  let pedidosFiltrados=S.pedidos.filter(p=>!filtroStatusPedido||p.status===filtroStatusPedido);
  if(filtroBuscaPedido){
    const q=filtroBuscaPedido.toLowerCase();
    pedidosFiltrados=pedidosFiltrados.filter(p=>{
      const cli=(p.cliente_id&&clienteById(p.cliente_id)?clienteById(p.cliente_id).nome:p.cliente)||'';
      const itensTxt=(p.itens||[]).map(l=>nomeLinha(l)).join(' ');
      return p.id.toLowerCase().includes(q)||(p.numero&&String(p.numero).includes(q))||cli.toLowerCase().includes(q)||itensTxt.toLowerCase().includes(q);
    });
  }
  const ORDEM_STATUS=Object.keys(STATUS_PED); // pedido→...→finalizado→cancelado, na ordem certa do fluxo
  const rankStatus=st=>{ const i=ORDEM_STATUS.indexOf(st); return i===-1?ORDEM_STATUS.length:i; };
  const lista=filtroStatusPedido
    ? pedidosFiltrados.slice().reverse()
    : pedidosFiltrados.slice().sort((a,b)=>{
        const r=rankStatus(a.status)-rankStatus(b.status); if(r!==0)return r;
        return (b.criado_em||b.data_pedido||'').localeCompare(a.criado_em||a.data_pedido||'');
      });
  const rows=lista.map(p=>{
    const st=statusInfo(p.status);
    const cli=p.cliente_id&&clienteById(p.cliente_id)?clienteById(p.cliente_id):null;
    const nItens=(p.itens||[]).reduce((a,l)=>a+l.quantidade,0);
    return `<tr style="cursor:pointer" onclick="pedidoDetalheId='${p.id}';nav('pedido-detalhe','pedidos')">
      <td><b>${p.numero?'#'+p.numero:'—'}</b><div class="mono-id">${p.id}</div></td>
      <td class="subtle">${dBR(p.data_pedido)}${p.data_entrega?' → '+dBR(p.data_entrega):''}</td>
      <td><b>${esc(cli?nomeProprio(cli.nome):nomeProprio(p.cliente||'Cliente avulso'))}</b></td>
      <td class="r num">${nItens} un.</td>
      <td class="r num"><b>${money(p.valor_total)}</b></td>
      <td><span class="tag ${st.tag}">${st.label}</span>${pedidoPago(p)?' 💰':''}</td>
      <td class="r" onclick="event.stopPropagation()"><button class="btn sm ghost" title="Ver recibo" onclick="modalRecibo('${p.id}')">🧾</button> <button class="btn sm ghost" title="Imprimir etiquetas" onclick="imprimirEtiquetas('${p.id}')">🏷️</button></td></tr>`;
  }).join('')||`<tr><td colspan="7"><div class="empty"><b>Nenhum pedido${filtroStatusPedido?' com esse status':''}</b>Fluxo: Pedido → Confirmado (reserva estoque) → Em produção → Disponível → Entregue (baixa estoque, define pagamento). Os valores são fotografados no momento da venda.</div></td></tr>`;
  const statusChips=`<button class="cat-chip ${!filtroStatusPedido?'active':''}" style="${!filtroStatusPedido?'background:var(--primary)':''}" onclick="filtroStatusPedido='';render()">Todos (${S.pedidos.length})</button>`+
    statusDisponiveis().map(s=>{
      const n=S.pedidos.filter(p=>p.status===s.id).length;
      return `<button class="cat-chip ${filtroStatusPedido===s.id?'active':''}" style="${filtroStatusPedido===s.id?'background:var(--primary)':''}" onclick='filtroStatusPedido=${JSON.stringify(s.id)};render()'>${esc(s.nome)} (${n})</button>`;
    }).join('');

  // ---------- versão mobile: lista agrupada por dia, tipo Kyte ----------
  const listaMobile=pedidosFiltrados.slice().sort((a,b)=>(b.criado_em||b.data_pedido||'').localeCompare(a.criado_em||a.data_pedido||''));
  const grupos=[];
  listaMobile.forEach(p=>{ let g=grupos.find(x=>x.data===p.data_pedido); if(!g){ g={data:p.data_pedido,itens:[]}; grupos.push(g); } g.itens.push(p); });
  const totalGeral=pedidosFiltrados.reduce((a,p)=>a+(p.valor_total||0),0);
  const mobileHtml=grupos.map(g=>{
    const totalDia=g.itens.reduce((a,p)=>a+(p.valor_total||0),0);
    const cards=g.itens.map(p=>{
      const st=statusInfo(p.status);
      const cli=p.cliente_id&&clienteById(p.cliente_id)?clienteById(p.cliente_id):null;
      const nomeCli=cli?nomeProprio(cli.nome):nomeProprio(p.cliente||'Cliente avulso');
      const nItens=(p.itens||[]).reduce((a,l)=>a+l.quantidade,0);
      const resumoItens=(p.itens||[]).slice(0,3).map(l=>l.quantidade+'x '+nomeLinha(l)).join(', ');
      const hora=p.criado_em?new Date(p.criado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
      return `<div class="ped-card" onclick="pedidoDetalheId='${p.id}';nav('pedido-detalhe','pedidos')">
        <div class="ped-card-top"><span class="tag ${st.tag}">${st.label}</span><b class="num">${money(p.valor_total)}</b>${hora?`<span class="subtle">${hora}</span>`:''}</div>
        <div class="ped-card-mid subtle">${nItens} itens: ${esc(resumoItens)}${(p.itens||[]).length>3?'…':''}</div>
        <div class="ped-card-bot"><b>${esc(nomeCli)}</b><span class="mono-id">${p.numero?'#'+p.numero+' · ':''}${p.id}</span>${pedidoPago(p)?' 💰':''}</div>
      </div>`;
    }).join('');
    return `<div class="ped-day"><div class="ped-day-h">${dBR(g.data)}</div><div class="ped-day-sub subtle">${g.itens.length} pedido(s) · ${money(totalDia)}</div>${cards}</div>`;
  }).join('')||`<div class="card"><div class="empty"><b>Nenhum pedido${filtroStatusPedido||filtroBuscaPedido?' com esse filtro':''}</b></div></div>`;
  const statusSelectMobile=`<select class="status-pill-select" onchange="filtroStatusPedido=this.value;render()">
    <option value="" ${!filtroStatusPedido?'selected':''}>Todos os status (${S.pedidos.length})</option>
    ${statusDisponiveis().map(s=>{ const n=S.pedidos.filter(p=>p.status===s.id).length;
      return `<option value="${s.id}" ${filtroStatusPedido===s.id?'selected':''}>${esc(s.nome)} (${n})</option>`; }).join('')}
    </select>`;

  return header('Pedidos','var(--m-pedidos)',`Fluxo: Pedido (não conta produção/custo) → Confirmado → Em produção (contam produção + "em aberto") → Disponível → Entrega (Parcial ou Ag. Pagamento) → Finalizado. "Pago" pode ser marcado a partir de Confirmado, em qualquer etapa. ${abertos?`<b>${abertos} em andamento.</b>`:''}`,
    `<button class="btn" onclick="modalStatusPersonalizados()">⚙️ Status</button>
     <button class="btn primary" onclick="pedLinhas=[];vendaCat='__todas__';vendaBusca='';nav('venda','pedidos')">+ Novo pedido</button>`)+
  `<input class="search" style="width:100%;margin-top:16px" placeholder="Item, cliente ou código" value="${esc(filtroBuscaPedido)}" oninput="filtroBuscaPedido=this.value;render();this.focus();this.setSelectionRange(99,99)">
  <div class="only-mobile" style="margin-top:12px">${statusSelectMobile}</div>
  <div class="only-desktop"><div class="cat-chips">${statusChips}</div>
    <div class="card"><table><thead><tr><th>Nº</th><th>Data</th><th>Cliente</th><th class="r">Itens</th><th class="r">Valor</th><th>Status</th><th class="r">Recibo</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>
  <div class="only-mobile ped-total-bar"><b>Total em pedidos</b><span class="num">${money(totalGeral)} em ${pedidosFiltrados.length} pedido(s)</span></div>
  <div class="only-mobile">${mobileHtml}</div>`;
};

function aplicarNovoStatus(id){ const sel=$('#pd-status-sel'); if(sel)mudarStatusPedido(id,sel.value); }
function mudarStatusPedido(id,novo){
  const p=S.pedidos.find(x=>x.id===id); if(!p)return;
  if(novo===p.status)return;
  if(['entregue','entrega_parcial'].includes(novo)){ modalEntrega(id); return; }
  if(novo==='cancelado'){ cancelarPedido(id); return; }
  if(novo==='finalizado'&&p.status==='entregue'){ receberPedido(id); return; }
  if(novo==='finalizado'&&p.status!=='entregue'){ modalEntrega(id); return; } // ainda não passou por entrega — coleta forma de pagamento primeiro
  if(['entregue','finalizado','entrega_parcial'].includes(p.status)){
    if(!confirm(`Esse pedido já estava "${statusInfo(p.status).label}". Mudar o status agora devolve o estoque do que foi entregue e remove os lançamentos financeiros dessa entrega. Confirmar?`))return;
    p.itens.forEach(l=>{ const q=l.quantidade_entregue||0; if(q<=0)return;
      if(l.componentes&&l.componentes.length){
        l.componentes.forEach(c=>{ if(temFuncao(itemById(c.item_id),'estocavel'))
          registrarMovimento(c.item_id,c.quantidade*q,'DEVOLUCAO_CANCELAMENTO',id,null,'Estorno por mudança de status'); });
      } else {
        if(temFuncao(itemById(l.item_id),'estocavel'))
          registrarMovimento(l.item_id,q,'DEVOLUCAO_CANCELAMENTO',id,null,'Estorno por mudança de status');
        delete l.cmv_unitario;
      }
      l.quantidade_entregue=0; });
    S.lancamentos=S.lancamentos.filter(l=>l.origem!==id);
    S.clientes_mov=S.clientes_mov.filter(m=>m.origem!==id);
    p.recebido=false; p.faturamento=null; p.data_entrega=null;
  }
  if(novo==='confirmado'){
    const falta=p.itens.filter(l=>temFuncao(itemById(l.item_id),'estocavel')&&disponivel(l.item_id)<l.quantidade);
    if(falta.length&&!confirm('Disponível insuficiente (saldo − reservas) para: '+falta.map(l=>nomeItem(l.item_id)).join(', ')+'. Confirmar mesmo assim?'))return;
  }
  const antigo=statusInfo(p.status).label;
  p.status=novo;
  registrarEvento('PEDIDO_STATUS_ALTERADO',`${p.cliente||id}: status "${antigo}" → "${statusInfo(novo).label}"`,id);
  scheduleSave(); render(); toast('Status atualizado.');
}

function executarEntrega(id,qtds,modo,formaId){
  const p=S.pedidos.find(x=>x.id===id); if(!p)return;
  const faltam=p.itens.filter((l,k)=>qtds[k]>0&&temFuncao(itemById(l.item_id),'estocavel')&&saldo(l.item_id)<qtds[k]);
  if(faltam.length&&!confirm('Estoque insuficiente para: '+faltam.map(l=>nomeItem(l.item_id)).join(', ')+'. Entregar mesmo assim? O saldo ficará negativo.'))return;
  const jaPago=pedidoPago(p);
  if(!p.data_entrega)p.data_entrega=hoje();
  p.itens.forEach((l,k)=>{
    const q=qtds[k]; if(q<=0)return;
    l.quantidade_entregue=(l.quantidade_entregue||0)+q;
    if(l.componentes&&l.componentes.length){
      l.componentes.forEach(c=>{
        if(temFuncao(itemById(c.item_id),'estocavel'))
          consumirFEFO(c.item_id,c.quantidade*q,'PEDIDO_ENTREGUE',id,'Pedido '+(p.cliente||id)+' · '+(l.nome_custom||'personalizado'));
      });
      return;
    }
    if(l.cmv_unitario==null)l.cmv_unitario=custoItem(l.item_id); // fotografia do custo na primeira baixa
    if(temFuncao(itemById(l.item_id),'estocavel'))
      consumirFEFO(l.item_id,q,'PEDIDO_ENTREGUE',id,'Pedido '+(p.cliente||id));
  });
  const completo=totalEntregue(p);
  if(!completo){
    p.status='entrega_parcial';
    registrarEvento('PEDIDO_ENTREGUE',`${p.cliente||id} · entrega parcial registrada`,id);
    scheduleSave(); render(); toast('Entrega parcial registrada. Falta entregar o restante depois.');
    return;
  }
  if(jaPago){
    p.status='finalizado'; p.recebido=true;
    if(!p.faturamento){
      p.faturamento='pago';
      S.lancamentos.push({id:uid('LAN'),tipo:'receita',descricao:'Pedido '+(p.cliente||id),valor:p.valor_total,
        categoria:'Vendas',data:p.data_entrega,status:'liquidado',data_liquidacao:p.data_entrega,origem:id});
    }
    registrarEvento('PEDIDO_ENTREGUE',`${p.cliente||id} · ${money(p.valor_total)} — já estava pago, pedido finalizado`,id);
    scheduleSave(); render(); toast('Pedido entregue e finalizado.');
    return;
  }
  p.faturamento=modo; p.forma_id=formaId||null;
  p.status=(modo==='pago')?'finalizado':'entregue';
  if(modo==='pago')p.pago=true;
  if(modo==='canal'){
    p.recebido=false;
    const cn=canalById(p.canal_id)||{nome:'Canal',taxa_percentual:0};
    S.lancamentos.push({id:uid('LAN'),tipo:'receita',descricao:'Pedido '+(p.cliente||id)+' · '+cn.nome,valor:p.valor_total,
      categoria:'Vendas '+cn.nome,data:p.data_entrega,status:'aberto',data_liquidacao:null,origem:id});
    const comissao=Math.round(p.valor_total*(cn.taxa_percentual||0))/100;
    if(comissao>0)S.lancamentos.push({id:uid('LAN'),tipo:'despesa',descricao:'Comissão '+cn.nome+' — pedido '+id,valor:comissao,
      categoria:'Comissões',data:p.data_entrega,status:'aberto',data_liquidacao:null,origem:id});
    registrarEvento('PEDIDO_ENTREGUE',`${p.cliente||id} · ${money(p.valor_total)} via ${cn.nome} — a receber ${money(p.valor_total-comissao)} líquido`,id);
  } else if(modo==='conta'){
    p.recebido=false;
    S.clientes_mov.push({id:uid('CMV2'),cliente_id:p.cliente_id,tipo:'debito',valor:p.valor_total,
      descricao:'Pedido '+id,forma_id:null,data:p.data_entrega,origem:id,criado_em:new Date().toISOString()});
    registrarEvento('PEDIDO_ENTREGUE',`${p.cliente||id} · ${money(p.valor_total)} — lançado na conta do cliente`,id);
  } else if(modo==='areceber'){
    p.recebido=false;
    S.lancamentos.push({id:uid('LAN'),tipo:'receita',descricao:'Pedido '+(p.cliente||id),valor:p.valor_total,
      categoria:'Vendas',data:p.data_entrega,status:'aberto',data_liquidacao:null,origem:id});
    registrarEvento('PEDIDO_ENTREGUE',`${p.cliente||id} · ${money(p.valor_total)} — em contas a receber`,id);
  } else {
    p.recebido=true;
    S.lancamentos.push({id:uid('LAN'),tipo:'receita',descricao:'Pedido '+(p.cliente||id),valor:p.valor_total,
      categoria:'Vendas',forma_id:formaId,data:p.data_entrega,status:'liquidado',data_liquidacao:p.data_entrega,origem:id});
    registrarEvento('PEDIDO_ENTREGUE',`${p.cliente||id} · ${money(p.valor_total)} — pago (${formaById(formaId)?formaById(formaId).nome:''}), caixa atualizado`,id);
  }
  scheduleSave(); render(); toast(modo==='pago'?'Pedido entregue e finalizado.':'Pedido entregue.');
}
function receberPedido(id){
  const p=S.pedidos.find(x=>x.id===id); if(!p)return;
  p.recebido=true; p.pago=true; p.status='finalizado';
  S.lancamentos.filter(l=>l.origem===id&&l.status==='aberto').forEach(l=>{ l.status='liquidado'; l.data_liquidacao=hoje(); });
  registrarEvento(p.faturamento==='canal'?'REPASSE_CANAL':'RECEBIMENTO_REALIZADO',`${p.cliente||id} · ${money(p.valor_total)} — ${p.faturamento==='canal'?'repasse do canal liquidado (receita e comissão)':'baixa contas a receber, atualiza caixa'} · pedido finalizado`,id);

function cancelarPedido(id){
  const p=S.pedidos.find(x=>x.id===id); if(!p)return;
  const teveEntregaParcialOuTotal=['entregue','finalizado','entrega_parcial'].includes(p.status);
  if(!confirm('Cancelar o pedido '+id+'?'+(teveEntregaParcialOuTotal?' Movimentações do que já foi entregue serão revertidas.':'')))return;
  if(teveEntregaParcialOuTotal){
    p.itens.forEach(l=>{ const q=l.quantidade_entregue||0; if(q<=0)return;
      if(l.componentes&&l.componentes.length){
        l.componentes.forEach(c=>{ if(temFuncao(itemById(c.item_id),'estocavel'))
          registrarMovimento(c.item_id,c.quantidade*q,'DEVOLUCAO_CANCELAMENTO',id,null,'Estorno pedido'); });
      } else if(temFuncao(itemById(l.item_id),'estocavel'))
        registrarMovimento(l.item_id,q,'DEVOLUCAO_CANCELAMENTO',id,null,'Estorno pedido');
      l.quantidade_entregue=0; });
    S.lancamentos=S.lancamentos.filter(l=>l.origem!==id);
    S.clientes_mov=S.clientes_mov.filter(m=>m.origem!==id);
  }
  p.status='cancelado';
  registrarEvento('DEVOLUCAO_CANCELAMENTO',`Pedido ${p.cliente||id} cancelado — movimentos revertidos/ajustados`,id);
  scheduleSave(); render(); toast('Pedido cancelado.');
}
function prepararLogoImpressao(cb){
  const idn=getIdent();
  if(!idn.logo_img){ cb(null); return; }
  const img=new Image();
  img.onload=function(){
    try{
      const alvo=700; // resolução alta antes de binarizar — sua imagem original é boa, então dá pra manter detalhe
      const escala=alvo/Math.max(img.width,img.height);
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*escala); canvas.height=Math.round(img.height*escala);
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); // fundo branco sólido (cobre transparência)
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const dados=ctx.getImageData(0,0,canvas.width,canvas.height);
      const px=dados.data;
      for(let i=0;i<px.length;i+=4){
        const luminancia=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];
        const v=luminancia>195?255:0; // limiar: acima disso vira branco puro, abaixo vira preto puro
        px[i]=px[i+1]=px[i+2]=v;
      }
      ctx.putImageData(dados,0,0);
      cb(canvas.toDataURL('image/png'));
    }catch(e){ cb(idn.logo_img); } // se der erro (ex: imagem de outra origem), usa a original mesmo
  };
  img.onerror=function(){ cb(idn.logo_img); };
  img.src=idn.logo_img;
}

  prepararLogoImpressao(function(logoPB){

let _html2canvasCarregando=null;
function garantirHtml2Canvas(cb){
  if(window.html2canvas)return cb();
  if(_html2canvasCarregando){ _html2canvasCarregando.then(cb); return; }
  _html2canvasCarregando=new Promise(resolve=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=resolve; s.onerror=()=>{ toast('Não consegui carregar o gerador de imagem — confira sua internet.',true); resolve(); };
    document.head.appendChild(s);
  });
  _html2canvasCarregando.then(cb);
}
function compartilharPedidoImagem(id){
  const p=S.pedidos.find(x=>x.id===id); if(!p)return;
  toast('Gerando imagem…');
  garantirHtml2Canvas(function(){
    if(!window.html2canvas)return;
    const cli=p.cliente_id?clienteById(p.cliente_id):null;
    const emp=getEmpresaInfo(); const idn=getIdent();
    const nomeEmp=emp.nome_loja||idn.nome||'Food ERP';
    const st=statusInfo(p.status);
    const linhas=(p.itens||[]).map(l=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #EEEAE0;font-size:15px">
      <span>${l.quantidade}× ${esc(nomeLinha(l))}</span><b>${money(l.quantidade*l.preco_unitario)}</b></div>`).join('');
    const box=document.createElement('div');
    box.style.cssText='position:fixed;left:-9999px;top:0;width:480px;background:#fff;font-family:Arial,Helvetica,sans-serif;padding:28px;color:#1a1a1a';
    box.innerHTML=`
      <div style="text-align:center;margin-bottom:18px">
        ${idn.logo_img?`<img src="${idn.logo_img}" style="max-height:60px;margin-bottom:8px">`:`<div style="font-size:22px;font-weight:700">${esc(nomeEmp)}</div>`}
      </div>
      <div style="background:${getComputedStyle(document.documentElement).getPropertyValue('--primary')||'#2E6E4E'};color:#fff;border-radius:12px;padding:14px 18px;margin-bottom:16px;text-align:center">
        <div style="font-size:13px;opacity:.9">Pedido ${esc(p.id)}${cli?' · '+esc(cli.nome):''}</div>

      </div>
      <div style="margin-bottom:10px">${linhas}</div>
      <div style="display:flex;justify-content:space-between;font-size:19px;font-weight:700;padding-top:12px;border-top:2px solid #1a1a1a">
        <span>Total</span><span>${money(p.valor_total)}</span></div>
      ${p.data_entrega?`<div style="margin-top:10px;font-size:13px;color:#555;text-align:center">Entrega: ${dBR(p.data_entrega)}</div>`:''}
      <div style="margin-top:18px;text-align:center;font-size:12px;color:#888">Obrigado pela preferência! 💚</div>`;
    document.body.appendChild(box);
    html2canvas(box,{scale:2,backgroundColor:'#ffffff'}).then(canvas=>{
      document.body.removeChild(box);
      canvas.toBlob(async blob=>{
        const file=new File([blob],'pedido-'+p.id+'.png',{type:'image/png'});
        if(navigator.canShare&&navigator.canShare({files:[file]})){
          try{ await navigator.share({files:[file],title:'Pedido '+p.id,text:'Resumo do seu pedido'}); return; }catch(e){ /* usuário cancelou ou falhou, cai no fallback abaixo */ }
        }
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download='pedido-'+p.id+'.png'; a.click();
        toast('Imagem baixada — agora é só anexar no WhatsApp.');
      },'image/png');
    }).catch(()=>{ document.body.removeChild(box); toast('Não consegui gerar a imagem.',true); });
  });
}

var mrpExtras={}, mrpResultado=null, compraExcluidos=new Set();
function toggleCompraSelecao(itemId){

function calcularMRP(){
  // 1) demanda: pedidos ainda não produzidos + quantidades manuais
  const demanda={};
  S.pedidos.filter(p=>['confirmado','em_producao'].includes(p.status))
    .forEach(p=>p.itens.forEach(l=>{
      if(l.componentes&&l.componentes.length){
        l.componentes.forEach(c=>{ demanda[c.item_id]=(demanda[c.item_id]||0)+c.quantidade*l.quantidade; });
      } else {
        demanda[l.item_id]=(demanda[l.item_id]||0)+l.quantidade;
      }
    }));
  Object.entries(mrpExtras).forEach(([id,v])=>{ const q=parseFloat(v)||0; if(q>0)demanda[id]=(demanda[id]||0)+q; });
  // 2) nível de cada item = caminho mais longo a partir da demanda (garante pais antes dos filhos)
  const lvl={};
  const visit=(id,l,stack)=>{ if(stack.has(id))return;
    if(lvl[id]==null||l>lvl[id])lvl[id]=l;
    const ns=new Set(stack); ns.add(id);
    componentesDe(id).forEach(c=>visit(c.item_filho_id,l+1,ns)); };
  Object.keys(demanda).forEach(id=>visit(id,0,new Set()));
  const maxL=Object.values(lvl).length?Math.max(...Object.values(lvl)):0;
  // 3) explosão nível a nível, abatendo o estoque físico disponível (só se o modo de operação usar controle de estoque)
  const modoSobDemanda=!controlaEstoque();
  const estoqueV={};
  const evq=id=>{ if(modoSobDemanda)return 0;
    if(estoqueV[id]==null){ const it=itemById(id);
    estoqueV[id]=(it&&temFuncao(it,'estocavel'))?Math.max(0,saldo(id)):0; } return estoqueV[id]; };
  const gross=Object.assign({},demanda);
  const producoes=[],compras=[],alertas=[];
  for(let L=0;L<=maxL;L++){
    Object.keys(gross).filter(id=>lvl[id]===L).forEach(id=>{
      const it=itemById(id); if(!it)return;
      const g=gross[id]; if(!(g>0))return;
      const disp=evq(id), usa=Math.min(disp,g); estoqueV[id]=disp-usa;
      const net=g-usa; if(net<=0.000001)return;
      const comps=componentesDe(id);
      if(comps.length){
        producoes.push({item:it,qtd:net,nivel:L,custo:custoItem(id)});
        const rend=rendimentoDe(id);
        comps.forEach(c=>{ const q=c.quantidade*net/rend*(1+(c.perda_percentual||0)/100);
          gross[c.item_filho_id]=(gross[c.item_filho_id]||0)+q; });
      } else if(temFuncao(it,'compravel')){
        const u=ultimaCompraDe(id);
        compras.push({item:it,qtd:net,preco:u?u.preco:null,fornecedor:u?u.fornecedor:null});
      } else if(temFuncao(it,'estocavel')){
        alertas.push({item:it,qtd:net});
      }
    });
  }
  mrpResultado={producoes,compras,alertas,pedidos:S.pedidos.filter(p=>['confirmado','em_producao'].includes(p.status)).length,quando:new Date().toISOString(),modoSobDemanda};
  compraExcluidos=new Set();
  render();
}

  if(!mrpResultado)return;
  const linhas=mrpResultado.compras.filter(c=>!compraExcluidos.has(c.item.id)).map(c=>{ const q=Math.ceil(c.qtd);
    return {item:c.item.id,qtd:q,total:c.preco!=null?Math.round(c.preco*q*100)/100:'',lote:'',validade:''}; });

function demandaPersonalizada(){
  const grupos={};
  S.pedidos.filter(p=>['confirmado','em_producao'].includes(p.status))
    .forEach(p=>p.itens.forEach(l=>{
      if(!l.componentes||!l.componentes.length)return;
      const key=l.nome_custom||'Marmita personalizada';
      grupos[key]=(grupos[key]||0)+l.quantidade;
    }));
  return grupos;
}

function modalCliente(id){
  const c=id?clienteById(id):null;

  <div class="m-b">
    <div class="field"><label>Nome *</label><input id="cl-nome" value="${c?esc(c.nome):''}"></div>
    <div class="frow c2">
      <div class="field"><label>Telefone</label><input id="cl-tel" value="${c?esc(c.telefone||''):''}" placeholder="(48) 9…"></div>
      <div class="field"><label>Endereço</label><input id="cl-end" value="${c?esc(c.endereco||''):''}"></div>
    </div>
    <div class="field"><label>Observação</label><textarea id="cl-obs" rows="2">${c?esc(c.observacao||''):''}</textarea></div>
  </div>
  <div class="m-f">${c?`<button class="btn ghost" onclick="toggleCliente('${id}')">${c.ativo===false?'Reativar':'Inativar'}</button>`:''}
    <button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="salvarCliente('${id||''}')">Salvar</button></div>`);

}
function salvarCliente(id){
  const nome=$('#cl-nome').value.trim(); if(!nome)return toast('Informe o nome.',true);
  const d={nome,telefone:$('#cl-tel').value.trim(),endereco:$('#cl-end').value.trim(),observacao:$('#cl-obs').value.trim(),atualizado_em:new Date().toISOString()};
  if(id){ Object.assign(clienteById(id),d); registrarEvento('CLIENTE_ATUALIZADO',nome+' atualizado',id); }
  else{ const nid=uid('CLI'); S.clientes.push(Object.assign({id:nid,ativo:true,criado_em:new Date().toISOString()},d));
    registrarEvento('CLIENTE_CRIADO',nome+' cadastrado',nid); }
  closeModal(); scheduleSave(); render(); toast('Cliente salvo.');
}
function toggleCliente(id){ const c=clienteById(id); c.ativo=c.ativo===false;
  registrarEvento('CLIENTE_ATUALIZADO',c.nome+(c.ativo?' reativado':' inativado'),id); closeModal(); scheduleSave(); render(); }
function modalCreditoCliente(id){
  garantirFormasPadrao();
  const c=clienteById(id); const sc=saldoCliente(id);

    <div class="frow c2">

      <div class="field"><label>Forma de pagamento</label><select id="cc-forma">${S.formas.filter(f=>f.ativo!==false).map(f=>`<option value="${f.id}">${esc(f.nome)}</option>`).join('')}</select></div>
    </div>

function salvarCreditoCliente(id){
  const v=parseFloat($('#cc-valor').value); if(!v||v<=0)return toast('Informe o valor.',true);
  const c=clienteById(id), forma=$('#cc-forma').value, desc=$('#cc-desc').value.trim()||('Recebimento de '+c.nome);
  const mid=uid('CMV2');
  S.clientes_mov.push({id:mid,cliente_id:id,tipo:'credito',valor:v,descricao:desc,forma_id:forma,data:hoje(),criado_em:new Date().toISOString()});
  S.lancamentos.push({id:uid('LAN'),tipo:'receita',descricao:desc,valor:v,categoria:'Clientes',forma_id:forma,
    data:hoje(),status:'liquidado',data_liquidacao:hoje(),origem:mid});
  registrarEvento('CREDITO_CLIENTE',c.nome+' · '+money(v)+' — conta creditada, caixa atualizado',mid);
  closeModal(); scheduleSave(); render(); toast('Recebimento registrado.');
}
function modalExtratoCliente(id){
  const c=clienteById(id);

  const rows=movs.map(m=>`<tr><td>${esc(m.descricao)}<div class="mono-id">${dBR(m.data)}${m.forma_id&&formaById(m.forma_id)?' · '+esc(formaById(m.forma_id).nome):''}</div></td>

    '<tr><td colspan="2" class="empty">Sem movimentações.</td></tr>';
  openModal(`<div class="m-h"><h3>Extrato — ${esc(c.nome)}</h3><button class="x" onclick="closeModal()">✕</button></div>
  <div class="m-b"><p style="margin-bottom:10px">Saldo: <b class="num ${acc<0?'neg':'pos'}">${money(acc)}</b> ${acc<0?'(a pagar)':(acc>0?'(crédito)':'')}</p>
    <table><tbody>${rows}</tbody></table></div>
  <div class="m-f"><button class="btn" onclick="closeModal()">Fechar</button></div>`);
}

  const folhaMensal=ativos.reduce((a,f)=>a+(f.salario_mensal||0),0);
  const valesTotal=S.funcionarios.reduce((a,f)=>a+valesAbertos(f.id).reduce((x,v)=>x+v.valor,0),0);
  const rows=S.funcionarios.map(f=>{
    const vales=valesAbertos(f.id).reduce((a,v)=>a+v.valor,0);
    const pgs=S.funcionarios_mov.filter(m=>m.funcionario_id===f.id&&m.tipo==='pagamento');

    return `<tr style="${f.ativo===false?'opacity:.45':''}">
      <td><b>${esc(f.nome)}</b> <span class="tag mut">${TIPOS_CONTRATO[f.tipo_contrato]||f.tipo_contrato||''}</span>
        <div class="mono-id">${esc(f.cargo||'')}${f.telefone?' · '+esc(f.telefone):''}${f.data_admissao?' · desde '+dBR(f.data_admissao):''}${f.data_desligamento?' · desligado '+dBR(f.data_desligamento):''}</div>
        ${f.observacao?`<div class="subtle">📝 ${esc(f.observacao)}</div>`:''}</td>
      <td class="r num">${f.salario_mensal?money(f.salario_mensal):'—'}${f.dia_pagamento?`<div class="subtle" style="font-weight:400">dia ${f.dia_pagamento}</div>`:''}</td>
      <td class="r num ${vales?'neg':''}">${vales?money(vales):'—'}</td>

  return header('Funcionários','var(--m-funcionarios)','Cadastro, vales/adiantamentos e pagamentos — vales em aberto são abatidos automaticamente no salário.',
    `<button class="btn primary" onclick="modalFuncionario()">+ Novo funcionário</button>`)+
  `<div class="grid g2" style="margin-bottom:16px">
    <div class="card kpi"><div class="k-label"><span class="dot" style="background:var(--m-funcionarios)"></span>Folha mensal (ativos)</div><div class="k-value num">${money(folhaMensal)}</div><div class="k-foot">${ativos.length} funcionários ativos</div></div>
    <div class="card kpi"><div class="k-label"><span class="dot" style="background:var(--m-financeiro)"></span>Vales em aberto</div><div class="k-value num">${money(valesTotal)}</div><div class="k-foot">a descontar nos próximos pagamentos</div></div>
  </div>
  <div class="card"><table><thead><tr><th>Funcionário</th><th class="r">Salário</th><th class="r">Vales em aberto</th><th class="r">Último pgto</th><th class="r"></th></tr></thead><tbody>${rows}</tbody></table></div>`;
};

    <div class="frow c3">

      <div class="field"><label>Dia de pagamento</label><input id="fu-dia" type="number" min="1" max="31" step="1" value="${f&&f.dia_pagamento?f.dia_pagamento:''}" placeholder="ex.: 5"></div>
      <div class="field"><label>Admissão</label><input id="fu-adm" type="date" value="${f&&f.data_admissao?f.data_admissao:hoje()}"></div>
    </div>
    <div class="field"><label>Endereço</label><input id="fu-end" value="${f?esc(f.endereco||''):''}"></div>
