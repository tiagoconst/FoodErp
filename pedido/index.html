<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabores da Ana — Faça seu pedido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=Fraunces:wght@600;700&family=Playball&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  /* Paleta baseada no logo Sabores da Ana: pêssego/coral, creme e verde-sálvia */
  --bg:#FBF3E6; --panel:#FFFFFF; --ink:#3E2E20; --muted:#8C7259; --line:#EFDFC8; --soft:#FBEFE0;
  --primary:#D97C4F; --primary-dark:#B85F37; --accent:#7C8C63; --danger:#B3372C;
  --radius:14px; --shadow:0 1px 2px rgba(62,46,32,.05),0 6px 18px rgba(62,46,32,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{max-width:100vw;overflow-x:hidden}
body{background:var(--bg);color:var(--ink);font-family:Inter,Arial,sans-serif;padding-bottom:90px}
h1,h2,h3{font-family:Fraunces,Georgia,serif}
.navbar{background:var(--primary);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.navbar .brand{display:flex;align-items:center;gap:8px}
.navbar .brand img{height:38px;display:block}
.navbar .brand .txt{font-family:Playball,'Playfair Display',cursive;font-size:24px;color:#fff;line-height:1}
.navbar .navlinks{display:flex;gap:20px;font-size:13.5px;font-weight:600}
.navbar .navlinks a{color:#fff;opacity:.92;text-decoration:none;cursor:pointer}
.navbar .navlinks a:hover{opacity:1;text-decoration:underline}
.navbar .cart-btn{display:flex;align-items:center;gap:8px;background:#fff;color:var(--primary-dark);border:none;border-radius:30px;padding:5px 16px 5px 5px;font-weight:700;font-size:13px;cursor:pointer}
.navbar .cart-btn .ico{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px}
.hero{display:flex;height:150px}
.hero .tile{flex:1;position:relative;overflow:hidden}
.hero .tile:not(:last-child){clip-path:polygon(0 0,94% 0,100% 100%,0 100%)}
.hero .tile img{width:100%;height:100%;object-fit:cover;display:block}
.hero .tile .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px}
.top-sub{background:var(--bg);text-align:center;padding:10px 16px;font-size:12px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--line)}
.catnav{position:sticky;top:0;z-index:15;background:var(--bg);border-bottom:1px solid var(--line);overflow-x:auto;white-space:nowrap;padding:10px 14px;display:flex;gap:8px;scrollbar-width:none}
.catnav::-webkit-scrollbar{display:none}
.catpill{flex:none;padding:8px 16px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
.catpill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.wrap{max-width:760px;margin:0 auto;padding:0 14px}
.cat-h{font-family:Playball,'Playfair Display',cursive;font-weight:400;font-size:32px;color:var(--primary-dark);margin:30px 0 14px;scroll-margin-top:60px}
.grid-itens{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:600px){.grid-itens{grid-template-columns:repeat(3,1fr)}}
@media(min-width:820px){.grid-itens{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--soft)}
.card .thumb-fallback{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:40px}
.card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px;flex:1}
.card-info b{font-size:13.5px;line-height:1.25;display:block}
.card-info .desc{font-size:11.5px;color:var(--muted);display:block;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-info .preco{font-weight:800;color:var(--primary-dark);font-size:14.5px;margin-top:2px}
.card-add{margin-top:auto;padding-top:8px}
.btn-add{width:100%;padding:8px;border-radius:999px;border:1.5px solid var(--primary);background:#fff;color:var(--primary-dark);font-weight:700;font-size:12.5px;cursor:pointer;letter-spacing:.02em}
.stepper{display:flex;align-items:center;justify-content:space-between;gap:6px;flex:none;background:var(--primary);border-radius:8px;padding:3px}
.stepper button{width:26px;height:26px;border-radius:6px;border:none;background:rgba(255,255,255,.18);font-size:15px;font-weight:700;cursor:pointer;color:#fff}
.stepper button.add{background:#fff;color:var(--primary-dark)}
.stepper span{min-width:16px;text-align:center;font-weight:700;color:#fff;font-size:13px}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.loading{text-align:center;color:var(--muted);padding:40px 20px}
.cartbar{position:fixed;left:0;right:0;bottom:0;background:var(--primary-dark);color:#fff;padding:13px 16px;display:none;align-items:center;justify-content:space-between;box-shadow:0 -4px 14px rgba(0,0,0,.15);z-index:20}
.cartbar.show{display:flex}
.cartbar b{font-size:15px}
.cartbar .cnt{background:var(--accent);color:#3A2B08;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700;margin-right:8px}
.cartbar button{background:#fff;color:var(--primary-dark);border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:14px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(20,24,17,.5);display:none;align-items:flex-end;justify-content:center;z-index:30}
.overlay.open{display:flex}
.sheet{background:var(--panel);width:100%;max-width:560px;border-radius:16px 16px 0 0;max-height:88vh;overflow:auto;padding:18px}
.sheet-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sheet-h h3{font-size:18px}
.sheet-h .x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.line{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line)}
.line .nome{font-size:14px;flex:1}
.line .sub{color:var(--muted);font-size:12px}
.tot{display:flex;justify-content:space-between;font-weight:800;font-size:17px;margin-top:14px;padding-top:12px;border-top:2px solid var(--line)}
.field{margin-top:12px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit;background:var(--soft)}
.field textarea{resize:vertical;min-height:60px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-weight:700;font-size:15px;margin-top:16px;cursor:pointer}
.btn:disabled{opacity:.55;cursor:default}
.err{color:var(--danger);font-size:13px;margin-top:8px}
.ok-screen{text-align:center;padding:50px 16px}
.ok-screen .em{font-size:44px}
.ok-screen h2{margin:14px 0 6px}
.ok-screen p{color:var(--muted);font-size:14px;line-height:1.5}
.ok-screen .pid{font-family:monospace;background:var(--soft);padding:6px 10px;border-radius:8px;display:inline-block;margin-top:10px;font-size:13px}
.btn-google{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#3c4043;border:1px solid var(--line);border-radius:8px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.btn-google svg{width:16px;height:16px;flex:none}
.sheet-login{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--soft);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.sheet-login .sub{color:var(--muted);font-size:12px}
.sheet-login .user-box{display:flex;align-items:center;gap:8px;font-size:13.5px}
.sheet-login .user-box img{width:26px;height:26px;border-radius:50%}
.sheet-login .user-box b{font-size:13.5px}
.sheet-login .link-sair{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
</style>
</head>
<body>

<div class="navbar">
  <div class="brand" id="brand-box"><span class="txt" id="loja-nome">Sabores da Ana</span></div>
  <div class="navlinks">
    <a onclick="irParaCategoria(document.querySelector('.cat-h')&&document.querySelector('.cat-h').id.replace('cat-',''))">Cardápio</a>
    <a href="https://saboresdaanairati.com.br/" target="_blank" rel="noopener">Sobre Nós</a>
    <a href="https://saboresdaanairati.com.br/" target="_blank" rel="noopener">Contato</a>
  </div>
  <button class="cart-btn" onclick="abrirCarrinho()"><span class="ico">🛒</span> <span id="nav-cart-label">Meu Pedido</span></button>
</div>

<div class="hero" id="hero"></div>

<div class="top-sub">Monte seu pedido — combinamos o pagamento na entrega/retirada</div>

<div class="catnav" id="catnav"></div>

<div class="wrap" id="cardapio"><div class="loading">Carregando cardápio…</div></div>

<div class="cartbar" id="cartbar">
  <div><span class="cnt" id="cart-cnt">0</span><b id="cart-tot">R$ 0,00</b></div>
  <button onclick="abrirCarrinho()">Ver pedido</button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
'use strict';
/* ===== Configuração desta loja ===== */
const SUPABASE_URL='https://jaytdbwaoduefrbragsw.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpheXRkYndhb2R1ZWZyYnJhZ3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMTMwNjgsImV4cCI6MjA5ODU4OTA2OH0.3TBjN82_7bqYRiiuU2b6yNJS1xfJyGtD6bEh7q89kwY';
const EMPRESA_ID='dd8275c9-e88f-4633-bfd0-bfa262eaf857';
const LOJA_NOME='Sabores da Ana';

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=s=>document.querySelector(s);
const money=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
document.title=LOJA_NOME+' — Faça seu pedido';
$('#loja-nome').textContent=LOJA_NOME;
async function carregarIdentidade(){
  try{
    const {data,error}=await sb.rpc('erp_identidade_publica',{p_empresa_id:EMPRESA_ID});
    if(error||!data||!data.logo_img)return;
    $('#brand-box').innerHTML=`<img src="${data.logo_img}" alt="${esc(LOJA_NOME)}">`;
  }catch(e){ /* sem logo cadastrada ainda — mantém o texto */ }
}

/* ===== Carrinho (persistido no navegador do cliente) ===== */
const CART_KEY='pedido_carrinho_v1';
const SESSAO_KEY='pedido_sessao_v1';
let carrinho=JSON.parse(localStorage.getItem(CART_KEY)||'{}'); // {item_id: qtd}
let cardapio=[];

function idSessao(){
  let id=localStorage.getItem(SESSAO_KEY);
  if(!id){ id=(crypto.randomUUID?crypto.randomUUID():'sess-'+Date.now()+'-'+Math.random().toString(36).slice(2)); localStorage.setItem(SESSAO_KEY,id); }
  return id;
}
function salvarCarrinho(){ localStorage.setItem(CART_KEY,JSON.stringify(carrinho)); atualizarBarra(); }
function itemPorId(id){ return cardapio.find(i=>i.id===id); }
const COMBO_MIN_UN=5, COMBO_DESCONTO_UN=2;
function brutoCarrinho(){ return Object.entries(carrinho).reduce((a,[id,q])=>{ const it=itemPorId(id); return a+(it?it.preco_venda*q:0); },0); }
function qtdCarrinho(){ return Object.values(carrinho).reduce((a,q)=>a+q,0); }
function comboAtivoCarrinho(){ return qtdCarrinho()>=COMBO_MIN_UN; }
function descontoComboCarrinho(){ return comboAtivoCarrinho()?qtdCarrinho()*COMBO_DESCONTO_UN:0; }
function totalCarrinho(){ return Math.max(0,brutoCarrinho()-descontoComboCarrinho()); }
function alterarQtd(id,delta){
  const atual=carrinho[id]||0; const nova=Math.max(0,atual+delta);
  if(nova<=0)delete carrinho[id]; else carrinho[id]=nova;
  salvarCarrinho(); renderCardapio(); if($('#overlay').classList.contains('open'))renderCarrinho();
}
function atualizarBarra(){
  const n=qtdCarrinho();
  $('#cartbar').classList.toggle('show',n>0);
  $('#cart-cnt').textContent=n;
  $('#cart-tot').textContent=money(totalCarrinho());
  $('#nav-cart-label').textContent=n>0?`Meu Pedido (${n})`:'Meu Pedido';
}

/* ===== Cardápio ===== */
async function carregarCardapio(){
  const {data,error}=await sb.rpc('erp_cardapio_publico',{p_empresa_id:EMPRESA_ID});
  if(error){ $('#cardapio').innerHTML='<div class="empty">Não foi possível carregar o cardápio agora. Tente novamente em instantes.</div>'; return; }
  cardapio=data||[];
  renderCardapio();
  atualizarBarra();
}
function slug(s){ return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
const THUMB_BG=[
  'linear-gradient(135deg,#F3C9A0,#E7A268)',
  'linear-gradient(135deg,#C9D3AE,#9FAE7E)',
  'linear-gradient(135deg,#F0DCC0,#E0B98C)',
  'linear-gradient(135deg,#E3B7A0,#C98F72)',
  'linear-gradient(135deg,#D8CBA8,#B7A374)',
  'linear-gradient(135deg,#F0C9C2,#DA9C90)'
];
function emojiPrato(nome,categoria){
  const t=(nome+' '+(categoria||'')).toLowerCase();
  const mapa=[
    [/frango/,'\ud83c\udf57'],[/carne|bife|picanha|patinho/,'\ud83e\udd69'],[/peixe|salm[aã]o|til[aá]pia/,'\ud83d\udc1f'],[/camar[aã]o/,'\ud83e\udd90'],
    [/massa|macarr[aã]o|penne|nhoque|ravioli|espaguete/,'\ud83c\udf5d'],[/arroz/,'\ud83c\udf5a'],[/salada/,'\ud83e\udd57'],
    [/sopa|caldo/,'\ud83c\udf72'],[/torta|quiche/,'\ud83e\udd67'],[/legum|vegetari|vegano/,'\ud83e\udd66'],[/doce|sobremesa|bolo/,'\ud83c\udf70'],
    [/ovo/,'\ud83c\udf73'],[/feij[aã]o/,'\ud83e\uddb1']
  ];
  for(const [re,em] of mapa)if(re.test(t))return em;
  return '\ud83c\udf7d\ufe0f';
}
function renderCardapio(){
  if(!cardapio.length){ $('#cardapio').innerHTML='<div class="empty">Nenhum item disponível no momento.</div>'; $('#catnav').innerHTML=''; return; }
  const porCategoria={};
  cardapio.forEach(i=>{ (porCategoria[i.categoria]=porCategoria[i.categoria]||[]).push(i); });
  const categorias=Object.keys(porCategoria).sort((a,b)=>a.localeCompare(b,'pt'));
  $('#catnav').innerHTML=categorias.map((cat,idx)=>`<button class="catpill${idx===0?' active':''}" data-cat="${slug(cat)}" onclick="irParaCategoria('${slug(cat)}')">${esc(cat)}</button>`).join('');
  let contador=0;
  $('#cardapio').innerHTML=categorias.map(cat=>{
    const itens=porCategoria[cat].map(i=>{
      const q=carrinho[i.id]||0;
      const bg=THUMB_BG[contador++ % THUMB_BG.length];
      return `<div class="card">
        ${i.foto_url?`<img src="${esc(i.foto_url)}" alt="">`:`<div class="thumb-fallback" style="background:${bg}">${emojiPrato(i.nome,i.categoria)}</div>`}
        <div class="card-body">
          <div class="card-info">
            <b>${esc(i.nome)}</b>
            ${i.descricao?`<span class="desc">${esc(i.descricao)}</span>`:''}
            <span class="preco">${money(i.preco_venda)}</span>
          </div>
          <div class="card-add">
            ${q>0
              ?`<div class="stepper"><button onclick="alterarQtd('${i.id}',-1)">−</button><span>${q}</span><button class="add" onclick="alterarQtd('${i.id}',1)">+</button></div>`
              :`<button class="btn-add" onclick="alterarQtd('${i.id}',1)">+ Adicionar</button>`}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="cat-h" id="cat-${slug(cat)}">${esc(cat)}</div><div class="grid-itens">${itens}</div>`;
  }).join('');
  setupScrollSpy();
  renderHero();
}
/* faixa do topo: usa as 3 primeiras fotos reais que existirem no cardápio;
   completa com capas coloridas enquanto faltar foto de verdade */
function renderHero(){
  const comFoto=cardapio.filter(i=>i.foto_url).slice(0,3);
  const faltam=3-comFoto.length;
  const tiles=comFoto.map(i=>`<div class="tile"><img src="${esc(i.foto_url)}" alt="${esc(i.nome)}"></div>`);
  for(let k=0;k<faltam;k++){
    const bg=THUMB_BG[k % THUMB_BG.length];
    const it=cardapio[k];
    tiles.push(`<div class="tile"><div class="ph" style="background:${bg}">${it?emojiPrato(it.nome,it.categoria):'🍽️'}</div></div>`);
  }
  $('#hero').innerHTML=tiles.join('');
}
function irParaCategoria(slugId){
  const el=document.getElementById('cat-'+slugId);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}
function setupScrollSpy(){
  const secoes=[...document.querySelectorAll('.cat-h')];
  if(!secoes.length)return;
  if(window._catObserver)window._catObserver.disconnect();
  const catnavH=$('#catnav').offsetHeight||0;
  window._catObserver=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id.replace('cat-','');
        document.querySelectorAll('.catpill').forEach(p=>p.classList.toggle('active',p.dataset.cat===id));
      }
    });
  },{rootMargin:`-${catnavH+4}px 0px -70% 0px`,threshold:0});
  secoes.forEach(s=>window._catObserver.observe(s));
}
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===== Login com Google (opcional — dá um cadastro mais robusto) =====
   O botão fica dentro da janela de finalizar pedido (é ali que a
   pessoa realmente se beneficia disso). Da 1ª vez que ela pede
   logada, ainda precisa digitar o telefone (o Google não compartilha
   isso); da 2ª vez em diante, a gente já busca o telefone salvo no
   cadastro anterior dela e preenche sozinho. */
let usuario=null;
let cadastroSalvo=null; // {nome, telefone} do pedido anterior, se logado
const GOOGLE_ICON=`<svg viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.9v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.7V4.97H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.03l3.05-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .9 4.97l3.05 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>`;
async function initAuth(){
  const {data:{session}}=await sb.auth.getSession();
  await aplicarSessao(session);
  sb.auth.onAuthStateChange(async(_ev,session)=>{ await aplicarSessao(session); if($('#overlay').classList.contains('open'))renderCarrinho(); });
}
async function aplicarSessao(session){
  usuario=session?.user||null;
  cadastroSalvo=null;
  if(usuario){
    const {data}=await sb.rpc('erp_meu_cadastro_publico',{p_empresa_id:EMPRESA_ID});
    cadastroSalvo=data||null;
  }
}
function nomeSugerido(){ return cadastroSalvo?.nome||usuario?.user_metadata?.full_name||usuario?.user_metadata?.name||''; }
function telefoneSugerido(){ return cadastroSalvo?.telefone||''; }
function loginHtml(){
  if(usuario){
    const nome=usuario.user_metadata?.full_name||usuario.user_metadata?.name||usuario.email||'Você';
    const foto=usuario.user_metadata?.avatar_url||usuario.user_metadata?.picture||'';
    return `<div class="sheet-login"><div class="user-box">${foto?`<img src="${esc(foto)}" alt="">`:''}<b>${esc(nome.split(' ')[0])}</b></div><button class="link-sair" onclick="sairConta()">sair</button></div>`;
  }
  return `<div class="sheet-login"><button class="btn-google" onclick="entrarComGoogle()">${GOOGLE_ICON}Entrar com Google</button><span class="sub">preenche seus dados&nbsp;sozinho</span></div>`;
}
async function entrarComGoogle(){
  await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href.split('#')[0]}});
}
async function sairConta(){ await sb.auth.signOut(); }

/* ===== Carrinho / checkout ===== */
function abrirCarrinho(){ renderCarrinho(); $('#overlay').classList.add('open'); }
function fecharCarrinho(){ $('#overlay').classList.remove('open'); }
function renderCarrinho(){
  const ids=Object.keys(carrinho).filter(id=>carrinho[id]>0);
  if(!ids.length){ fecharCarrinho(); return; }
  const linhas=ids.map(id=>{
    const it=itemPorId(id); if(!it)return'';
    return `<div class="line">
      <div><div class="nome">${esc(it.nome)}</div><div class="sub">${money(it.preco_venda)} un.</div></div>
      <div class="stepper"><button onclick="alterarQtd('${id}',-1)">−</button><span>${carrinho[id]}</span><button class="add" onclick="alterarQtd('${id}',1)">+</button></div>
    </div>`;
  }).join('');
  const combo=comboAtivoCarrinho();
  const descCombo=descontoComboCarrinho();
  const comboHtml=combo
    ?`<div class="line" style="border-bottom:none;color:var(--primary);font-weight:600"><span>Desconto por quantidade (${qtdCarrinho()}+ un.)</span><span>−${money(descCombo)}</span></div>`
    :`<div class="sub" style="margin:6px 0 0">Faltam ${COMBO_MIN_UN-qtdCarrinho()} un. pro desconto de ${money(COMBO_DESCONTO_UN)}/un. (a partir de ${COMBO_MIN_UN} un.)</div>`;
  $('#sheet').innerHTML=`<div class="sheet-h"><h3>Seu pedido</h3><button class="x" onclick="fecharCarrinho()">✕</button></div>
    ${linhas}
    ${comboHtml}
    <div class="tot"><span>Total</span><span>${money(totalCarrinho())}</span></div>
    ${loginHtml()}
    <div class="field"><label>Seu nome *</label><input id="ck-nome" placeholder="ex.: Maria Silva" value="${esc(nomeSugerido())}"></div>
    <div class="field"><label>Telefone / WhatsApp *</label><input id="ck-tel" placeholder="ex.: (42) 99999-0000" value="${esc(telefoneSugerido())}"></div>
    <div class="field"><label>Observação (opcional)</label><textarea id="ck-obs" placeholder="ex.: sem cebola, retirar às 12h"></textarea></div>
    <div id="ck-err" class="err" style="display:none"></div>
    <button class="btn" id="ck-btn" onclick="enviarPedido()">Confirmar pedido</button>`;
}
async function enviarPedido(){
  const nome=$('#ck-nome').value.trim();
  const tel=$('#ck-tel').value.trim();
  const err=$('#ck-err');
  err.style.display='none';
  if(!nome||!tel){ err.textContent='Preencha nome e telefone para continuar.'; err.style.display='block'; return; }
  const ids=Object.keys(carrinho).filter(id=>carrinho[id]>0);
  if(!ids.length)return;
  const btn=$('#ck-btn'); btn.disabled=true; btn.textContent='Enviando…';
  const itens=ids.map(id=>({item_id:id,quantidade:carrinho[id]}));
  const {data,error}=await sb.rpc('erp_criar_pedido_publico',{
    p_empresa_id:EMPRESA_ID, p_itens:itens, p_cliente_nome:nome, p_cliente_telefone:tel,
    p_observacao:$('#ck-obs').value.trim(), p_id_externo:idSessao(), p_cliente_email:usuario?.email||null
  });
  if(error){
    btn.disabled=false; btn.textContent='Confirmar pedido';
    if(error.message.includes('Item indisponível'))err.textContent='Um item do seu carrinho ficou indisponível — atualize a página e monte o pedido novamente.';
    else if(error.message.includes('Loja indisponível'))err.textContent='A loja não está recebendo pedidos no momento. Tente novamente mais tarde.';
    else err.textContent='Não foi possível enviar seu pedido agora. Tente novamente em instantes.';
    err.style.display='block';
    return;
  }
  carrinho={}; localStorage.removeItem(CART_KEY); localStorage.removeItem(SESSAO_KEY);
  telaSucesso(data);
}
function telaSucesso(data){
  fecharCarrinho();
  $('#cardapio').innerHTML=`<div class="ok-screen">
    <div class="em">✅</div>
    <h2>Pedido enviado!</h2>
    <p>Recebemos seu pedido e em breve entraremos em contato para confirmar.<br>Valor total: <b>${money(data.valor_total)}</b></p>
    <div class="pid">Pedido ${esc(data.pedido_id)}</div>
    <div style="margin-top:26px"><button class="btn" onclick="location.reload()">Fazer novo pedido</button></div>
  </div>`;
  atualizarBarra();
}

carregarCardapio();
carregarIdentidade();
initAuth();
</script>
</body>
</html>
