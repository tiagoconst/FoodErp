<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabores da Ana — Faça seu pedido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=Fraunces:wght@600;700&family=Alex+Brush&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@font-face{font-family:'Brittany';src:url('fonts/BrittanySignature.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Helvetica Now Display';src:url('fonts/HelveticaNowDisplay-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap}
:root{
  /* Paleta baseada no logo Sabores da Ana: pêssego/coral, creme e verde-sálvia */
  --bg:#FBF3E6; --panel:#FFFFFF; --ink:#3E2E20; --muted:#8C7259; --line:#EFDFC8; --soft:#FBEFE0;
  --primary:#D97C4F; --primary-dark:#B85F37; --accent:#7C8C63; --danger:#B3372C;
  --navbar-bg:#FCB786;
  --font-script:'Brittany','Alex Brush','Playfair Display',cursive;
  --font-menu:'Helvetica Now Display',-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
  --radius:14px; --shadow:0 1px 2px rgba(62,46,32,.05),0 6px 18px rgba(62,46,32,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{max-width:100vw;overflow-x:clip}
body{background:var(--bg);color:var(--ink);font-family:Inter,Arial,sans-serif;padding-bottom:90px}
h1,h2,h3{font-family:Fraunces,Georgia,serif}
.navbar{background:var(--navbar-bg);padding:12px 24px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.navbar .brand{display:flex;align-items:center;gap:8px;flex:none}
.navbar .brand img{height:38px;display:block}
.navbar .brand .txt{font-family:var(--font-script);font-size:40px;color:#fff;line-height:1}
.navbar .navlinks{display:flex;gap:24px;font-family:var(--font-menu);font-size:14px;font-weight:700}
.navbar .navlinks a{color:#fff;opacity:.95;text-decoration:none;cursor:pointer}
.navbar .navlinks a:hover{opacity:1;text-decoration:underline}
.navbar .cart-btn{position:relative;display:flex;align-items:center;gap:9px;background:transparent;color:#fff;border:none;padding:6px 4px;font-family:var(--font-menu);font-weight:700;font-size:14px;cursor:pointer;margin-left:auto}
.navbar .cart-btn img{height:34px;display:block}
.navbar .cart-btn .cart-badge{position:absolute;top:-4px;left:20px;background:var(--primary-dark);color:#fff;border-radius:999px;min-width:16px;height:16px;padding:0 4px;font-size:10px;line-height:16px;text-align:center;font-weight:700;display:none}
.hero{height:150px;margin-top:16px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.catnav{position:sticky;top:0;z-index:15;background:var(--bg);border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;white-space:nowrap;padding:14px 14px 10px;display:flex;justify-content:center;gap:8px;scrollbar-width:none}
.catnav::-webkit-scrollbar{display:none}
.catpill{flex:none;padding:8px 16px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:var(--font-menu);font-size:13px;font-weight:700;cursor:pointer;transition:background .15s,color .15s,border-color .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.catpill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px}
.promo-banner{max-width:1232px;margin:18px auto 0;padding:14px 32px;background:linear-gradient(180deg,#FDEFC8,#FBE6AC);border:1.5px solid #EFCD79;border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;overflow:hidden}
.promo-banner:empty{display:none}
.promo-banner.promo-banner-img{padding:0;border:none;background:none;display:block}
.promo-banner-img picture,.promo-banner-img img{display:block;width:100%;height:auto;border-radius:14px}
.promo-ico{font-size:26px;flex:none;line-height:1}
.promo-txt{font-family:var(--font-menu);line-height:1.22;text-align:left}
.promo-t1{font-weight:800;font-size:14.5px;color:#8A2E1E}
.promo-t2{font-weight:700;font-size:13.5px;color:var(--ink)}
.promo-t3{font-weight:700;font-size:12.5px;color:var(--ink)}
.promo-badge{background:#D8402E;color:#fff;border-radius:10px;padding:7px 16px;text-align:center;font-weight:800;font-size:18px;line-height:1.15;box-shadow:0 3px 8px rgba(62,46,32,.18);flex:none}
.promo-badge span{display:block;font-size:10px;font-weight:700;letter-spacing:.02em;margin-top:1px}
@media(max-width:640px){
  .promo-banner{padding:12px 16px;gap:10px;margin-top:10px;border-radius:12px}
  .promo-ico{font-size:20px}
  .promo-t1{font-size:12.5px}
  .promo-t2,.promo-t3{font-size:11px}
  .promo-badge{padding:6px 12px;font-size:15px}
  .promo-badge span{font-size:9px}
}
.cat-h{font-family:var(--font-script);font-weight:400;font-size:36px;color:var(--primary-dark);margin:28px 0 12px;scroll-margin-top:calc(var(--catnav-h,60px) + 10px);text-align:left}
.destaque-h{font-family:var(--font-script);font-weight:400;font-size:42px;color:var(--primary-dark);margin:8px 0 14px;text-align:left;scroll-margin-top:calc(var(--catnav-h,60px) + 10px)}
.grid-itens{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(min-width:380px){.grid-itens{grid-template-columns:repeat(3,1fr);gap:10px}}
@media(min-width:560px){.grid-itens{grid-template-columns:repeat(3,1fr);gap:16px}}
@media(min-width:820px){.grid-itens{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1080px){.grid-itens{grid-template-columns:repeat(5,1fr)}}
@media(max-width:379px){
  .card-info b{font-size:12.5px}
  .card-info .desc{display:none}
  .card-info .preco{font-size:13px}
  .btn-add{font-size:11.5px;padding:6px}
}
@media(min-width:380px)and(max-width:559px){
  .card-info .desc{display:none}
  .card-info b{font-size:12px}
  .card-info .preco{font-size:12.5px}
  .btn-add{font-size:11px;padding:6px}
  .card-body{padding:8px 9px 9px}
}
@media(max-width:640px){
  .navbar{gap:0 10px;padding:10px 16px 8px}
  .navbar .brand img{height:30px}
  .navbar .cart-btn{order:2}
  .navbar .cart-btn img{height:28px}
  .navbar .navlinks{order:3;width:100%;gap:16px;margin-top:6px;font-size:12px}
  .hero{margin-top:6px;height:110px}
  .cat-h{font-size:28px;margin:20px 0 10px}
  .destaque-h{font-size:32px}
}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;position:relative}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--soft);border-radius:var(--radius) var(--radius) 0 0}
.card .thumb-fallback{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:40px;border-radius:var(--radius) var(--radius) 0 0}
.info-badge{position:absolute;top:0;right:0;width:48px;height:48px;cursor:pointer;z-index:3;user-select:none}
.info-badge .tri{position:absolute;inset:0;clip-path:polygon(100% 0,100% 100%,0 0);background:rgba(40,30,22,.62);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);transition:background .15s;pointer-events:none}
.info-badge:hover .tri,.info-badge.open .tri{background:rgba(40,30,22,.8)}
.info-badge .ic{position:absolute;top:6px;right:8px;font-size:15px;font-weight:400;font-family:Georgia,serif;font-style:italic;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);pointer-events:none}
.info-pop{display:none;position:absolute;top:42px;right:0;max-width:calc(100vw - 32px);background:rgba(255,255,255,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);border-radius:10px;box-shadow:0 8px 24px rgba(62,46,32,.16);padding:10px 13px;width:180px;z-index:6;text-align:left;cursor:default}
.info-badge.open .info-pop{display:block}
@media(hover:hover)and(pointer:fine){ .info-badge:hover .info-pop{display:block} }
.info-pop b{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-menu)}
.info-pop ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.info-pop li{font-size:12px;font-weight:300;color:var(--ink);display:flex;justify-content:space-between;gap:10px;line-height:1.3;letter-spacing:.01em}
.info-pop li .q{color:var(--muted);white-space:nowrap;font-weight:300}
.card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px;flex:1}
.card-info b{font-size:13.5px;line-height:1.25;display:block}
.card-info b .peso{font-weight:400;color:var(--muted);font-size:12px}
.card-info .desc{font-size:11.5px;color:var(--muted);display:block;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-info .preco{font-weight:800;color:var(--primary-dark);font-size:14.5px;margin-top:2px}
.card-add{margin-top:auto;padding-top:8px}
.btn-add{width:100%;padding:8px;border-radius:999px;border:1.5px solid var(--primary);background:#fff;color:var(--primary-dark);font-weight:700;font-size:12.5px;cursor:pointer;letter-spacing:.02em}
.stepper{display:flex;align-items:center;justify-content:space-between;gap:6px;flex:none;background:var(--primary);border-radius:8px;padding:3px}
.stepper button{width:26px;height:26px;border-radius:6px;border:none;background:rgba(255,255,255,.18);font-size:15px;font-weight:700;cursor:pointer;color:#fff}
.stepper button.add{background:#fff;color:var(--primary-dark)}
.stepper span{min-width:16px;text-align:center;font-weight:700;color:#fff;font-size:13px}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.loading{text-align:center;color:var(--muted);padding:40px 20px}
.cartbar{position:fixed;left:0;right:0;bottom:0;background:var(--primary-dark);color:#fff;padding:13px 16px;display:none;align-items:center;justify-content:space-between;box-shadow:0 -4px 14px rgba(0,0,0,.15);z-index:20}
.cartbar.show{display:flex}
.cartbar b{font-size:15px}
.cartbar .cnt{background:var(--accent);color:#3A2B08;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700;margin-right:8px}
.cartbar button{background:#fff;color:var(--primary-dark);border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:14px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(20,24,17,.5);display:none;align-items:flex-end;justify-content:center;z-index:30}
.overlay.open{display:flex}
.sheet{background:var(--panel);width:100%;max-width:560px;border-radius:16px 16px 0 0;max-height:88vh;overflow:auto;padding:18px}
.sheet-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sheet-h h3{font-size:18px}
.sheet-h .x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.line{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line)}
.line .nome{font-size:14px;flex:1}
.line .sub{color:var(--muted);font-size:12px}
.tot{display:flex;justify-content:space-between;font-weight:800;font-size:17px;margin-top:14px;padding-top:12px;border-top:2px solid var(--line)}
.field{margin-top:12px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit;background:var(--soft)}
.field textarea{resize:vertical;min-height:60px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-weight:700;font-size:15px;margin-top:16px;cursor:pointer}
.btn:disabled{opacity:.55;cursor:default}
.err{color:var(--danger);font-size:13px;margin-top:8px}
.ok-screen{text-align:center;padding:50px 16px}
.ok-screen .em{font-size:44px}
.ok-screen h2{margin:14px 0 6px}
.ok-screen p{color:var(--muted);font-size:14px;line-height:1.5}
.ok-screen .pid{font-family:monospace;background:var(--soft);padding:6px 10px;border-radius:8px;display:inline-block;margin-top:10px;font-size:13px}
.btn-google{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#3c4043;border:1px solid var(--line);border-radius:8px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.btn-google svg{width:16px;height:16px;flex:none}
.sheet-login{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--soft);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.sheet-login .sub{color:var(--muted);font-size:12px}
.sheet-login .user-box{display:flex;align-items:center;gap:8px;font-size:13.5px}
.sheet-login .user-box img{width:26px;height:26px;border-radius:50%}
.sheet-login .user-box b{font-size:13.5px}
.sheet-login .link-sair{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
</style>
</head>
<body>

<div class="navbar">
  <div class="brand" id="brand-box"><img src="https://jaytdbwaoduefrbragsw.supabase.co/storage/v1/object/public/fotos-produtos/dd8275c9-e88f-4633-bfd0-bfa262eaf857/site/IMG-UXF7V4NZ.png" alt="Sabores da Ana"></div>
  <div class="navlinks">
    <a onclick="document.getElementById('cardapio').scrollIntoView({behavior:'smooth'})">Produtos</a>
    <a href="https://saboresdaanairati.com.br/" target="_blank" rel="noopener">Sobre Nós</a>
    <a href="https://saboresdaanairati.com.br/" target="_blank" rel="noopener">Contato</a>
  </div>
  <button class="cart-btn" onclick="abrirCarrinho()">
    <img src="https://jaytdbwaoduefrbragsw.supabase.co/storage/v1/object/public/fotos-produtos/dd8275c9-e88f-4633-bfd0-bfa262eaf857/site/IMG-UXDMZRJI.png" alt="Meu Pedido">
    <span class="cart-badge" id="nav-cart-badge">0</span>
  </button>
</div>

<div class="hero" id="hero"><img src="https://jaytdbwaoduefrbragsw.supabase.co/storage/v1/object/public/fotos-produtos/dd8275c9-e88f-4633-bfd0-bfa262eaf857/site/IMG-UXCWGC8W.png" alt="Sabores da Ana"></div>

<div class="catnav" id="catnav"></div>

<div class="promo-banner" id="promo-banner"></div>

<div class="wrap" id="cardapio"><div class="loading">Carregando cardápio…</div></div>

<div class="cartbar" id="cartbar">
  <div><span class="cnt" id="cart-cnt">0</span><b id="cart-tot">R$ 0,00</b></div>
  <button onclick="abrirCarrinho()">Ver pedido</button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
'use strict';
/* ===== Configuração desta loja ===== */
const SUPABASE_URL='https://jaytdbwaoduefrbragsw.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpheXRkYndhb2R1ZWZyYnJhZ3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMTMwNjgsImV4cCI6MjA5ODU4OTA2OH0.3TBjN82_7bqYRiiuU2b6yNJS1xfJyGtD6bEh7q89kwY';
const EMPRESA_ID='dd8275c9-e88f-4633-bfd0-bfa262eaf857';
const LOJA_NOME='Sabores da Ana';

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=s=>document.querySelector(s);
const money=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
document.title=LOJA_NOME+' — Faça seu pedido';

/* ===== Carrinho (persistido no navegador do cliente) ===== */
const CART_KEY='pedido_carrinho_v1';
const SESSAO_KEY='pedido_sessao_v1';
let carrinho=JSON.parse(localStorage.getItem(CART_KEY)||'{}'); // {item_id: qtd}
let cardapio=[];

function idSessao(){
  let id=localStorage.getItem(SESSAO_KEY);
  if(!id){ id=(crypto.randomUUID?crypto.randomUUID():'sess-'+Date.now()+'-'+Math.random().toString(36).slice(2)); localStorage.setItem(SESSAO_KEY,id); }
  return id;
}
function salvarCarrinho(){ localStorage.setItem(CART_KEY,JSON.stringify(carrinho)); atualizarBarra(); }
function itemPorId(id){ return cardapio.find(i=>i.id===id); }
const COMBO_MIN_UN=5, COMBO_DESCONTO_UN=2;
function renderPromoBanner(desktopUrl,mobileUrl){
  const el=$('#promo-banner'); if(!el)return;
  if(desktopUrl){
    el.classList.add('promo-banner-img');
    el.innerHTML=`<picture>
      ${mobileUrl?`<source srcset="${esc(mobileUrl)}" media="(max-width:640px)">`:''}
      <img src="${esc(desktopUrl)}" alt="Promoção">
    </picture>`;
    return;
  }
  el.classList.remove('promo-banner-img');
  el.innerHTML=`<span class="promo-ico">📣</span>
    <div class="promo-txt promo-t1">MAIS UNIDADES,<br>MAIS ECONOMIA!</div>
    <div class="promo-txt promo-t2">ACIMA DE ${COMBO_MIN_UN} UNIDADES,<br>CADA MARMITA TEM</div>
    <div class="promo-badge">${money(COMBO_DESCONTO_UN)}<span>DE DESCONTO!</span></div>
    <span class="promo-ico">📦</span>
    <div class="promo-txt promo-t3">Válido em<br>qualquer categoria</div>`;
}
renderPromoBanner();
function brutoCarrinho(){ return Object.entries(carrinho).reduce((a,[id,q])=>{ const it=itemPorId(id); return a+(it?it.preco_venda*q:0); },0); }
function qtdCarrinho(){ return Object.values(carrinho).reduce((a,q)=>a+q,0); }
function comboAtivoCarrinho(){ return qtdCarrinho()>=COMBO_MIN_UN; }
function descontoComboCarrinho(){ return comboAtivoCarrinho()?qtdCarrinho()*COMBO_DESCONTO_UN:0; }
function totalCarrinho(){ return Math.max(0,brutoCarrinho()-descontoComboCarrinho()); }
function alterarQtd(id,delta){
  const atual=carrinho[id]||0; const nova=Math.max(0,atual+delta);
  if(nova<=0)delete carrinho[id]; else carrinho[id]=nova;
  salvarCarrinho(); renderCardapio(); if($('#overlay').classList.contains('open'))renderCarrinho();
}
function atualizarBarra(){
  const n=qtdCarrinho();
  $('#cartbar').classList.toggle('show',n>0);
  $('#cart-cnt').textContent=n;
  $('#cart-tot').textContent=money(totalCarrinho());
  const badge=$('#nav-cart-badge');
  badge.textContent=n;
  badge.style.display=n>0?'block':'none';
}

/* ===== Cardápio ===== */
let destaques=[];
let FOTO_PADRAO='';
let COMPOSICOES={};
async function carregarCardapio(){
  const [cardRes,destRes,identRes,compRes]=await Promise.all([
    sb.rpc('erp_cardapio_publico',{p_empresa_id:EMPRESA_ID}),
    sb.rpc('erp_mais_vendidos_publico',{p_empresa_id:EMPRESA_ID,p_limite:5}),
    sb.rpc('erp_identidade_publica',{p_empresa_id:EMPRESA_ID}),
    sb.rpc('erp_composicoes_publico',{p_empresa_id:EMPRESA_ID})
  ]);
  if(cardRes.error){ $('#cardapio').innerHTML='<div class="empty">Não foi possível carregar o cardápio agora. Tente novamente em instantes.</div>'; return; }
  cardapio=cardRes.data||[];
  destaques=cardRes.error?[]:(destRes.data||[]);
  FOTO_PADRAO=(identRes&&identRes.data&&identRes.data.foto_padrao)||'';
  renderPromoBanner(identRes&&identRes.data&&identRes.data.banner_promo_desktop,identRes&&identRes.data&&identRes.data.banner_promo_mobile);
  COMPOSICOES=(compRes&&compRes.data)||{};
  renderCardapio();
  atualizarBarra();
}
function fmtQtdComposicao(q,u){
  if(q==null||isNaN(q))return '';
  if(u==='un')return (q%1===0?q:q.toFixed(1).replace('.',','))+' un';
  if(u==='g'||u==='ml')return Math.round(q)+u;
  return (Math.round(q*10)/10)+(u?' '+u:'');
}
function pesoTotalG(id){
  const comp=COMPOSICOES[id];
  if(!comp||!comp.length)return 0;
  return comp.reduce((soma,c)=>soma+((c.unidade==='g'&&c.quantidade)?Number(c.quantidade):0),0);
}
function composicaoHtml(id){
  const comp=COMPOSICOES[id];
  if(!comp||!comp.length)return '';
  const linhas=comp.map(c=>`<li>${esc(c.nome)}<span class="q">${fmtQtdComposicao(c.quantidade,c.unidade)}</span></li>`).join('');
  return `<span class="info-badge" tabindex="0" onclick="if(event.target.closest('.info-pop'))return;event.stopPropagation();toggleInfo(this)"><span class="tri"></span><span class="ic">i</span><div class="info-pop"><b>Composição</b><ul>${linhas}</ul></div></span>`;
}
function fecharInfoAbertos(exceto){
  document.querySelectorAll('.info-badge.open').forEach(b=>{
    if(b===exceto)return;
    b.classList.remove('open');
    const p=b.querySelector('.info-pop'); if(p)p.style.transform='';
  });
}
function toggleInfo(badge){
  const abrir=!badge.classList.contains('open');
  fecharInfoAbertos(abrir?badge:null);
  badge.classList.toggle('open',abrir);
  const pop=badge.querySelector('.info-pop');
  if(pop)pop.style.transform='';
  if(abrir&&pop){
    requestAnimationFrame(()=>{
      const r=pop.getBoundingClientRect();
      const margem=10;
      let dx=0;
      if(r.left<margem)dx=margem-r.left;
      else if(r.right>window.innerWidth-margem)dx=(window.innerWidth-margem)-r.right;
      if(dx)pop.style.transform='translateX('+Math.round(dx)+'px)';
    });
  }
}
document.addEventListener('click',()=>fecharInfoAbertos(null));
window.addEventListener('scroll',()=>fecharInfoAbertos(null),{passive:true});
function slug(s){ return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
/* deixa "GOURMET / ESPECIAIS" -> "Gourmet / Especiais", etc. */
function capitalizar(s){ return String(s).split(' ').map(w=>w?w.charAt(0).toUpperCase()+w.slice(1).toLowerCase():w).join(' '); }
const THUMB_BG=[
  'linear-gradient(135deg,#F3C9A0,#E7A268)',
  'linear-gradient(135deg,#C9D3AE,#9FAE7E)',
  'linear-gradient(135deg,#F0DCC0,#E0B98C)',
  'linear-gradient(135deg,#E3B7A0,#C98F72)',
  'linear-gradient(135deg,#D8CBA8,#B7A374)',
  'linear-gradient(135deg,#F0C9C2,#DA9C90)'
];
function emojiPrato(nome,categoria){
  const t=(nome+' '+(categoria||'')).toLowerCase();
  const mapa=[
    [/frango/,'🍗'],[/carne|bife|picanha|patinho/,'🥩'],[/peixe|salm[aã]o|til[aá]pia/,'🐟'],[/camar[aã]o/,'🦐'],
    [/massa|macarr[aã]o|penne|nhoque|ravioli|espaguete/,'🍝'],[/arroz/,'🍚'],[/salada/,'🥗'],
    [/sopa|caldo/,'🍲'],[/torta|quiche/,'🥧'],[/legum|vegetari|vegano/,'🥦'],[/doce|sobremesa|bolo/,'🍰'],
    [/ovo/,'🍳'],[/feij[aã]o/,'🦱']
  ];
  for(const [re,em] of mapa)if(re.test(t))return em;
  return '🍽️';
}
let _cardBgCounter=0;
function cardHtml(i){
  const q=carrinho[i.id]||0;
  const bg=THUMB_BG[_cardBgCounter++ % THUMB_BG.length];
  const foto=i.foto_url||FOTO_PADRAO;
  const peso=pesoTotalG(i.id);
  return `<div class="card">
    ${foto?`<img src="${esc(foto)}" alt="">`:`<div class="thumb-fallback" style="background:${bg}">${emojiPrato(i.nome,i.categoria)}</div>`}
    ${composicaoHtml(i.id)}
    <div class="card-body">
      <div class="card-info">
        <b>${esc(i.nome)}${peso>0?` <span class="peso">(${Math.round(peso)}g)</span>`:''}</b>
        ${i.descricao?`<span class="desc">${esc(i.descricao)}</span>`:''}
        <span class="preco">${money(i.preco_venda)}</span>
      </div>
      <div class="card-add">
        ${q>0
          ?`<div class="stepper"><button onclick="alterarQtd('${i.id}',-1)">−</button><span>${q}</span><button class="add" onclick="alterarQtd('${i.id}',1)">+</button></div>`
          :`<button class="btn-add" onclick="alterarQtd('${i.id}',1)">+ Adicionar</button>`}
      </div>
    </div>
  </div>`;
}
/* ordem fixa pedida: Queridinhos, Especiais, Tradicional, Fit, Conforto, Massas, Gourmet
   — casa pelo início do nome da categoria. Usa o radical "Tradicion" (não "Tradicional")
   porque em português o plural é "Tradicionais" (troca "al" por "ais"), então
   "Tradicionais" NÃO começa com "Tradicional" — precisa do radical comum aos dois. */
const ORDEM_CATEGORIAS=['Especiais','Tradicion','Fit','Conforto','Massas','Gourmet'];
function rankCategoria(nome){
  const n=nome.toLowerCase();
  const idx=ORDEM_CATEGORIAS.findIndex(k=>n.startsWith(k.toLowerCase()));
  return idx===-1?999:idx;
}
function renderCardapio(){
  if(!cardapio.length){ $('#cardapio').innerHTML='<div class="empty">Nenhum item disponível no momento.</div>'; $('#catnav').innerHTML=''; return; }
  const porCategoria={};
  cardapio.forEach(i=>{ (porCategoria[i.categoria]=porCategoria[i.categoria]||[]).push(i); });
  const categorias=Object.keys(porCategoria).sort((a,b)=>rankCategoria(a)-rankCategoria(b)||a.localeCompare(b,'pt'));
  const pillQueridinhos=destaques.length?`<button class="catpill active" data-cat="queridinhos" onclick="irParaCategoria('queridinhos')">Queridinhos</button>`:'';
  $('#catnav').innerHTML=pillQueridinhos+categorias.map(cat=>`<button class="catpill${destaques.length?'':' active'}" data-cat="${slug(cat)}" onclick="irParaCategoria('${slug(cat)}')">${esc(capitalizar(cat))}</button>`).join('');
  _cardBgCounter=0;
  const destaquesHtml=destaques.length
    ?`<div class="destaque-h" id="cat-queridinhos">Queridinhos</div><div class="grid-itens" style="margin-bottom:8px">${destaques.map(cardHtml).join('')}</div>`
    :'';
  const categoriasHtml=categorias.map(cat=>{
    const itens=porCategoria[cat].map(cardHtml).join('');
    return `<div class="cat-h" id="cat-${slug(cat)}">${esc(capitalizar(cat))}</div><div class="grid-itens">${itens}</div>`;
  }).join('');
  $('#cardapio').innerHTML=destaquesHtml+categoriasHtml;
  setupScrollSpy();
}
function irParaCategoria(slugId){
  const el=document.getElementById('cat-'+slugId);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}
function setupScrollSpy(){
  const secoes=[...document.querySelectorAll('.cat-h, .destaque-h')];
  if(!secoes.length)return;
  if(window._catObserver)window._catObserver.disconnect();
  const catnavH=$('#catnav').offsetHeight||0;
  document.documentElement.style.setProperty('--catnav-h',catnavH+'px');
  window._catObserver=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id.replace('cat-','');
        document.querySelectorAll('.catpill').forEach(p=>p.classList.toggle('active',p.dataset.cat===id));
      }
    });
  },{rootMargin:`-${catnavH+4}px 0px -70% 0px`,threshold:0});
  secoes.forEach(s=>window._catObserver.observe(s));
}
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===== Login com Google (opcional — dá um cadastro mais robusto) =====
   O botão fica dentro da janela de finalizar pedido (é ali que a
   pessoa realmente se beneficia disso). Da 1ª vez que ela pede
   logada, ainda precisa digitar o telefone (o Google não compartilha
   isso); da 2ª vez em diante, a gente já busca o telefone salvo no
   cadastro anterior dela e preenche sozinho. */
let usuario=null;
let cadastroSalvo=null; // {nome, telefone} do pedido anterior, se logado
const GOOGLE_ICON=`<svg viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.9v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.7V4.97H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.03l3.05-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .9 4.97l3.05 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>`;
async function initAuth(){
  const {data:{session}}=await sb.auth.getSession();
  await aplicarSessao(session);
  sb.auth.onAuthStateChange(async(_ev,session)=>{ await aplicarSessao(session); if($('#overlay').classList.contains('open'))renderCarrinho(); });
}
async function aplicarSessao(session){
  usuario=session?.user||null;
  cadastroSalvo=null;
  if(usuario){
    const {data}=await sb.rpc('erp_meu_cadastro_publico',{p_empresa_id:EMPRESA_ID});
    cadastroSalvo=data||null;
  }
}
function nomeSugerido(){ return cadastroSalvo?.nome||usuario?.user_metadata?.full_name||usuario?.user_metadata?.name||''; }
function telefoneSugerido(){ return cadastroSalvo?.telefone||''; }
function loginHtml(){
  if(usuario){
    const nome=usuario.user_metadata?.full_name||usuario.user_metadata?.name||usuario.email||'Você';
    const foto=usuario.user_metadata?.avatar_url||usuario.user_metadata?.picture||'';
    return `<div class="sheet-login"><div class="user-box">${foto?`<img src="${esc(foto)}" alt="">`:''}<b>${esc(nome.split(' ')[0])}</b></div><button class="link-sair" onclick="sairConta()">sair</button></div>`;
  }
  return `<div class="sheet-login"><button class="btn-google" onclick="entrarComGoogle()">${GOOGLE_ICON}Entrar com Google</button><span class="sub">preenche seus dados&nbsp;sozinho</span></div>`;
}
async function entrarComGoogle(){
  await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href.split('#')[0]}});
}
async function sairConta(){ await sb.auth.signOut(); }

/* ===== Carrinho / checkout ===== */
function abrirCarrinho(){
  if(!qtdCarrinho()){
    $('#sheet').innerHTML=`<div class="sheet-h"><h3>Seu pedido</h3><button class="x" onclick="fecharCarrinho()">✕</button></div>
      <div class="empty" style="padding:34px 10px">Seu carrinho está vazio.<br>Escolhe algo gostoso no cardápio! 😋</div>
      <button class="btn" onclick="fecharCarrinho()">Ver cardápio</button>`;
    $('#overlay').classList.add('open');
    return;
  }
  renderCarrinho(); $('#overlay').classList.add('open');
}
function fecharCarrinho(){ $('#overlay').classList.remove('open'); }
function renderCarrinho(){
  const ids=Object.keys(carrinho).filter(id=>carrinho[id]>0);
  if(!ids.length){ fecharCarrinho(); return; }
  const linhas=ids.map(id=>{
    const it=itemPorId(id); if(!it)return'';
    return `<div class="line">
      <div><div class="nome">${esc(it.nome)}</div><div class="sub">${money(it.preco_venda)} un.</div></div>
      <div class="stepper"><button onclick="alterarQtd('${id}',-1)">−</button><span>${carrinho[id]}</span><button class="add" onclick="alterarQtd('${id}',1)">+</button></div>
    </div>`;
  }).join('');
  const combo=comboAtivoCarrinho();
  const descCombo=descontoComboCarrinho();
  const comboHtml=combo
    ?`<div class="line" style="border-bottom:none;color:var(--primary);font-weight:600"><span>Desconto por quantidade (${qtdCarrinho()}+ un.)</span><span>−${money(descCombo)}</span></div>`
    :`<div class="sub" style="margin:6px 0 0">Faltam ${COMBO_MIN_UN-qtdCarrinho()} un. pro desconto de ${money(COMBO_DESCONTO_UN)}/un. (a partir de ${COMBO_MIN_UN} un.)</div>`;
  $('#sheet').innerHTML=`<div class="sheet-h"><h3>Seu pedido</h3><button class="x" onclick="fecharCarrinho()">✕</button></div>
    ${linhas}
    ${comboHtml}
    <div class="tot"><span>Total</span><span>${money(totalCarrinho())}</span></div>
    ${loginHtml()}
    <div class="field"><label>Seu nome *</label><input id="ck-nome" placeholder="ex.: Maria Silva" value="${esc(nomeSugerido())}"></div>
    <div class="field"><label>Telefone / WhatsApp *</label><input id="ck-tel" placeholder="ex.: (42) 99999-0000" value="${esc(telefoneSugerido())}"></div>
    <div class="field"><label>Observação (opcional)</label><textarea id="ck-obs" placeholder="ex.: sem cebola, retirar às 12h"></textarea></div>
    <div id="ck-err" class="err" style="display:none"></div>
    <button class="btn" id="ck-btn" onclick="enviarPedido()">Confirmar pedido</button>`;
}
async function enviarPedido(){
  const nome=$('#ck-nome').value.trim();
  const tel=$('#ck-tel').value.trim();
  const err=$('#ck-err');
  err.style.display='none';
  if(!nome||!tel){ err.textContent='Preencha nome e telefone para continuar.'; err.style.display='block'; return; }
  const ids=Object.keys(carrinho).filter(id=>carrinho[id]>0);
  if(!ids.length)return;
  const btn=$('#ck-btn'); btn.disabled=true; btn.textContent='Enviando…';
  const itens=ids.map(id=>({item_id:id,quantidade:carrinho[id]}));
  const {data,error}=await sb.rpc('erp_criar_pedido_publico',{
    p_empresa_id:EMPRESA_ID, p_itens:itens, p_cliente_nome:nome, p_cliente_telefone:tel,
    p_observacao:$('#ck-obs').value.trim(), p_id_externo:idSessao(), p_cliente_email:usuario?.email||null
  });
  if(error){
    btn.disabled=false; btn.textContent='Confirmar pedido';
    if(error.message.includes('Item indisponível'))err.textContent='Um item do seu carrinho ficou indisponível — atualize a página e monte o pedido novamente.';
    else if(error.message.includes('Loja indisponível'))err.textContent='A loja não está recebendo pedidos no momento. Tente novamente mais tarde.';
    else err.textContent='Não foi possível enviar seu pedido agora. Tente novamente em instantes.';
    err.style.display='block';
    return;
  }
  carrinho={}; localStorage.removeItem(CART_KEY); localStorage.removeItem(SESSAO_KEY);
  fecharCarrinho();
  await irParaPagamento(data.pedido_id,data.valor_total);
}
/* ===== Pagamento (Mercado Pago — Checkout Pro) ===== */
async function irParaPagamento(pedidoId,valorTotal,err,btn){
  telaAguardandoPagamento(pedidoId,valorTotal);
  try{
    const {data,error}=await sb.functions.invoke('mp-criar-preferencia',{body:{empresa_id:EMPRESA_ID,pedido_id:pedidoId}});
    if(error||!data||!data.init_point)throw error||new Error('sem init_point');
    location.href=data.init_point;
  }catch(e){
    console.error(e);
    telaErroPagamento(pedidoId,valorTotal);
  }
}
function telaAguardandoPagamento(pedidoId,valorTotal){
  $('#cardapio').innerHTML=`<div class="ok-screen">
    <div class="em">⏳</div>
    <h2>Preparando o pagamento…</h2>
    <p>Seu pedido <b>${esc(pedidoId)}</b> (${money(valorTotal)}) foi registrado. Você vai ser levado(a) pro pagamento seguro do Mercado Pago em instantes.</p>
  </div>`;
  atualizarBarra();
}
function telaErroPagamento(pedidoId,valorTotal){
  $('#cardapio').innerHTML=`<div class="ok-screen">
    <div class="em">⚠️</div>
    <h2>Pedido registrado, mas o pagamento não abriu</h2>
    <p>Seu pedido <b>${esc(pedidoId)}</b> (${money(valorTotal)}) já está salvo. Tenta de novo pra ser levado(a) ao pagamento, ou entra em contato com a loja informando esse número do pedido.</p>
    <div style="margin-top:26px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn" style="width:auto" onclick="irParaPagamento('${esc(pedidoId)}',${valorTotal})">Tentar pagamento de novo</button>
      <button class="btn" style="width:auto;background:var(--muted)" onclick="location.reload()">Fazer novo pedido</button>
    </div>
  </div>`;
  atualizarBarra();
}
function telaSucessoPagamento(numero,valorTotal){
  $('#cardapio').innerHTML=`<div class="ok-screen">
    <div class="em">✅</div>
    <h2>Pagamento confirmado!</h2>
    <p>Recebemos seu pagamento e o pedido já está com a gente pra preparar.<br>Valor: <b>${money(valorTotal)}</b></p>
    <div class="pid">Pedido ${esc(numero)}</div>
    <div style="margin-top:26px"><button class="btn" onclick="location.href=location.pathname">Fazer novo pedido</button></div>
  </div>`;
  atualizarBarra();
}
function telaPagamentoPendente(pedidoId,numero,valorTotal){
  $('#cardapio').innerHTML=`<div class="ok-screen">
    <div class="em">🕓</div>
    <h2>Pagamento em processamento</h2>
    <p>Assim que o Mercado Pago confirmar (geralmente leva só alguns instantes — no Pix pode ser na hora, em boleto pode levar até 2 dias úteis), seu pedido é liberado automaticamente.<br>Valor: <b>${money(valorTotal)}</b></p>
    <div class="pid">Pedido ${esc(numero||pedidoId)}</div>
    <div style="margin-top:26px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn" style="width:auto" onclick="location.reload()">Atualizar status</button>
      <button class="btn" style="width:auto;background:var(--muted)" onclick="location.href=location.pathname">Voltar à loja</button>
    </div>
  </div>`;
  atualizarBarra();
}
function telaPagamentoFalhou(pedidoId,valorTotal){
  $('#cardapio').innerHTML=`<div class="ok-screen">
    <div class="em">❌</div>
    <h2>Pagamento não foi concluído</h2>
    <p>Seu pedido <b>${esc(pedidoId)}</b> (${money(valorTotal)}) continua salvo — você pode tentar pagar de novo.</p>
    <div style="margin-top:26px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn" style="width:auto" onclick="irParaPagamento('${esc(pedidoId)}',${valorTotal})">Tentar pagamento de novo</button>
      <button class="btn" style="width:auto;background:var(--muted)" onclick="location.href=location.pathname">Voltar à loja</button>
    </div>
  </div>`;
  atualizarBarra();
}
async function verificarRetornoPagamento(){
  const p=new URLSearchParams(location.search);
  const pedidoId=p.get('pedido');
  if(!pedidoId)return;
  history.replaceState(null,'',location.pathname);
  const {data}=await sb.rpc('erp_pedido_status_publico',{p_empresa_id:EMPRESA_ID,p_pedido_id:pedidoId});
  if(!data||!data.encontrado)return;
  if(data.pago)telaSucessoPagamento(data.numero||pedidoId,data.valor_total);
  else if(p.get('pg')==='falha')telaPagamentoFalhou(pedidoId,data.valor_total);
  else telaPagamentoPendente(pedidoId,data.numero,data.valor_total);
}

carregarCardapio().then(verificarRetornoPagamento);
initAuth();
</script>
